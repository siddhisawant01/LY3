<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#b7ddeb;
}

body{
    touch-action:manipulation;
}

/* ---------------- GAME ---------------- */

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.5s;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:min(300px,75%);
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:#b7ddeb;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:100%;
    text-align:center;
    font-weight:bold;
    color:#000;
    padding-top:clamp(12px,2vh,20px);
    font-size:clamp(18px,2.5vw,48px);
    z-index:20;
}

/* ---------------- POND ---------------- */

.pond{
    position:relative;

    width:min(92vw,1000px);
    height:min(72vh,650px);

    margin-top:clamp(10px,2vh,25px);

    background:linear-gradient(#18bee7,#53b6e1);

    border-radius:45%;

    border:clamp(10px,1.3vw,18px)
    solid #7ed04f;

    overflow:hidden;
}

/* ---------------- WATER CIRCLES ---------------- */

.water-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
}

.w1{
    width:22%;
    aspect-ratio:1;
    top:18%;
    left:10%;
}

.w2{
    width:16%;
    aspect-ratio:1;
    top:35%;
    right:15%;
}

.w3{
    width:28%;
    aspect-ratio:1;
    bottom:5%;
    left:35%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;

    width:clamp(110px,15vw,200px);
    height:clamp(110px,15vw,200px);

    left:50%;
    top:48%;

    transform:translate(-50%,-50%);

    z-index:15;

    transition:
    left 0.8s ease,
    top 0.8s ease,
    transform 0.8s ease;
}

/* ---------------- JUMP ANIMATION ---------------- */

.frog.jump{
    animation:frogJump 0.9s ease;
}

@keyframes frogJump{

    0%{
        transform:translate(-50%,-50%) translateY(0);
    }

    25%{
        transform:translate(-50%,-50%) translateY(-80px) scale(1.08);
    }

    50%{
        transform:translate(-50%,-50%) translateY(-120px) scale(1.12);
    }

    75%{
        transform:translate(-50%,-50%) translateY(-60px);
    }

    100%{
        transform:translate(-50%,-50%) translateY(0);
    }
}

/* ---------------- FROG BODY ---------------- */

.frog-body{
    position:absolute;

    width:55%;
    height:55%;

    background:#00cc2f;

    border-radius:50%;

    left:22%;
    top:28%;

    border:5px solid #08781f;
}

/* ---------------- EYES ---------------- */

.eye{
    position:absolute;

    width:18%;
    height:18%;

    background:white;

    border-radius:50%;

    border:4px solid #08781f;

    top:10%;
}

.eye.left{
    left:24%;
}

.eye.right{
    right:24%;
}

.pupil{
    position:absolute;

    width:38%;
    height:38%;

    background:black;

    border-radius:50%;

    top:31%;
    left:31%;
}

/* ---------------- SMILE ---------------- */

.smile{
    position:absolute;

    width:20%;
    height:10%;

    border-bottom:5px solid black;

    border-radius:0 0 40px 40px;

    left:40%;
    top:48%;
}

/* ---------------- LEGS ---------------- */

.leg{
    position:absolute;

    width:10%;
    height:20%;

    background:#00cc2f;

    border:4px solid #08781f;

    border-radius:20px;

    bottom:12%;
}

.leg.left{
    left:38%;
}

.leg.right{
    right:38%;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;

    width:clamp(150px,22vw,260px);
    height:clamp(85px,12vw,145px);

    background:#00d63f;

    border:6px solid #08752c;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:clamp(24px,3vw,52px);

    font-weight:bold;

    color:white;

    box-shadow:0 6px 12px rgba(0,0,0,0.3);

    user-select:none;

    cursor:pointer;

    z-index:12;

    transition:0.2s;
}

.leaf:active{
    transform:scale(0.94);
}

.leaf::after{
    content:"";

    position:absolute;

    width:25%;
    height:7%;

    background:#08752c;

    border-radius:20px;

    right:12%;
    bottom:12%;

    transform:rotate(-20deg);
}

/* ---------------- LEAF POSITIONS ---------------- */

.left-leaf{
    left:4%;
    bottom:-1%;
}

.right-leaf{
    right:4%;
    bottom:-1%;
}

/* ---------------- FROG LAND POSITIONS ---------------- */

.jump-left{
    left:23%;
    top:82%;
}

.jump-right{
    left:77%;
    top:82%;
}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(
    to bottom,
    #69ecff,
    #5af0a0,
    #fff173);

    overflow:hidden;
}

/* ---------------- FINAL TEXT ---------------- */

.final-text{
    position:absolute;

    width:100%;

    top:15%;

    text-align:center;

    font-size:clamp(42px,7vw,90px);

    font-weight:bold;

    color:white;

    text-shadow:4px 4px 8px rgba(0,0,0,0.3);
}

/* ---------------- SMALL FROGS ---------------- */

.small-frog{
    position:absolute;

    width:90px;
    height:90px;

    animation:smallJump 2s infinite ease-in-out;
}

.sf1{ left:8%; bottom:8%; animation-delay:0s; }
.sf2{ left:26%; bottom:18%; animation-delay:0.3s; }
.sf3{ left:45%; bottom:10%; animation-delay:0.6s; }
.sf4{ left:64%; bottom:20%; animation-delay:0.9s; }
.sf5{ left:82%; bottom:10%; animation-delay:1.2s; }

@keyframes smallJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-60px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ---------------- MOBILE ---------------- */

@media(max-width:900px){

    .instruction{
        font-size:22px;
        padding-top:18px;
    }

    .pond{
        width:95vw;
        height:62vh;
        margin-top:20px;
    }

    .frog{
        width:160px;
        height:160px;
    }

    .leaf{
        width:190px;
        height:105px;
        font-size:36px;
    }

    .jump-left{
        left:24%;
        top:82%;
    }

    .jump-right{
        left:76%;
        top:82%;
    }
}

/* ---------------- PHONES ---------------- */

@media(max-width:600px){

    .instruction{
        font-size:18px;
        padding:16px 10px 0;
    }

    .pond{

        width:96vw;
        height:58vh;

        border-width:10px;

        margin-top:14px;

        border-radius:38%;
    }

    .frog{
        width:145px;
        height:145px;
        top:47%;
    }

    .frog-body{
        border-width:4px;
    }

    .eye{
        border-width:3px;
    }

    .leg{
        border-width:3px;
    }

    .smile{
        border-bottom-width:4px;
    }

    .leaf{

        width:150px;
        height:85px;

        font-size:18px;

        border-width:4px;
    }

    .left-leaf{
        left:1%;
        bottom:-2%;
    }

    .right-leaf{
        right:1%;
        bottom:-2%;
    }

    .jump-left{
        left:24%;
        top:80%;
    }

    .jump-right{
        left:76%;
        top:80%;
    }

    .small-frog{
        width:65px;
        height:65px;
    }
}

/* ---------------- OLD SMALL PHONES ---------------- */

@media(max-width:380px){

    .instruction{
        font-size:15px;
    }

    .pond{
        height:55vh;
    }

    .frog{
        width:120px;
        height:120px;
    }

    .leaf{
        width:125px;
        height:75px;
        font-size:16px;
    }
}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO SLIDE -->

    <div class="slide active" id="slide0">

        <img src="assets/innovine-logo.png"
        class="logo">

    </div>

    <!-- SLIDE 1 -->

    <div class="slide game-slide active2" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog1">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(1,true,'left')">
                this
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(1,false,'right')">

            </div>

        </div>

    </div>

        </div>

        <div class="pond">

            <div class="frog" id="frog2">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(2,false,'left')">
                cat
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(2,true,'right')">
                you
            </div>

        </div>

    </div>

    <!-- SLIDE 3 -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog3">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(3,true,'left')">
                the
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(3,false,'right')">
                sun
            </div>

        </div>

    </div>

    <!-- SLIDE 4 -->

    <div class="slide game-slide" id="slide4">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog4">

                <div class="frog-body"></div>

                <div class="eye left">

                </div>

                <div class="eye right">
                    <div class="pupil"></div>

                <div class="smile"></div>

                <div class="leg left"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(4,false,'left')">
                lid
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(4,true,'right')">
                she
            </div>

        </div>

    </div>

    <!-- SLIDE 5 -->

    <div class="slide game-slide" id="slide5">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog5">

                <div class="eye left">

            <div class="leaf left-leaf"

    <div class="slide final-slide" id="slide6">

</div>

<!-- AUDIO -->

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<script>

let currentSlide = 0;

/* ---------------- LOGO SCREEN ---------------- */

setTimeout(() => {

    nextSlide();

},3000);

/* ---------------- NEXT SLIDE ---------------- */

function nextSlide(){

    const current =
    document.getElementById(
    "slide"+currentSlide);

    if(current){

        current.classList.remove("active");

        current.classList.add("previous");
    }

    currentSlide++;

    const next =
    document.getElementById(
    "slide"+currentSlide);

    if(next){

        next.classList.add("active");
    }
}

/* ---------------- ANSWER CHECK ---------------- */

function checkAnswer(
slideNum,
isCorrect,
side
){

    const frog =
    document.getElementById(
    "frog"+slideNum);

    if(isCorrect){

        frog.classList.add("jump");

        setTimeout(()=>{

            if(side === "left"){

                frog.classList.add(
                "jump-left");

            }else{

                frog.classList.add(
                "jump-right");
            }

        },450);

        setTimeout(()=>{

            nextSlide();

        },1300);

    }

    else{

        document.getElementById(
        "wrongSound").play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.85)";

        setTimeout(()=>{

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },250);
    }
}

</script>

</body>
</html>
