<!-- REPLACE ONLY THE .leaf CSS WITH THIS -->

<style>

.leaf{
    position:absolute;

    /* BIGGER LEAVES */
    width:280px;
    height:145px;

    background:#00d93f;

    border:5px solid #08752c;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    /* SMALLER TEXT SO FULL WORD SHOWS */
    font-size:34px;

    font-weight:bold;

    color:white;

    text-shadow:2px 2px 3px rgba(0,0,0,0.3);

    box-shadow:0 6px 12px rgba(0,0,0,0.3);

    user-select:none;
    cursor:pointer;

    z-index:12;

    padding-bottom:8px;

    /* IMPORTANT */
    overflow:visible;
}

/* STEM */

.leaf::after{
    content:"";

    position:absolute;

    width:26%;
    height:7%;

    background:#08752c;

    border-radius:20px;

    right:12%;
    bottom:12%;

    transform:rotate(-20deg);
}

/* LEFT LEAF */

.left-leaf{
    left:1%;
    bottom:-2%;
}

/* RIGHT LEAF */

.right-leaf{
    right:1%;
    bottom:-2%;
}

/* ---------------- TABLET ---------------- */

@media(max-width:900px){

    .leaf{
        width:240px;
        height:125px;

        font-size:30px;
    }
}

/* ---------------- MOBILE ---------------- */

@media(max-width:600px){

    .leaf{

        width:170px;
        height:92px;

        /* BIGGER MOBILE TEXT */
        font-size:28px;

        border-width:4px;
    }

    .left-leaf{
        left:-1%;
    }

    .right-leaf{
        right:-1%;
    }
}

/* ---------------- SMALL PHONES ---------------- */

@media(max-width:390px){

    .leaf{

        width:150px;
        height:82px;

        font-size:24px;
    }
}

</style>
