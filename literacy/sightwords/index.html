<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#c9f3ff;
}

body{
    touch-action:manipulation;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    left:100%;
    top:0;
    transition:0.6s;
    overflow:hidden;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO SLIDE ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

#slide0 img{
    width:260px;
    max-width:75%;
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:linear-gradient(to bottom,#b8ecff,#8ee7ff,#67d7f5);
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:95%;
    margin:auto;
    text-align:center;
    font-weight:bold;
    font-size:clamp(20px,4vw,38px);
    color:#000;
    padding-top:12px;
}

/* ---------------- POND ---------------- */

.pond{
    position:absolute;
    width:92%;
    height:72%;
    left:4%;
    bottom:2%;
    background:radial-gradient(circle,#6ee7ff,#2fc4ea);
    border-radius:50%;
    border:12px solid #69c86d;
    overflow:hidden;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;
    width:190px;
    height:130px;
    background:#09c83f;
    border:6px solid #06752b;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 8px 15px rgba(0,0,0,0.3);
    user-select:none;
}

.leaf:active{
    transform:scale(0.96);
}

.left-leaf{
    left:6%;
    bottom:10%;
}

.right-leaf{
    right:6%;
    bottom:10%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;
    width:140px;
    height:140px;
    left:50%;
    top:38%;
    transform:translate(-50%,-50%);
    transition:all 1s ease;
    z-index:10;
}

/* BODY */

.frog-body{
    position:absolute;
    width:100px;
    height:100px;
    background:#08c532;
    border:5px solid #066d22;
    border-radius:50%;
    left:20px;
    top:28px;
}

/* EYES */

.eye{
    position:absolute;
    width:34px;
    height:34px;
    background:white;
    border:4px solid #066d22;
    border-radius:50%;
    top:0;
}

.eye.left{
    left:22px;
}

.eye.right{
    right:22px;
}

.pupil{
    position:absolute;
    width:12px;
    height:12px;
    background:black;
    border-radius:50%;
    top:9px;
    left:9px;
}

/* SMILE */

.smile{
    position:absolute;
    width:42px;
    height:22px;
    border-bottom:5px solid black;
    border-radius:0 0 40px 40px;
    left:48px;
    top:75px;
}

/* HANDS */

.hand{
    position:absolute;
    width:22px;
    height:40px;
    background:#08c532;
    border:4px solid #066d22;
    border-radius:20px;
    top:85px;
}

.hand.left{
    left:8px;
}

.hand.right{
    right:8px;
}

/* LEGS */

.leg{
    position:absolute;
    width:32px;
    height:45px;
    background:#08c532;
    border:4px solid #066d22;
    border-radius:20px;
    bottom:-4px;
}

.leg.left{
    left:30px;
}

.leg.right{
    right:30px;
}

/* ---------------- FROG JUMP ---------------- */

.jump-left{
    animation:jumpLeft 1s forwards;
}

.jump-right{
    animation:jumpRight 1s forwards;
}

@keyframes jumpLeft{

    0%{
        left:50%;
        top:38%;
        transform:translate(-50%,-50%) scale(1);
    }

    40%{
        left:35%;
        top:18%;
        transform:translate(-50%,-50%) scale(1.15);
    }

    100%{
        left:25%;
        top:58%;
        transform:translate(-50%,-50%) scale(1);
    }

}

@keyframes jumpRight{

    0%{
        left:50%;
        top:38%;
        transform:translate(-50%,-50%) scale(1);
    }

    40%{
        left:65%;
        top:18%;
        transform:translate(-50%,-50%) scale(1.15);
    }

    100%{
        left:75%;
        top:58%;
        transform:translate(-50%,-50%) scale(1);
    }

}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(to bottom,#22d7e6,#16d98f,#e6e76a);
}

.final-text{
    position:absolute;
    top:12%;
    width:100%;
    text-align:center;
    font-size:clamp(42px,8vw,78px);
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 8px rgba(0,0,0,0.4);
}

/* ---------------- SMALL FROGS ---------------- */

.small-frog{
    position:absolute;
    transform:scale(0.8);
    animation:smallJump 2s infinite ease-in-out;
}

.small-frog.one{
    left:4%;
    bottom:2%;
}

.small-frog.two{
    left:24%;
    bottom:16%;
    animation-delay:0.3s;
}

.small-frog.three{
    left:44%;
    bottom:10%;
    animation-delay:0.6s;
}

.small-frog.four{
    left:64%;
    bottom:18%;
    animation-delay:0.9s;
}

.small-frog.five{
    left:84%;
    bottom:4%;
    animation-delay:1.2s;
}

@keyframes smallJump{

    0%{
        transform:translateY(0) scale(0.8);
    }

    50%{
        transform:translateY(-70px) scale(0.8);
    }

    100%{
        transform:translateY(0) scale(0.8);
    }

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .leaf{
        width:150px;
        height:105px;
        font-size:32px;
    }

    .frog{
        transform:translate(-50%,-50%) scale(0.85);
    }

}

@media(max-width:480px){

    .instruction{
        font-size:22px;
        padding:10px;
    }

    .leaf{
        width:125px;
        height:90px;
        font-size:26px;
    }

    .left-leaf{
        left:2%;
    }

    .right-leaf{
        right:2%;
    }

    .frog{
        transform:translate(-50%,-50%) scale(0.72);
    }

}

</style>
</head>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ---------------- SLIDE CONTROL ---------------- */

let currentSlide = 0;

setTimeout(()=>{

    nextSlide();

},3000);

function nextSlide(){

    let current = document.getElementById("slide"+currentSlide);

    if(current){

        current.classList.remove("active");
        current.classList.add("previous");

    }

    currentSlide++;

    let next = document.getElementById("slide"+currentSlide);

    if(next){

        next.classList.add("active");

    }

}

/* ---------------- GAME LOGIC ---------------- */

function checkAnswer(slideNum,isCorrect,side){

    const frog = document.getElementById("frog"+slideNum);

    if(isCorrect){

        document.getElementById("correctSound").play();

        if(side === "left"){

            frog.classList.add("jump-left");

        }else{

            frog.classList.add("jump-right");

        }

        setTimeout(()=>{

            nextSlide();

        },1500);

    }else{

        document.getElementById("wrongSound").play();

        frog.style.transform = "translate(-50%,-50%) scale(0.9)";

        setTimeout(()=>{

            frog.style.transform = "translate(-50%,-50%) scale(1)";

        },300);

    }

}

</script>
