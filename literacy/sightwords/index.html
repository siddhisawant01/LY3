<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#bdefff;
}

body{
    touch-action:manipulation;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.6s;
    overflow:hidden;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:260px;
    max-width:80%;
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:#bdefff;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:95%;
    margin:auto;
    text-align:center;
    font-size:clamp(22px,4vw,40px);
    font-weight:bold;
    color:#000;
    padding-top:14px;
    z-index:20;
    position:relative;
}

/* ---------------- POND ---------------- */

.pond{
    position:absolute;
    width:92%;
    height:74%;
    left:4%;
    bottom:2%;
    background:linear-gradient(#6ee2ff,#29b6e5);
    border-radius:45%;
    border:18px solid #7dd95d;
    overflow:hidden;
}

/* ---------------- WATER EFFECT ---------------- */

.water{
    position:absolute;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
}

.water1{
    width:180px;
    height:180px;
    top:12%;
    left:10%;
}

.water2{
    width:140px;
    height:140px;
    top:24%;
    right:15%;
}

.water3{
    width:220px;
    height:220px;
    bottom:6%;
    left:35%;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;
    width:210px;
    height:130px;
    background:#00c840;
    border:6px solid #0b7b2f;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:44px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    box-shadow:0 8px 16px rgba(0,0,0,0.3);
    user-select:none;
    z-index:5;
    transition:0.2s;
}

.leaf:active{
    transform:scale(0.95);
}

.leaf::after{
    content:"";
    position:absolute;
    width:45px;
    height:12px;
    background:#0b7b2f;
    border-radius:20px;
    right:18px;
    bottom:18px;
    transform:rotate(-20deg);
}

.left-leaf{
    left:6%;
    bottom:10%;
}

.right-leaf{
    right:6%;
    bottom:10%;
}

/* ---------------- MAIN FROG ---------------- */

.frog{
    position:absolute;
    width:170px;
    height:170px;
    left:50%;
    top:42%;
    transform:translate(-50%,-50%);
    z-index:20;
}

/* Body */

.frog-body{
    position:absolute;
    width:120px;
    height:120px;
    background:#00bf2f;
    border:5px solid #0b7b2f;
    border-radius:50%;
    left:25px;
    top:35px;
}

/* Eyes */

.eye{
    position:absolute;
    width:38px;
    height:38px;
    background:white;
    border:4px solid #0b7b2f;
    border-radius:50%;
    top:12px;
}

.eye.left{
    left:34px;
}

.eye.right{
    right:34px;
}

.pupil{
    position:absolute;
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
    top:10px;
    left:10px;
}

/* Smile */

.smile{
    position:absolute;
    width:42px;
    height:22px;
    border-bottom:5px solid black;
    border-radius:0 0 40px 40px;
    left:64px;
    top:88px;
}

/* Hands */

.hand{
    position:absolute;
    width:28px;
    height:50px;
    background:#00bf2f;
    border:4px solid #0b7b2f;
    border-radius:40px;
    top:78px;
}

.hand.left{
    left:12px;
    transform:rotate(20deg);
}

.hand.right{
    right:12px;
    transform:rotate(-20deg);
}

/* Legs */

.leg{
    position:absolute;
    width:34px;
    height:54px;
    background:#00bf2f;
    border:4px solid #0b7b2f;
    border-radius:40px;
    bottom:2px;
}

.leg.left{
    left:45px;
}

.leg.right{
    right:45px;
}

/* ---------------- JUMP ---------------- */

.jump-left{
    animation:jumpLeft 1.2s forwards;
}

.jump-right{
    animation:jumpRight 1.2s forwards;
}

@keyframes jumpLeft{

    0%{
        left:50%;
        top:42%;
    }

    30%{
        left:40%;
        top:18%;
    }

    60%{
        left:30%;
        top:35%;
    }

    100%{
        left:24%;
        top:62%;
    }

}

@keyframes jumpRight{

    0%{
        left:50%;
        top:42%;
    }

    30%{
        left:60%;
        top:18%;
    }

    60%{
        left:70%;
        top:35%;
    }

    100%{
        left:76%;
        top:62%;
    }

}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(to bottom,#29e1e8,#42e695,#fff27d);
    overflow:hidden;
}

.final-text{
    position:absolute;
    width:100%;
    text-align:center;
    top:8%;
    font-size:clamp(42px,8vw,82px);
    font-weight:bold;
    color:white;
    text-shadow:4px 4px 8px rgba(0,0,0,0.3);
}

/* ---------------- SMALL FROGS ---------------- */

.small-frog{
    position:absolute;
    width:120px;
    height:120px;
    animation:frogJump 2s infinite ease-in-out;
}

/* Positions */

.sf1{
    left:2%;
    bottom:8%;
    animation-delay:0s;
}

.sf2{
    left:16%;
    bottom:26%;
    animation-delay:0.3s;
}

.sf3{
    left:32%;
    bottom:10%;
    animation-delay:0.6s;
}

.sf4{
    left:48%;
    bottom:28%;
    animation-delay:0.9s;
}

.sf5{
    left:64%;
    bottom:10%;
    animation-delay:1.2s;
}

.sf6{
    left:80%;
    bottom:26%;
    animation-delay:1.5s;
}

.sf7{
    left:10%;
    bottom:46%;
    animation-delay:1.8s;
}

.sf8{
    left:38%;
    bottom:50%;
    animation-delay:2.1s;
}

.sf9{
    left:68%;
    bottom:46%;
    animation-delay:2.4s;
}

@keyframes frogJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-90px);
    }

    100%{
        transform:translateY(0);
    }

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    }

    .leg{

        height:34px;
    }

    .small-frog{
        width:65px;
        height:65px;
    }

}

</style>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

let currentSlide = 0;

/* START GAME */

setTimeout(function(){

    nextSlide();

},3000);

/* NEXT SLIDE */

function nextSlide(){

    let current =
    document.getElementById("slide"+currentSlide);

    if(current){

        current.classList.remove("active");
        current.classList.add("previous");

    }

    currentSlide++;

    let next =
    document.getElementById("slide"+currentSlide);

    if(next){

        next.classList.add("active");

    }

}

/* CHECK ANSWER */

function checkAnswer(slideNum,isCorrect,side){

    const frog =
    document.getElementById("frog"+slideNum);

    if(isCorrect){

        document.getElementById("correctSound").play();

        if(side === "left"){

            frog.classList.add("jump-left");

        }else{

            frog.classList.add("jump-right");

        }

        setTimeout(function(){

            nextSlide();

        },1300);

    }

    else{

        document.getElementById("wrongSound").play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.9)";

        setTimeout(function(){

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },300);

    }

}

</script>
