<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#b7ddea;
}

body{
    touch-action:manipulation;
}

/* ---------------- GAME ---------------- */

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.5s ease;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:260px;
    max-width:80%;
}

/* ---------------- GAME SCREEN ---------------- */

.game-slide{
    background:#b7ddea;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    position:absolute;
    top:2vh;
    width:100%;
    text-align:center;
    font-weight:bold;
    color:#000;
    z-index:100;
    padding:0 12px;

    font-size:
    clamp(18px,2.6vw,48px);
}

/* ---------------- POND ---------------- */

.pond{
    position:absolute;

    width:min(92vw,1050px);
    aspect-ratio:1.45/1;

    left:50%;
    top:56%;

    transform:translate(-50%,-50%);

    background:
    linear-gradient(
    to bottom,
    #1dc0e8,
    #58b9df);

    border:
    clamp(10px,1.4vw,18px)
    solid #82d34f;

    border-radius:48%;

    overflow:hidden;
}

/* ---------------- WATER ---------------- */

.water-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
}

.w1{
    width:26%;
    aspect-ratio:1;
    top:16%;
    left:10%;
}

.w2{
    width:18%;
    aspect-ratio:1;
    top:34%;
    right:13%;
}

.w3{
    width:30%;
    aspect-ratio:1;
    bottom:6%;
    left:36%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;

    width:14%;
    aspect-ratio:1;

    left:50%;
    top:48%;

    transform:translate(-50%,-50%);

    z-index:20;

    transition:
    left 0.7s ease,
    top 0.7s ease,
    transform 0.7s ease;
}

/* JUMP ANIMATION */

@keyframes frogJump{

    0%{
        transform:
        translate(-50%,-50%)
        scale(1)
        translateY(0);
    }

    25%{
        transform:
        translate(-50%,-50%)
        scale(1.1)
        translateY(-55px);
    }

    50%{
        transform:
        translate(-50%,-50%)
        scale(1.15)
        translateY(-95px);
    }

    75%{
        transform:
        translate(-50%,-50%)
        scale(1.05)
        translateY(-40px);
    }

    100%{
        transform:
        translate(-50%,-50%)
        scale(1)
        translateY(0);
    }
}

/* Frog body */

.frog-body{
    position:absolute;
    width:62%;
    height:62%;
    background:#00c92c;
    border:5px solid #0a7c20;
    border-radius:50%;
    left:19%;
    top:28%;
}

/* Eyes */

.eye{
    position:absolute;
    width:18%;
    aspect-ratio:1;
    background:white;
    border-radius:50%;
    border:4px solid #0a7c20;
    top:5%;
}

.eye.left{
    left:22%;
}

.eye.right{
    right:22%;
}

.pupil{
    position:absolute;
    width:36%;
    aspect-ratio:1;
    background:black;
    border-radius:50%;
    top:32%;
    left:32%;
}

/* Smile */

.smile{
    position:absolute;
    width:22%;
    height:12%;
    border-bottom:4px solid black;
    border-radius:0 0 30px 30px;
    left:39%;
    top:52%;
}

/* Legs */

.leg{
    position:absolute;
    width:13%;
    height:24%;
    background:#00c92c;
    border:4px solid #0a7c20;
    border-radius:40px;
    bottom:4%;
}

.leg.left{
    left:31%;
}

.leg.right{
    right:31%;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;

    width:24%;
    aspect-ratio:1.75/1;

    background:#06d43c;

    border:
    clamp(4px,0.7vw,7px)
    solid #0a7c20;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:bold;
    color:white;

    cursor:pointer;
    user-select:none;

    box-shadow:
    0 6px 10px rgba(0,0,0,0.25);

    transition:0.2s;

    z-index:10;

    /* BIGGER WORDS */

    font-size:
    clamp(22px,2.4vw,54px);
}

.leaf:active{
    transform:scale(0.92);
}

.leaf::after{
    content:"";
    position:absolute;

    width:28%;
    height:8%;

    background:#0a7c20;

    right:10%;
    bottom:10%;

    border-radius:20px;

    transform:rotate(-18deg);
}

.left-leaf{
    left:4%;
    bottom:3%;
}

.right-leaf{
    right:4%;
    bottom:3%;
}

/* ---------------- JUMP POSITIONS ---------------- */

.jump-left{
    left:22%;
    top:73%;
    animation:frogJump 0.9s ease;
}

.jump-right{
    left:78%;
    top:73%;
    animation:frogJump 0.9s ease;
}

/* ---------------- FINAL SCREEN ---------------- */

.final-slide{
    background:
    linear-gradient(
    to bottom,
    #42dce5,
    #4be890,
    #f7f07f);
}

.final-text{
    position:absolute;
    width:100%;
    top:15%;

    text-align:center;

    font-weight:bold;
    color:white;

    text-shadow:
    0 4px 10px rgba(0,0,0,0.35);

    font-size:
    clamp(42px,7vw,90px);
}

/* ---------------- FINAL FROGS ---------------- */

.small-frog{
    position:absolute;
    width:90px;
    aspect-ratio:1;

    animation:
    finalJump 2s infinite ease-in-out;
}

.sf1{left:5%;bottom:8%;}
.sf2{left:24%;bottom:18%;}
.sf3{left:44%;bottom:8%;}
.sf4{left:64%;bottom:18%;}
.sf5{left:82%;bottom:8%;}

@keyframes finalJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-70px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ---------------- TABLET ---------------- */

@media(max-width:900px){

    .pond{
        width:94vw;
        top:57%;
    }

    .frog{
        width:18%;
    }

    .leaf{
        width:28%;
        font-size:clamp(28px,4vw,52px);
    }

}

/* ---------------- MOBILE ---------------- */

@media(max-width:600px){

    .instruction{
        font-size:5vw;
        top:2vh;
    }

    .pond{

        width:96vw;

        aspect-ratio:1.15/1;

        top:58%;
    }

    .frog{
        width:22%;
        top:47%;
    }

    .leaf{

        width:36%;

        bottom:4%;

        /* MUCH BIGGER MOBILE WORDS */

        font-size:clamp(30px,6vw,48px);

        border-width:4px;
    }

    .left-leaf{
        left:3%;
    }

    .right-leaf{
        right:3%;
    }

    .small-frog{
        width:70px;
    }

}

/* ---------------- SMALL OLD PHONES ---------------- */

@media(max-width:420px){

    .instruction{
        font-size:5.4vw;
    }

    .pond{
        width:97vw;
        aspect-ratio:1.08/1;
    }

    .frog{
        width:24%;
    }

    .leaf{

        width:38%;

        /* EXTRA BIG FONT */

        font-size:clamp(32px,6.8vw,50px);
    }

}

</style>
</head>

<body>

<!-- AUDIO -->

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<script>

let currentSlide = 0;

/* LOGO */

setTimeout(()=>{

    nextSlide();

},3000);

/* NEXT SLIDE */

function nextSlide(){

    const current =
    document.getElementById(
    "slide"+currentSlide);

    if(current){

        current.classList.remove("active");
        current.classList.add("previous");
    }

    currentSlide++;

    const next =
    document.getElementById(
    "slide"+currentSlide);

    if(next){

        next.classList.add("active");
    }
}

/* CHECK ANSWER */

function checkAnswer(
slideNum,
isCorrect,
side){

    const frog =
    document.getElementById(
    "frog"+slideNum);

    if(isCorrect){

        if(side==="left"){

            frog.classList.add(
            "jump-left");

        }else{

            frog.classList.add(
            "jump-right");
        }

        setTimeout(()=>{

            nextSlide();

        },1100);

    }

    else{

        document
        .getElementById(
        "wrongSound")
        .play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.88)";

        setTimeout(()=>{

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },250);
    }
}

</script>
