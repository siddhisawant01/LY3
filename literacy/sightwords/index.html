<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#bfefff;
}

body{
    touch-action:manipulation;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    overflow:hidden;
    transition:0.6s ease;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

.logo-slide{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-slide img{
    width:260px;
    max-width:80%;
}

/* ---------------- GAME BACKGROUND ---------------- */

.game-slide{
    background:linear-gradient(#c7f4ff,#9de3ff);
    position:relative;
}

/* Pond */

.pond{
    position:absolute;
    width:85%;
    height:58%;
    left:50%;
    bottom:2%;
    transform:translateX(-50%);
    background:#5cc9f5;
    border-radius:45%;
    border:10px solid #47b4df;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:95%;
    margin:auto;
    text-align:center;
    font-size:clamp(20px,4vw,38px);
    font-weight:bold;
    color:black;
    padding-top:15px;
    position:relative;
    z-index:50;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;
    width:160px;
    height:160px;
    left:50%;
    top:34%;
    transform:translate(-50%,-50%);
    z-index:20;
    transition:all 1s ease;
}

/* Frog Body */

.frog-body{
    position:absolute;
    width:160px;
    height:140px;
    background:#00c83c;
    border:5px solid #0c7a1e;
    border-radius:50%;
}

/* Eyes */

.eye{
    position:absolute;
    width:42px;
    height:42px;
    background:white;
    border:4px solid #0c7a1e;
    border-radius:50%;
    top:-12px;
}

.eye::after{
    content:'';
    position:absolute;
    width:12px;
    height:12px;
    background:black;
    border-radius:50%;
    top:10px;
    left:10px;
}

.eye.left{
    left:30px;
}

.eye.right{
    right:30px;
}

/* Smile */

.mouth{
    position:absolute;
    width:65px;
    height:35px;
    border-bottom:6px solid black;
    border-radius:0 0 60px 60px;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

/* Legs */

.leg{
    position:absolute;
    width:38px;
    height:52px;
    background:#00c83c;
    border:4px solid #0c7a1e;
    border-radius:30px;
    bottom:-18px;
}

.leg.left{
    left:30px;
}

.leg.right{
    right:30px;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;
    width:240px;
    height:145px;
    background:#00d44e;
    border:6px solid #007a24;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:54px;
    font-weight:bold;
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
    z-index:15;
    cursor:pointer;
    transition:0.2s;
}

.leaf:active{
    transform:scale(0.95);
}

.leaf::after{
    content:'';
    position:absolute;
    width:48px;
    height:12px;
    background:#007a24;
    right:18px;
    bottom:18px;
    border-radius:20px;
    transform:rotate(-20deg);
}

.left-leaf{
    left:5%;
    bottom:10%;
}

.right-leaf{
    right:5%;
    bottom:10%;
}

/* ---------------- FROG JUMP ---------------- */

.jump-left{
    animation:jumpLeft 1s forwards;
}

.jump-right{
    animation:jumpRight 1s forwards;
}

@keyframes jumpLeft{

    0%{
        left:50%;
        top:34%;
    }

    35%{
        left:38%;
        top:16%;
    }

    100%{
        left:24%;
        top:68%;
    }

}

@keyframes jumpRight{

    0%{
        left:50%;
        top:34%;
    }

    35%{
        left:62%;
        top:16%;
    }

    100%{
        left:76%;
        top:68%;
    }

}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(#6ee7ff,#7fffb0);
    position:relative;
}

.final-text{
    position:absolute;
    top:35%;
    left:50%;
    transform:translateX(-50%);
    font-size:clamp(45px,8vw,90px);
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 8px rgba(0,0,0,0.3);
    z-index:50;
}

/* Small Frogs */

.small-frog{
    position:absolute;
    width:90px;
    height:90px;
    background:#00c83c;
    border:4px solid #0c7a1e;
    border-radius:50%;
    animation:smallJump 2s infinite ease-in-out;
}

.small-frog::before,
.small-frog::after{
    content:'';
    position:absolute;
    width:18px;
    height:18px;
    background:white;
    border-radius:50%;
    top:-8px;
}

.small-frog::before{
    left:18px;
}

.small-frog::after{
    right:18px;
}

.small-frog.one{
    left:5%;
    bottom:10%;
}

.small-frog.two{
    left:25%;
    bottom:18%;
    animation-delay:0.4s;
}

.small-frog.three{
    left:45%;
    bottom:8%;
    animation-delay:0.8s;
}

.small-frog.four{
    left:65%;
    bottom:18%;
    animation-delay:1.2s;
}

.small-frog.five{
    left:82%;
    bottom:10%;
    animation-delay:1.6s;
}

@keyframes smallJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-70px);
    }

    100%{
        transform:translateY(0);
    }

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .frog{
        width:130px;
        height:130px;
    }

    .frog-body{
        width:130px;
        height:115px;
    }

    .leaf{
        width:180px;
        height:110px;
        font-size:38px;
    }

}

@media(max-width:480px){

    .instruction{
        font-size:20px;
    }

    .frog{
        width:100px;
        height:100px;
        top:36%;
    }

    .frog-body{
        width:100px;
        height:90px;
    }

    .eye{
        width:28px;
        height:28px;
    }

    .eye.left{
        left:14px;
    }

    .eye.right{
        right:14px;
    }

    .mouth{
        width:42px;
        height:20px;
        bottom:24px;
    }

    .leg{
        width:24px;
        height:35px;
    }

    .leaf{
        width:140px;
        height:85px;
        font-size:28px;
    }

    .left-leaf{
        left:2%;
    }

    .right-leaf{
        right:2%;
    }

}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO -->

    <div class="slide active logo-slide" id="slide0">

        <img src="assets/innovine-logo.png">

    </div>

    <!-- SLIDE 1 -->

    <div class="slide game-slide" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond"></div>

        <div class="frog" id="frog1">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(1,true,'left')">
        this
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(1,false,'right')">
        star
        </div>

    </div>

    <!-- SLIDE 2 -->

    <div class="slide game-slide" id="slide2">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond"></div>

        <div class="frog" id="frog2">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(2,false,'left')">
        cat
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(2,true,'right')">
        you
        </div>

    </div>

    <!-- SLIDE 3 -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond"></div>

        <div class="frog" id="frog3">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(3,true,'left')">
        the
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(3,false,'right')">
        sun
        </div>

    </div>

    <!-- SLIDE 4 -->

    <div class="slide game-slide" id="slide4">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond"></div>

        <div class="frog" id="frog4">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(4,false,'left')">
        lid
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(4,true,'right')">
        she
        </div>

    </div>

    <!-- SLIDE 5 -->

    <div class="slide game-slide" id="slide5">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond"></div>

        <div class="frog" id="frog5">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(5,true,'left')">
        are
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(5,false,'right')">
        van
        </div>

    </div>

    <!-- FINAL -->

    <div class="slide final-slide" id="slide6">

        <div class="final-text">
            Great Job!
        </div>

        <div class="small-frog one"></div>
        <div class="small-frog two"></div>
        <div class="small-frog three"></div>
        <div class="small-frog four"></div>
        <div class="small-frog five"></div>

    </div>

</div>

<!-- AUDIO -->

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ---------------- SLIDE CONTROL ---------------- */

let currentSlide = 0;

setTimeout(function(){
    nextSlide();
},3000);

function nextSlide(){

    let current = document.getElementById("slide" + currentSlide);

    if(current){
        current.classList.remove("active");
        current.classList.add("previous");
    }

    currentSlide++;

    let next = document.getElementById("slide" + currentSlide);

    if(next){
        next.classList.add("active");
    }

}

/* ---------------- GAME LOGIC ---------------- */

function checkAnswer(slideNum,isCorrect,side){

    let frog = document.getElementById("frog" + slideNum);

    if(isCorrect){

        if(side === "left"){
            frog.classList.add("jump-left");
        }

        else{
            frog.classList.add("jump-right");
        }

        setTimeout(function(){
            nextSlide();
        },1200);

    }

    else{

        document.getElementById("wrongSound").play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.9)";

        setTimeout(function(){

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },300);

    }

}

</script>

</body>
</html>
