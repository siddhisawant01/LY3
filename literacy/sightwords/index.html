<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#b7ddeb;
}

body{
    touch-action:manipulation;
}

/* ---------------- GAME ---------------- */

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.5s;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:min(300px,75%);
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:#b7ddeb;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:100%;
    text-align:center;
    font-weight:bold;
    color:#000;
    padding-top:18px;
    font-size:clamp(22px,3vw,60px);
    z-index:20;
}

/* ---------------- POND ---------------- */

.pond{
    position:relative;

    width:min(92vw,1200px);
    height:min(78vh,720px);

    margin-top:20px;

    background:linear-gradient(#18bee7,#42b5e2);

    border-radius:45%;

    border:14px solid #76d438;

    overflow:hidden;
}

/* ---------------- WATER CIRCLES ---------------- */

.water-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.14);
}

.w1{
    width:18%;
    aspect-ratio:1;
    top:18%;
    left:14%;
}

.w2{
    width:13%;
    aspect-ratio:1;
    top:34%;
    right:16%;
}

.w3{
    width:25%;
    aspect-ratio:1;
    bottom:8%;
    left:38%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;

    width:170px;
    height:170px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    z-index:15;

    transition:
    left 0.8s ease,
    top 0.8s ease,
    transform 0.8s ease;
}

/* ---------------- JUMP ---------------- */

.frog.jump{
    animation:frogJump 0.9s ease;
}

@keyframes frogJump{

    0%{
        transform:translate(-50%,-50%) translateY(0);
    }

    30%{
        transform:translate(-50%,-50%) translateY(-120px) scale(1.1);
    }

    60%{
        transform:translate(-50%,-50%) translateY(-70px);
    }

    100%{
        transform:translate(-50%,-50%) translateY(0);
    }
}

/* ---------------- FROG BODY ---------------- */

.frog-body{
    position:absolute;

    width:56%;
    height:56%;

    background:#00d629;

    border-radius:50%;

    left:22%;
    top:28%;

    border:5px solid #08781f;
}

/* ---------------- EYES ---------------- */

.eye{
    position:absolute;

    width:18%;
    height:18%;

    background:white;

    border-radius:50%;

    border:4px solid #08781f;

    top:10%;
}

.eye.left{
    left:24%;
}

.eye.right{
    right:24%;
}

.pupil{
    position:absolute;

    width:38%;
    height:38%;

    background:black;

    border-radius:50%;

    top:31%;
    left:31%;
}

/* ---------------- SMILE ---------------- */

.smile{
    position:absolute;

    width:20%;
    height:10%;

    border-bottom:5px solid black;

    border-radius:0 0 40px 40px;

    left:40%;
    top:48%;
}

/* ---------------- LEGS ---------------- */

.leg{
    position:absolute;

    width:10%;
    height:20%;

    background:#00d629;

    border:4px solid #08781f;

    border-radius:20px;

    bottom:12%;
}

.leg.left{
    left:38%;
}

.leg.right{
    right:38%;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;

    width:300px;
    height:170px;

    background:#00df3f;

    border:6px solid #046b1d;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:78px;

    font-weight:bold;

    color:white;

    text-shadow:0 3px 6px rgba(0,0,0,0.4);

    box-shadow:0 8px 18px rgba(0,0,0,0.3);

    cursor:pointer;

    user-select:none;

    z-index:12;

    transition:0.2s;
}

.leaf:active{
    transform:scale(0.95);
}

.leaf::after{
    content:"";

    position:absolute;

    width:22%;
    height:7%;

    background:#046b1d;

    border-radius:20px;

    right:12%;
    bottom:13%;

    transform:rotate(-20deg);
}

/* ---------------- LEAF POSITIONS ---------------- */

.left-leaf{
    left:-1%;
    bottom:-3%;
}

.right-leaf{
    right:-1%;
    bottom:-3%;
}

/* ---------------- FROG LAND ---------------- */

.jump-left{
    left:22%;
    top:78%;
}

.jump-right{
    left:78%;
    top:78%;
}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(
    to bottom,
    #69ecff,
    #5af0a0,
    #fff173);

    overflow:hidden;
}

.final-text{
    position:absolute;

    width:100%;

    top:15%;

    text-align:center;

    font-size:clamp(42px,7vw,90px);

    font-weight:bold;

    color:white;

    text-shadow:4px 4px 8px rgba(0,0,0,0.3);
}

/* ---------------- SMALL FROGS ---------------- */

.small-frog{
    position:absolute;

    width:90px;
    height:90px;

    animation:smallJump 2s infinite ease-in-out;
}

.sf1{ left:8%; bottom:8%; animation-delay:0s; }
.sf2{ left:26%; bottom:18%; animation-delay:0.3s; }
.sf3{ left:45%; bottom:10%; animation-delay:0.6s; }
.sf4{ left:64%; bottom:20%; animation-delay:0.9s; }
.sf5{ left:82%; bottom:10%; animation-delay:1.2s; }

@keyframes smallJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-60px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ================================================= */
/* ================== TABLETS ====================== */
/* ================================================= */

@media(max-width:1024px){

    .pond{
        width:96vw;
        height:68vh;
    }

    .leaf{
        width:240px;
        height:135px;
        font-size:58px;
    }

    .frog{
        width:150px;
        height:150px;
    }
}

/* ================================================= */
/* ================== MOBILE ======================= */
/* ================================================= */

@media(max-width:700px){

    .instruction{
        font-size:18px;
        padding:14px 10px 0;
    }

    .pond{

        width:98vw;
        height:60vh;

        border-width:10px;

        border-radius:38%;
    }

    .frog{
        width:120px;
        height:120px;
        top:48%;
    }

    .frog-body{
        border-width:4px;
    }

    .eye{
        border-width:3px;
    }

    .leg{
        border-width:3px;
    }

    .smile{
        border-bottom-width:4px;
    }

    .leaf{

        width:180px;
        height:100px;

        font-size:48px;

        border-width:4px;
    }

    .left-leaf{
        left:-4%;
        bottom:-2%;
    }

    .right-leaf{
        right:-4%;
        bottom:-2%;
    }

    .jump-left{
        left:24%;
        top:78%;
    }

    .jump-right{
        left:76%;
        top:78%;
    }
}

/* ================================================= */
/* ============== OLD SMALL PHONES ================= */
/* ================================================= */

@media(max-width:430px){

    .instruction{
        font-size:16px;
    }

    .pond{
        height:56vh;
    }

    .frog{
        width:100px;
        height:100px;
    }

    .leaf{

        width:145px;
        height:82px;

        font-size:36px;
    }

    .left-leaf{
        left:-5%;
    }

    .right-leaf{
        right:-5%;
    }
}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO -->

    <div class="slide active" id="slide0">

        <img src="assets/innovine-logo.png"
        class="logo">

    </div>

    <!-- SLIDE 1 -->

    <div class="slide game-slide active2" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog1">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(1,true,'left')">
                this
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(1,false,'right')">
                star
            </div>

        </div>

    </div>

    <!-- SLIDE 2 -->

    <div class="slide game-slide" id="slide2">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog2">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(2,false,'left')">
                cat
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(2,true,'right')">
                you
            </div>

        </div>

    </div>

    <!-- SLIDE 3 -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog3">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(3,true,'left')">
                the
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(3,false,'right')">
                sun
            </div>

        </div>

    </div>

    <!-- FINAL SLIDE -->

    <div class="slide final-slide" id="slide4">

        <div class="final-text">
            Great Job!
        </div>

        <div class="small-frog sf1">
            <div class="frog-body"></div>
        </div>

        <div class="small-frog sf2">
            <div class="frog-body"></div>
        </div>

        <div class="small-frog sf3">
            <div class="frog-body"></div>
        </div>

        <div class="small-frog sf4">
            <div class="frog-body"></div>
        </div>

        <div class="small-frog sf5">
            <div class="frog-body"></div>
        </div>

    </div>

</div>

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<script>

let currentSlide = 0;

/* ---------------- LOGO ---------------- */

setTimeout(() => {

    nextSlide();

},3000);

/* ---------------- NEXT ---------------- */

function nextSlide(){

    const current =
    document.getElementById(
    "slide"+currentSlide);

    if(current){

        current.classList.remove("active");

        current.classList.add("previous");
    }

    currentSlide++;

    const next =
    document.getElementById(
    "slide"+currentSlide);

    if(next){

        next.classList.add("active");
    }
}

/* ---------------- CHECK ANSWER ---------------- */

function checkAnswer(
slideNum,
isCorrect,
side
){

    const frog =
    document.getElementById(
    "frog"+slideNum);

    if(isCorrect){

        frog.classList.add("jump");

        setTimeout(()=>{

            if(side === "left"){

                frog.classList.add(
                "jump-left");

            }else{

                frog.classList.add(
                "jump-right");
            }

        },400);

        setTimeout(()=>{

            nextSlide();

        },1300);

    }

    else{

        document.getElementById(
        "wrongSound").play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.85)";

        setTimeout(()=>{

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },250);
    }
}

</script>

</body>
</html>
