<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{
    touch-action:manipulation;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    left:100%;
    top:0;
    transition:0.6s ease;
    overflow:hidden;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

.logo-slide{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo-slide img{
    width:260px;
    max-width:75%;
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:#bfefff;
    position:relative;
    overflow:hidden;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:95%;
    margin:auto;
    text-align:center;
    font-size:clamp(22px,4vw,40px);
    font-weight:bold;
    color:#000;
    padding-top:15px;
    z-index:10;
    position:relative;
}

/* ---------------- FROG POSITION ---------------- */

.frog-container{
    position:absolute;
    top:32%;
    left:50%;
    transform:translate(-50%,-50%);
    width:170px;
    height:170px;
    z-index:20;
    transition:all 0.9s ease;
}

/* ---------------- FROG ---------------- */

.frog-body{
    position:absolute;
    width:170px;
    height:150px;
    background:#00c52b;
    border:5px solid #0d7d18;
    border-radius:50%;
}

/* Eyes */

.eye{
    position:absolute;
    width:42px;
    height:42px;
    background:white;
    border-radius:50%;
    top:-10px;
    border:4px solid #0d7d18;
}

.eye::after{
    content:'';
    position:absolute;
    width:12px;
    height:12px;
    background:black;
    border-radius:50%;
    top:11px;
    left:11px;
}

.eye.left{
    left:30px;
}

.eye.right{
    right:30px;
}

/* Smile */

.mouth{
    position:absolute;
    width:70px;
    height:35px;
    border-bottom:6px solid black;
    border-radius:0 0 60px 60px;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

/* Legs */

.leg{
    position:absolute;
    width:40px;
    height:55px;
    background:#00c52b;
    border:4px solid #0d7d18;
    border-radius:30px;
    bottom:-22px;
}

.leg.left{
    left:28px;
}

.leg.right{
    right:28px;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;
    width:250px;
    height:150px;
    background:#00cc44;
    border:6px solid #007c27;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:56px;
    font-weight:bold;
    color:white;
    box-shadow:0 8px 18px rgba(0,0,0,0.3);
    cursor:pointer;
    user-select:none;
    z-index:10;
    transition:0.2s;
}

.leaf::after{
    content:'';
    position:absolute;
    width:45px;
    height:12px;
    background:#007c27;
    right:18px;
    bottom:18px;
    border-radius:20px;
    transform:rotate(-20deg);
}

.leaf:active{
    transform:scale(0.95);
}

.left-leaf{
    left:5%;
    bottom:10%;
}

.right-leaf{
    right:5%;
    bottom:10%;
}

/* ---------------- FROG JUMP ---------------- */

.jump-left{
    animation:jumpLeft 1s forwards;
}

.jump-right{
    animation:jumpRight 1s forwards;
}

@keyframes jumpLeft{

    0%{
        top:32%;
        left:50%;
    }

    30%{
        top:18%;
        left:40%;
    }

    100%{
        top:54%;
        left:22%;
    }
}

@keyframes jumpRight{

    0%{
        top:32%;
        left:50%;
    }

    30%{
        top:18%;
        left:60%;
    }

    100%{
        top:54%;
        left:78%;
    }
}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(to bottom,#72e8ff,#85ff9c);
    overflow:hidden;
}

.final-text{
    position:absolute;
    top:38%;
    left:50%;
    transform:translateX(-50%);
    font-size:clamp(45px,8vw,90px);
    font-weight:bold;
    color:white;
    text-shadow:3px 3px 8px rgba(0,0,0,0.3);
    z-index:20;
}

/* ---------------- SMALL FROGS ---------------- */

.small-frog{
    position:absolute;
    width:90px;
    height:90px;
    background:#00c52b;
    border:4px solid #0d7d18;
    border-radius:50%;
    animation:smallJump 2s infinite ease-in-out;
}

.small-frog::before,
.small-frog::after{
    content:'';
    position:absolute;
    width:18px;
    height:18px;
    background:white;
    border-radius:50%;
    top:-8px;
}

.small-frog::before{
    left:18px;
}

.small-frog::after{
    right:18px;
}

.small-frog:nth-child(2){
    left:5%;
    bottom:12%;
    animation-delay:0s;
}

.small-frog:nth-child(3){
    left:25%;
    bottom:18%;
    animation-delay:0.4s;
}

.small-frog:nth-child(4){
    left:45%;
    bottom:10%;
    animation-delay:0.8s;
}

.small-frog:nth-child(5){
    left:65%;
    bottom:18%;
    animation-delay:1.2s;
}

.small-frog:nth-child(6){
    left:82%;
    bottom:12%;
    animation-delay:1.6s;
}

@keyframes smallJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-80px);
    }

    100%{
        transform:translateY(0);
    }
}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .frog-container{
        width:140px;
        height:140px;
        top:34%;
    }

    .frog-body{
        width:140px;
        height:120px;
    }

    .leaf{
        width:190px;
        height:120px;
        font-size:42px;
    }

}

@media(max-width:480px){

    .instruction{
        font-size:20px;
        padding-top:10px;
    }

    .frog-container{
        width:110px;
        height:110px;
        top:36%;
    }

    .frog-body{
        width:110px;
        height:95px;
    }

    .eye{
        width:30px;
        height:30px;
    }

    .eye.left{
        left:18px;
    }

    .eye.right{
        right:18px;
    }

    .mouth{
        width:45px;
        height:22px;
        bottom:25px;
    }

    .leg{
        width:28px;
        height:38px;
    }

    .leaf{
        width:150px;
        height:95px;
        font-size:34px;
    }

    .left-leaf{
        left:1%;
    }

    .right-leaf{
        right:1%;
    }

}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO SLIDE -->

    <div class="slide active logo-slide" id="slide0">

        <img src="assets/innovine-logo.png" alt="logo">

    </div>

    <!-- ================= SLIDE 1 ================= -->

    <div class="slide game-slide" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="frog-container" id="frog1">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(1,true,'left')">
        this
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(1,false,'right')">
        star
        </div>

    </div>

    <!-- ================= SLIDE 2 ================= -->

    <div class="slide game-slide" id="slide2">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="frog-container" id="frog2">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(2,false,'left')">
        cat
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(2,true,'right')">
        you
        </div>

    </div>

    <!-- ================= SLIDE 3 ================= -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="frog-container" id="frog3">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(3,true,'left')">
        the
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(3,false,'right')">
        sun
        </div>

    </div>

    <!-- ================= SLIDE 4 ================= -->

    <div class="slide game-slide" id="slide4">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="frog-container" id="frog4">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(4,false,'left')">
        lid
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(4,true,'right')">
        she
        </div>

    </div>

    <!-- ================= SLIDE 5 ================= -->

    <div class="slide game-slide" id="slide5">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="frog-container" id="frog5">

            <div class="frog-body">

                <div class="eye left"></div>
                <div class="eye right"></div>

                <div class="mouth"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

        </div>

        <div class="leaf left-leaf"
        onclick="checkAnswer(5,true,'left')">
        are
        </div>

        <div class="leaf right-leaf"
        onclick="checkAnswer(5,false,'right')">
        van
        </div>

    </div>

    <!-- FINAL SLIDE -->

    <div class="slide final-slide" id="slide6">

        <div class="final-text">
            Great Job!
        </div>

        <div class="small-frog"></div>
        <div class="small-frog"></div>
        <div class="small-frog"></div>
        <div class="small-frog"></div>
        <div class="small-frog"></div>

    </div>

</div>

<!-- AUDIO -->

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

/* ---------------- START ---------------- */

let currentSlide = 0;

setTimeout(()=>{
    nextSlide();
},3000);

/* ---------------- NEXT SLIDE ---------------- */

function nextSlide(){

    let current = document.getElementById("slide"+currentSlide);

    if(current){
        current.classList.remove("active");
        current.classList.add("previous");
    }

    currentSlide++;

    let next = document.getElementById("slide"+currentSlide);

    if(next){
        next.classList.add("active");
    }

}

/* ---------------- ANSWER CHECK ---------------- */

function checkAnswer(slideNum,isCorrect,side){

    const frog = document.getElementById("frog"+slideNum);

    if(isCorrect){

        if(side === "left"){
            frog.classList.add("jump-left");
        }

        else{
            frog.classList.add("jump-right");
        }

        setTimeout(()=>{
            nextSlide();
        },1400);

    }

    else{

        document.getElementById("wrongSound").play();

        frog.style.transform = "translate(-50%,-50%) scale(0.9)";

        setTimeout(()=>{
            frog.style.transform = "translate(-50%,-50%) scale(1)";
        },300);

    }

}

</script>

</body>
</html>
