<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#bdefff;
}

body{
    touch-action:manipulation;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.6s;
    overflow:hidden;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:260px;
    max-width:80%;
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:#bdefff;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:95%;
    margin:auto;
    text-align:center;
    font-size:clamp(20px,4vw,40px);
    font-weight:bold;
    color:#000;
    padding-top:14px;
    position:relative;
    z-index:20;
}

/* ---------------- POND ---------------- */

.pond{
    position:absolute;
    width:92%;
    height:72%;
    left:4%;
    bottom:3%;
    background:linear-gradient(#67dcff,#24b6ea);
    border-radius:45%;
    border:18px solid #87d85d;
    overflow:hidden;
}

/* ---------------- WATER ---------------- */

.water{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
}

.water1{
    width:180px;
    height:180px;
    top:10%;
    left:8%;
}

.water2{
    width:130px;
    height:130px;
    top:28%;
    right:18%;
}

.water3{
    width:220px;
    height:220px;
    bottom:4%;
    left:35%;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;
    width:210px;
    height:135px;
    background:#00c93f;
    border:6px solid #08782d;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:48px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    box-shadow:0 8px 16px rgba(0,0,0,0.25);
    z-index:10;
    user-select:none;
    transition:0.2s;
}

.leaf:active{
    transform:scale(0.95);
}

.leaf::after{
    content:"";
    position:absolute;
    width:42px;
    height:10px;
    background:#08782d;
    border-radius:20px;
    right:18px;
    bottom:16px;
    transform:rotate(-20deg);
}

.left-leaf{
    left:5%;
    bottom:10%;
}

.right-leaf{
    right:5%;
    bottom:10%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;
    width:170px;
    height:170px;
    left:50%;
    top:43%;
    transform:translate(-50%,-50%);
    z-index:20;
}

.frog img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* ---------------- JUMP ---------------- */

.jump-left{
    animation:jumpLeft 1.2s forwards;
}

.jump-right{
    animation:jumpRight 1.2s forwards;
}

@keyframes jumpLeft{

    0%{
        left:50%;
        top:43%;
    }

    25%{
        left:40%;
        top:18%;
    }

    50%{
        left:32%;
        top:30%;
    }

    100%{
        left:24%;
        top:58%;
    }

}

@keyframes jumpRight{

    0%{
        left:50%;
        top:43%;
    }

    25%{
        left:60%;
        top:18%;
    }

    50%{
        left:68%;
        top:30%;
    }

    100%{
        left:76%;
        top:58%;
    }

}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(to bottom,#2ae7ea,#45e69b,#fff27a);
    overflow:hidden;
}

.final-text{
    position:absolute;
    width:100%;
    text-align:center;
    top:10%;
    font-size:clamp(42px,8vw,80px);
    font-weight:bold;
    color:white;
    text-shadow:4px 4px 8px rgba(0,0,0,0.3);
}

/* ---------------- SMALL FROGS ---------------- */

.small-frog{
    position:absolute;
    width:140px;
    animation:frogJump 2s infinite ease-in-out;
}

.small-frog img{
    width:100%;
}

.sf1{
    left:2%;
    bottom:8%;
    animation-delay:0s;
}

.sf2{
    left:20%;
    bottom:18%;
    animation-delay:0.3s;
}

.sf3{
    left:40%;
    bottom:8%;
    animation-delay:0.6s;
}

.sf4{
    left:60%;
    bottom:18%;
    animation-delay:0.9s;
}

.sf5{
    left:80%;
    bottom:8%;
    animation-delay:1.2s;
}

@keyframes frogJump{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-90px);
    }

    100%{
        transform:translateY(0);
    }

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .leaf{
        width:160px;
        height:100px;
        font-size:34px;
    }

    .frog{
        width:135px;
        height:135px;
    }

    .small-frog{
        width:90px;
    }

}

@media(max-width:480px){

    .instruction{
        font-size:18px;
        padding-top:10px;
    }

    .leaf{
        width:130px;
        height:82px;
        font-size:28px;
    }

    .left-leaf{
        left:2%;
        bottom:12%;
    }

    .right-leaf{
        right:2%;
        bottom:12%;
    }

    .frog{
        width:110px;
        height:110px;
        top:44%;
    }

    .small-frog{
        width:70px;
    }

}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO SLIDE -->

    <div class="slide active" id="slide0">

        <img src="assets/innovine-logo.png"
        class="logo">

    </div>

    <!-- SLIDE 1 -->

    <div class="slide game-slide" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water water1"></div>
            <div class="water water2"></div>
            <div class="water water3"></div>

            <div class="frog" id="frog1">
                <img src="assets/frog.png">
            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(1,true,'left')">
                this
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(1,false,'right')">
                star
            </div>

        </div>

    </div>

    <!-- SLIDE 2 -->

    <div class="slide game-slide" id="slide2">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water water1"></div>
            <div class="water water2"></div>
            <div class="water water3"></div>

            <div class="frog" id="frog2">
                <img src="assets/frog.png">
            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(2,false,'left')">
                cat
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(2,true,'right')">
                you
            </div>

        </div>

    </div>

    <!-- SLIDE 3 -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water water1"></div>
            <div class="water water2"></div>
            <div class="water water3"></div>

            <div class="frog" id="frog3">
                <img src="assets/frog.png">
            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(3,true,'left')">
                the
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(3,false,'right')">
                sun
            </div>

        </div>

    </div>

    <!-- SLIDE 4 -->

    <div class="slide game-slide" id="slide4">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water water1"></div>
            <div class="water water2"></div>
            <div class="water water3"></div>

            <div class="frog" id="frog4">
                <img src="assets/frog.png">
            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(4,false,'left')">
                lid
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(4,true,'right')">
                she
            </div>

        </div>

    </div>

    <!-- SLIDE 5 -->

    <div class="slide game-slide" id="slide5">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water water1"></div>
            <div class="water water2"></div>
            <div class="water water3"></div>

            <div class="frog" id="frog5">
                <img src="assets/frog.png">
            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(5,true,'left')">
                are
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(5,false,'right')">
                van
            </div>

        </div>

    </div>

    <!-- FINAL SLIDE -->

    <div class="slide final-slide" id="slide6">

        <div class="final-text">
            Great Job!
        </div>

        <div class="small-frog sf1">
            <img src="assets/frog.png">
        </div>

        <div class="small-frog sf2">
            <img src="assets/frog.png">
        </div>

        <div class="small-frog sf3">
            <img src="assets/frog.png">
        </div>

        <div class="small-frog sf4">
            <img src="assets/frog.png">
        </div>

        <div class="small-frog sf5">
            <img src="assets/frog.png">
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<audio id="correctSound"
src="assets/correct.mp3"></audio>

<script>

let currentSlide = 0;

/* START GAME */

setTimeout(function(){

    nextSlide();

},3000);

/* NEXT SLIDE */

function nextSlide(){

    let current =
    document.getElementById("slide"+currentSlide);

    if(current){

        current.classList.remove("active");
        current.classList.add("previous");

    }

    currentSlide++;

    let next =
    document.getElementById("slide"+currentSlide);

    if(next){

        next.classList.add("active");

    }

}

/* CHECK ANSWER */

function checkAnswer(slideNum,isCorrect,side){

    const frog =
    document.getElementById("frog"+slideNum);

    if(isCorrect){

        document.getElementById(
        "correctSound").play();

        if(side === "left"){

            frog.classList.add(
            "jump-left");

        }

        else{

            frog.classList.add(
            "jump-right");

        }

        setTimeout(function(){

            nextSlide();

        },1300);

    }

    else{

        document.getElementById(
        "wrongSound").play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.9)";

        setTimeout(function(){

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },300);

    }

}

</script>

</body>
</html>
