<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#bfefff;
}

body{
    touch-action:manipulation;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.5s;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:260px;
    max-width:80%;
}

/* ---------------- GAME SLIDES ---------------- */

.game-slide{
    background:#bfefff;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    width:100%;
    text-align:center;
    font-size:clamp(18px,3vw,34px);
    font-weight:bold;
    color:#000;
    padding-top:12px;
    z-index:20;
    position:absolute;
    top:0;
    left:0;
}

/* ---------------- POND ---------------- */

.pond{
    position:absolute;
    width:min(88vw,520px);
    height:min(70vh,720px);
    left:50%;
    top:56%;
    transform:translate(-50%,-50%);
    background:linear-gradient(#5fd3ff,#45b6e6);
    border-radius:45%;
    border:16px solid #84d35f;
    overflow:hidden;
}

/* ---------------- WATER EFFECT ---------------- */

.water-circle{
    position:absolute;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
}

.w1{
    width:42%;
    height:24%;
    top:16%;
    left:10%;
}

.w2{
    width:30%;
    height:18%;
    top:34%;
    right:12%;
}

.w3{
    width:54%;
    height:28%;
    bottom:8%;
    left:24%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;
    width:120px;
    height:120px;
    left:50%;
    top:48%;
    transform:translate(-50%,-50%);
    z-index:15;
    transition:all 1s ease;
    animation:floating 2s ease-in-out infinite;
}

/* FLOATING ANIMATION */

@keyframes floating{

    0%{
        transform:translate(-50%,-50%) translateY(0);
    }

    50%{
        transform:translate(-50%,-50%) translateY(-12px);
    }

    100%{
        transform:translate(-50%,-50%) translateY(0);
    }

}

/* Frog Body */

.frog-body{
    position:absolute;
    width:82px;
    height:82px;
    background:#00c92c;
    border-radius:50%;
    left:19px;
    top:28px;
    border:5px solid #0a7d20;
}

/* Eyes */

.eye{
    position:absolute;
    width:28px;
    height:28px;
    background:white;
    border-radius:50%;
    border:4px solid #0a7d20;
    top:8px;
}

.eye.left{
    left:22px;
}

.eye.right{
    right:22px;
}

.pupil{
    position:absolute;
    width:8px;
    height:8px;
    background:black;
    border-radius:50%;
    top:8px;
    left:8px;
}

/* Smile */

.smile{
    position:absolute;
    width:28px;
    height:14px;
    border-bottom:4px solid black;
    border-radius:0 0 30px 30px;
    left:46px;
    top:62px;
}

/* Legs */

.leg{
    position:absolute;
    width:22px;
    height:34px;
    background:#00c92c;
    border:4px solid #0a7d20;
    border-radius:40px;
    bottom:0;
}

.leg.left{
    left:36px;
}

.leg.right{
    right:36px;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;
    width:34%;
    height:13%;
    background:#00c848;
    border:6px solid #08752c;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:clamp(22px,3vw,40px);
    font-weight:bold;
    color:white;
    box-shadow:0 8px 15px rgba(0,0,0,0.25);
    cursor:pointer;
    user-select:none;
    z-index:10;
    transition:0.2s;
}

.leaf:active{
    transform:scale(0.94);
}

.leaf::after{
    content:"";
    position:absolute;
    width:28%;
    height:10%;
    background:#08752c;
    border-radius:20px;
    right:10%;
    bottom:12%;
    transform:rotate(-20deg);
}

.left-leaf{
    left:6%;
    bottom:2%;
}

.right-leaf{
    right:6%;
    bottom:2%;
}

/* ---------------- FROG JUMP ---------------- */

.jump-left{
    left:24%;
    top:78%;
    animation:none;
}

.jump-right{
    left:76%;
    top:78%;
    animation:none;
}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(to bottom,#55e7ff,#4df0a2,#fff58c);
    overflow:hidden;
}

.final-text{
    position:absolute;
    top:12%;
    width:100%;
    text-align:center;
    font-size:clamp(42px,8vw,90px);
    font-weight:bold;
    color:white;
    text-shadow:4px 4px 8px rgba(0,0,0,0.3);
}

/* ---------------- FINAL FROGS ---------------- */

.celebrate-frog{
    position:absolute;
    width:90px;
    height:90px;
    animation:bounce 2s infinite ease-in-out;
}

.cf1{
    left:6%;
    bottom:10%;
    animation-delay:0s;
}

.cf2{
    left:26%;
    bottom:20%;
    animation-delay:0.3s;
}

.cf3{
    left:46%;
    bottom:8%;
    animation-delay:0.6s;
}

.cf4{
    left:66%;
    bottom:18%;
    animation-delay:0.9s;
}

.cf5{
    left:82%;
    bottom:10%;
    animation-delay:1.2s;
}

@keyframes bounce{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-60px);
    }

    100%{
        transform:translateY(0);
    }

}

/* ---------------- MOBILE ---------------- */

@media(max-width:768px){

    .pond{
        width:88vw;
        height:68vh;
        top:58%;
    }

    .frog{
        width:100px;
        height:100px;
    }

    .frog-body{
        width:68px;
        height:68px;
        left:16px;
        top:24px;
    }

    .eye{
        width:24px;
        height:24px;
    }

    .eye.left{
        left:18px;
    }

    .eye.right{
        right:18px;
    }

    .smile{
        left:37px;
        top:54px;
    }

    .leg{
        width:18px;
        height:28px;
    }

    .leaf{
        width:38%;
        height:12%;
        font-size:28px;
    }

}

@media(max-width:480px){

    .instruction{
        font-size:16px;
        padding-top:16px;
    }

    .pond{
        width:86vw;
        height:64vh;
        top:60%;
        border-width:12px;
    }

    .frog{
        width:92px;
        height:92px;
        top:48%;
    }

    .frog-body{
        width:62px;
        height:62px;
        left:15px;
        top:22px;
    }

    .eye{
        width:22px;
        height:22px;
        top:6px;
    }

    .pupil{
        width:7px;
        height:7px;
        top:6px;
        left:6px;
    }

    .smile{
        width:24px;
        height:12px;
        left:34px;
        top:48px;
    }

    .leg{
        width:16px;
        height:24px;
    }

    .leg.left{
        left:28px;
    }

    .leg.right{
        right:28px;
    }

    .leaf{
        width:40%;
        height:11%;
        font-size:18px;
        border-width:4px;
    }

    .jump-left{
        left:25%;
        top:82%;
    }

    .jump-right{
        left:75%;
        top:82%;
    }

    .celebrate-frog{
        width:70px;
        height:70px;
    }

}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO -->

    <div class="slide active" id="slide0">

        <img src="assets/innovine-logo.png"
        class="logo">

    </div>

    <!-- SLIDE 1 -->

    <div class="slide game-slide" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog1">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(1,true,'left')">
                this
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(1,false,'right')">
                star
            </div>

        </div>

    </div>

    <!-- SLIDE 2 -->

    <div class="slide game-slide" id="slide2">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog2">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(2,false,'left')">
                cat
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(2,true,'right')">
                you
            </div>

        </div>

    </div>

    <!-- SLIDE 3 -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog3">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(3,true,'left')">
                the
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(3,false,'right')">
                sun
            </div>

        </div>

    </div>

    <!-- SLIDE 4 -->

    <div class="slide game-slide" id="slide4">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog4">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(4,false,'left')">
                lid
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(4,true,'right')">
                she
            </div>

        </div>

    </div>

    <!-- SLIDE 5 -->

    <div class="slide game-slide" id="slide5">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog5">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(5,true,'left')">
                are
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(5,false,'right')">
                van
            </div>

        </div>

    </div>

    <!-- FINAL SLIDE -->

    <div class="slide final-slide" id="slide6">

        <div class="final-text">
            Great Job!
        </div>

        <div class="celebrate-frog cf1">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf2">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf3">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf4">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf5">
            <div class="frog-body"></div>
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

let currentSlide = 0;

/* LOGO SCREEN */

setTimeout(() => {

    nextSlide();

},3000);

/* NEXT SLIDE */

function nextSlide(){

    const current =
    document.getElementById("slide"+currentSlide);

    if(current){

        current.classList.remove("active");
        current.classList.add("previous");

    }

    currentSlide++;

    const next =
    document.getElementById("slide"+currentSlide);

    if(next){

        next.classList.add("active");

    }

}

/* ANSWER CHECK */

function checkAnswer(slideNum,isCorrect,side){

    const frog =
    document.getElementById("frog"+slideNum);

    if(isCorrect){

        frog.style.animation = "none";

        if(side === "left"){

            frog.classList.add("jump-left");

        }

        else{

            frog.classList.add("jump-right");

        }

        setTimeout(()=>{

            nextSlide();

        },1200);

    }

    else{

        document.getElementById("wrongSound").play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.9)";

        setTimeout(()=>{

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },300);

    }

}

</script>

</body>
</html>
