<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no,
viewport-fit=cover">

<title>Frog Sight Words Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#bfefff;
}

body{
    touch-action:manipulation;
}

/* ---------------- GAME ---------------- */

#game{
    width:100vw;
    height:100dvh;
    position:relative;
    overflow:hidden;
}

/* ---------------- SLIDES ---------------- */

.slide{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:100%;
    transition:0.5s ease;
}

.slide.active{
    left:0;
}

.slide.previous{
    left:-100%;
}

/* ---------------- LOGO ---------------- */

#slide0{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo{
    width:min(260px,75vw);
}

/* ---------------- GAME BG ---------------- */

.game-slide{
    background:#bfefff;
}

/* ---------------- INSTRUCTION ---------------- */

.instruction{
    position:absolute;
    top:max(10px,env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    width:95%;
    text-align:center;
    font-size:clamp(16px,2.3vw,34px);
    font-weight:bold;
    color:#000;
    z-index:20;
}

/* ---------------- POND ---------------- */

.pond{
    position:absolute;

    width:min(92vw,850px);

    aspect-ratio:1.35 / 1;

    left:50%;
    top:56%;

    transform:translate(-50%,-50%);

    background:linear-gradient(#5fd3ff,#46b9ea);

    border-radius:45%;

    border:min(1.2vw,16px) solid #84d35f;

    overflow:hidden;
}

/* ---------------- WATER EFFECT ---------------- */

.water-circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
}

.w1{
    width:26%;
    height:36%;
    left:10%;
    top:16%;
}

.w2{
    width:18%;
    height:26%;
    right:14%;
    top:34%;
}

.w3{
    width:34%;
    height:42%;
    left:34%;
    bottom:4%;
}

/* ---------------- FROG ---------------- */

.frog{
    position:absolute;
    width:15%;
    aspect-ratio:1/1;

    left:50%;
    top:48%;

    transform:translate(-50%,-50%);

    z-index:15;

    animation:frogFloat 1.6s infinite ease-in-out;

    transition:all 0.7s ease;
}

/* FLOATING */

@keyframes frogFloat{

    0%{
        transform:translate(-50%,-50%) translateY(0);
    }

    50%{
        transform:translate(-50%,-50%) translateY(-12px);
    }

    100%{
        transform:translate(-50%,-50%) translateY(0);
    }

}

/* JUMP */

@keyframes jumpAnim{

    0%{
        transform:translate(-50%,-50%) scale(1);
    }

    30%{
        transform:translate(-50%,-70%) scale(1.08);
    }

    60%{
        transform:translate(-50%,-40%) scale(0.95);
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
    }

}

/* Frog Body */

.frog-body{
    position:absolute;
    width:70%;
    height:70%;
    left:15%;
    top:24%;
    background:#00c92c;
    border-radius:50%;
    border:5px solid #0b7d21;
}

/* Eyes */

.eye{
    position:absolute;
    width:22%;
    height:22%;
    top:2%;
    background:white;
    border-radius:50%;
    border:4px solid #0b7d21;
}

.eye.left{
    left:18%;
}

.eye.right{
    right:18%;
}

.pupil{
    position:absolute;
    width:35%;
    height:35%;
    left:32%;
    top:32%;
    background:black;
    border-radius:50%;
}

/* Smile */

.smile{
    position:absolute;
    width:24%;
    height:10%;
    left:38%;
    top:48%;
    border-bottom:4px solid black;
    border-radius:0 0 40px 40px;
}

/* Legs */

.leg{
    position:absolute;
    width:14%;
    height:24%;
    bottom:0;
    background:#00c92c;
    border-radius:40px;
    border:4px solid #0b7d21;
}

.leg.left{
    left:28%;
}

.leg.right{
    right:28%;
}

/* ---------------- LEAVES ---------------- */

.leaf{
    position:absolute;

    width:24%;
    height:18%;

    background:#00c848;

    border-radius:50%;

    border:6px solid #08752c;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    font-weight:bold;

    font-size:clamp(20px,2.8vw,42px);

    box-shadow:0 8px 12px rgba(0,0,0,0.25);

    user-select:none;

    cursor:pointer;

    transition:0.2s;
}

.leaf:active{
    transform:scale(0.95);
}

.leaf::after{
    content:"";
    position:absolute;
    width:28%;
    height:10%;
    background:#08752c;
    right:10%;
    bottom:10%;
    border-radius:20px;
    transform:rotate(-20deg);
}

.left-leaf{
    left:6%;
    bottom:2%;
}

.right-leaf{
    right:6%;
    bottom:2%;
}

/* ---------------- JUMP POSITIONS ---------------- */

.jump-left{
    left:24%;
    top:76%;
}

.jump-right{
    left:76%;
    top:76%;
}

/* ---------------- FINAL SLIDE ---------------- */

.final-slide{
    background:linear-gradient(to bottom,#5cecff,#62ef9d,#fff27c);
    overflow:hidden;
}

.final-text{
    position:absolute;
    top:12%;
    width:100%;
    text-align:center;
    font-size:clamp(40px,7vw,90px);
    font-weight:bold;
    color:white;
    text-shadow:4px 4px 8px rgba(0,0,0,0.3);
}

/* ---------------- CELEBRATION FROGS ---------------- */

.celebrate-frog{
    position:absolute;
    width:90px;
    aspect-ratio:1/1;
    animation:celebrate 2s infinite ease-in-out;
}

.cf1{ left:5%; bottom:10%; animation-delay:0s; }
.cf2{ left:24%; bottom:20%; animation-delay:0.3s; }
.cf3{ left:43%; bottom:8%; animation-delay:0.6s; }
.cf4{ left:62%; bottom:18%; animation-delay:0.9s; }
.cf5{ left:81%; bottom:10%; animation-delay:1.2s; }

@keyframes celebrate{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-55px);
    }

    100%{
        transform:translateY(0);
    }

}

/* ---------------- TABLET ---------------- */

@media (max-width:900px){

    .pond{

        width:92vw;

        aspect-ratio:1.1/1;

        top:58%;
    }

    .frog{
        width:18%;
    }

    .leaf{
        width:28%;
        height:16%;
    }

}

/* ---------------- MOBILE ---------------- */

@media (max-width:600px){

    .instruction{
        font-size:15px;
        top:14px;
    }

    .pond{

        width:94vw;

        aspect-ratio:1.15/1;

        top:60%;

        border-width:10px;
    }

    .frog{
        width:22%;
    }

    .frog-body{
        border-width:4px;
    }

    .eye{
        border-width:3px;
    }

    .leg{
        border-width:3px;
    }

    .leaf{

        width:34%;

        height:14%;

        font-size:clamp(16px,4vw,24px);

        border-width:4px;
    }

    .jump-left{
        left:26%;
        top:76%;
    }

    .jump-right{
        left:74%;
        top:76%;
    }

    .celebrate-frog{
        width:65px;
    }

}

/* ---------------- OLD SMALL PHONES ---------------- */

@media (max-width:390px){

    .pond{

        width:95vw;

        aspect-ratio:1.08/1;

        top:61%;
    }

    .frog{
        width:24%;
    }

    .leaf{

        width:36%;
        height:13%;

        font-size:16px;
    }

}

</style>
</head>

<body>

<div id="game">

    <!-- LOGO -->

    <div class="slide active" id="slide0">

        <img src="assets/innovine-logo.png"
        class="logo">

    </div>

    <!-- SLIDE 1 -->

    <div class="slide game-slide" id="slide1">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog1">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(1,true,'left')">
                this
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(1,false,'right')">
                star
            </div>

        </div>

    </div>

    <!-- SLIDE 2 -->

    <div class="slide game-slide" id="slide2">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog2">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(2,false,'left')">
                cat
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(2,true,'right')">
                you
            </div>

        </div>

    </div>

    <!-- SLIDE 3 -->

    <div class="slide game-slide" id="slide3">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog3">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(3,true,'left')">
                the
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(3,false,'right')">
                sun
            </div>

        </div>

    </div>

    <!-- SLIDE 4 -->

    <div class="slide game-slide" id="slide4">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog4">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(4,false,'left')">
                lid
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(4,true,'right')">
                she
            </div>

        </div>

    </div>

    <!-- SLIDE 5 -->

    <div class="slide game-slide" id="slide5">

        <div class="instruction">
            Help the frog to identify the sight words
        </div>

        <div class="pond">

            <div class="water-circle w1"></div>
            <div class="water-circle w2"></div>
            <div class="water-circle w3"></div>

            <div class="frog" id="frog5">

                <div class="frog-body"></div>

                <div class="eye left">
                    <div class="pupil"></div>
                </div>

                <div class="eye right">
                    <div class="pupil"></div>
                </div>

                <div class="smile"></div>

                <div class="leg left"></div>
                <div class="leg right"></div>

            </div>

            <div class="leaf left-leaf"
            onclick="checkAnswer(5,true,'left')">
                are
            </div>

            <div class="leaf right-leaf"
            onclick="checkAnswer(5,false,'right')">
                van
            </div>

        </div>

    </div>

    <!-- FINAL -->

    <div class="slide final-slide" id="slide6">

        <div class="final-text">
            Great Job!
        </div>

        <div class="celebrate-frog cf1">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf2">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf3">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf4">
            <div class="frog-body"></div>
        </div>

        <div class="celebrate-frog cf5">
            <div class="frog-body"></div>
        </div>

    </div>

</div>

<!-- AUDIO -->

<audio id="wrongSound"
src="assets/wrong.mp3"></audio>

<script>

let currentSlide = 0;

/* LOGO SCREEN */

setTimeout(()=>{

    nextSlide();

},3000);

/* NEXT SLIDE */

function nextSlide(){

    const current =
    document.getElementById(
    "slide"+currentSlide
    );

    if(current){

        current.classList.remove("active");
        current.classList.add("previous");

    }

    currentSlide++;

    const next =
    document.getElementById(
    "slide"+currentSlide
    );

    if(next){

        next.classList.add("active");

    }

}

/* CHECK ANSWER */

function checkAnswer(
slideNum,
isCorrect,
side
){

    const frog =
    document.getElementById(
    "frog"+slideNum
    );

    if(isCorrect){

        frog.style.animation =
        "jumpAnim 0.7s ease 2";

        if(side === "left"){

            frog.classList.add(
            "jump-left"
            );

        }

        else{

            frog.classList.add(
            "jump-right"
            );

        }

        setTimeout(()=>{

            nextSlide();

        },1200);

    }

    else{

        document.getElementById(
        "wrongSound"
        ).play();

        frog.style.transform =
        "translate(-50%,-50%) scale(0.9)";

        setTimeout(()=>{

            frog.style.transform =
            "translate(-50%,-50%) scale(1)";

        },300);

    }

}

</script>

</body>
</html>
