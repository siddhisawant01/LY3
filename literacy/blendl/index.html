<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pop the Correct Blend - L Blend</title>
 
<style>
 
*{
    box-sizing:border-box;
    user-select:none;
}
 
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Comic Sans MS", "Arial Rounded MT Bold", sans-serif;
    background:#ffffff;
}
 
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
}
 
.active{
    display:flex;
}
 
 
/* LOGO */
 
#logoScreen{
    background:white;
}
 
.logo{
    width:250px;
    max-width:60%;
}
 
 
/* GAME */
 
#gameScreen{
    background:linear-gradient(#fff8e7,#e7f7ff);
    flex-direction:column;
    padding:10px;
}
 
 
.instruction{
    font-size:clamp(18px,3vw,28px);
    color:#444;
    margin-bottom:5px;
}
 
 
.gameBox{
    width:95%;
    height:90%;
    background:white;
    border-radius:35px;
    box-shadow:0 5px 20px #ccc;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-around;
    padding:15px;
}
 
 
.questionNo{
    font-size:20px;
    color:#777;
}
 
 
.pictureBox{
    width:230px;
    height:180px;
    border-radius:30px;
    border:8px solid #ffd166;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
}
 
 
.pictureBox img{
    max-width:90%;
    max-height:90%;
}
 
 
.options{
    width:90%;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}
 
 
.bubble{
 
    width:90px;
    height:90px;
 
    border-radius:50%;
 
    display:flex;
    align-items:center;
    justify-content:center;
 
    font-size:35px;
    font-weight:bold;
 
    color:white;
 
    background:#7cc6fe;
 
    border:5px solid white;
 
    box-shadow:0 5px 10px #aaa;
 
    cursor:pointer;
 
}
 
 
.bubble:nth-child(2){
    background:#ff9f9f;
}
 
 
.bubble:nth-child(3){
    background:#8dd17e;
}
 
 
.bubble:hover{
    transform:scale(1.05);
}
 
 
.jiggle{
 
animation:jiggle .3s;
 
}
 
 
@keyframes jiggle{
 
25%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
75%{transform:translateX(-10px);}
100%{transform:translateX(0);}
 
}
 
 
.feedback{
 
font-size:30px;
height:40px;
color:#2ca25f;
 
}
 
 
.word{
 
font-size:35px;
font-weight:bold;
color:#ff8c42;
 
}
 
 
/* END */
 
#endScreen{
 
background:linear-gradient(#fff1b8,#ffd6e0);
 
flex-direction:column;
 
}
 
 
.endTitle{
 
font-size:45px;
color:#ff7b00;
 
}
 
 
.score{
 
font-size:28px;
 
}
 
 
.play{
 
margin-top:20px;
 
padding:18px 45px;
 
border:none;
 
border-radius:40px;
 
background:#55b77b;
 
color:white;
 
font-size:28px;
 
font-weight:bold;
 
}
 
 
/* CONFETTI */
 
.confetti{
 
position:absolute;
 
width:12px;
height:20px;
 
animation:fall 3s linear infinite;
 
}
 
 
@keyframes fall{
 
0%{
top:-20px;
}
 
100%{
top:100%;
transform:rotate(360deg);
}
 
}
 
 
@media(max-width:600px){
 
.pictureBox{
 
width:180px;
height:150px;
 
}
 
 
.bubble{
 
width:75px;
height:75px;
 
font-size:28px;
 
}
 
.word{
 
font-size:28px;
 
}
 
}
 
</style>
 
</head>
 
 
<body>
 
 
<!-- LOGO -->
 
<div id="logoScreen" class="screen active">
 
<img src="assets/innovine-logo.png" class="logo">
 
</div>
 
 
<!-- GAME -->
 
<div id="gameScreen" class="screen">
 
 
<div class="gameBox">
 
 
<div class="instruction">
Pop the correct blend bubble!
</div>
 
 
<div class="questionNo" id="questionNo"></div>
 
 
<div class="pictureBox">
 
<img id="picture">
 
</div>
 
 
<div class="feedback" id="feedback"></div>
 
 
<div class="word" id="word"></div>
 
 
<div class="options" id="options"></div>
 
 
</div>
 
 
</div>
 
 
 
<!-- END -->
 
<div id="endScreen" class="screen">
 
 
<div class="endTitle">
🎉 Good Job! 🎉
</div>
 
 
<div class="score" id="score"></div>
 
 
<button class="play" onclick="restartGame()">
Play Again
</button>
 
 
</div>
 
 
<audio id="clap" src="assets/claps.mp3"></audio>
 
<audio id="wrong" src="assets/wrong.mp3"></audio>
 
 
<script>
 
 
let questions=[
 
 
{
img:"flower.png",
answer:"fl",
word:"fl + ower = flower",
options:["fl","pl","cl"]
},
 
 
{
img:"clock.png",
answer:"cl",
word:"cl + ock = clock",
options:["gl","cl","sl"]
},
 
 
{
img:"blue.png",
answer:"bl",
word:"bl + ue = blue",
options:["bl","fl","pl"]
},
 
 
{
img:"block.png",
answer:"bl",
word:"bl + ock = block",
options:["cl","bl","gl"]
},
 
 
{
img:"clap.png",
answer:"cl",
word:"cl + ap = clap",
options:["sl","cl","fl"]
},
 
 
{
img:"flag.png",
answer:"fl",
word:"fl + ag = flag",
options:["fl","pl","gl"]
},
 
 
{
img:"glass.png",
answer:"gl",
word:"gl + ass = glass",
options:["gl","cl","bl"]
},
 
 
{
img:"glove.png",
answer:"gl",
word:"gl + ove = glove",
options:["pl","gl","sl"]
},
 
 
{
img:"plum.png",
answer:"pl",
word:"pl + um = plum",
options:["fl","pl","cl"]
},
 
 
{
img:"plate.png",
answer:"pl",
word:"pl + ate = plate",
options:["pl","sl","bl"]
},
 
 
{
img:"slide.png",
answer:"sl",
word:"sl + ide = slide",
options:["cl","sl","gl"]
},
 
 
{
img:"sleep.png",
answer:"sl",
word:"sl + eep = sleep",
options:["sl","fl","pl"]
}
 
];
 
 
let current=0;
 
let score=0;
 
let attempts=0;
 
let quiz=[];
 
 
setTimeout(()=>{
 
showScreen("gameScreen");
 
startGame();
 
},2000);
 
 
 
function showScreen(id){
 
document.querySelectorAll(".screen")
.forEach(x=>x.classList.remove("active"));
 
document.getElementById(id)
.classList.add("active");
 
}
 
 
 
function startGame(){
 
quiz=[...questions]
.sort(()=>Math.random()-0.5);
 
current=0;
score=0;
 
loadQuestion();
 
}
 
 
 
function loadQuestion(){
 
 
attempts=0;
 
 
let q=quiz[current];
 
 
questionNo.innerHTML=
"Question "+(current+1)+" / "+quiz.length;
 
 
picture.src="assets/"+q.img;
 
 
feedback.innerHTML="";
 
word.innerHTML="";
 
 
options.innerHTML="";
 
 
let shuffled=[...q.options]
.sort(()=>Math.random()-0.5);
 
 
shuffled.forEach(opt=>{
 
 
let b=document.createElement("div");
 
b.className="bubble";
 
b.innerHTML=opt;
 
 
b.onclick=()=>checkAnswer(opt,b);
 
 
options.appendChild(b);
 
 
});
 
 
}
 
 
 
function checkAnswer(ans,button){
 
 
let q=quiz[current];
 
 
if(ans==q.answer){
 
 
score++;
 
 
feedback.innerHTML="✅ Great Job!";
 
 
word.innerHTML=q.word;
 
 
document.getElementById("clap").play();
 
 
setTimeout(()=>{
 
 
nextQuestion();
 
 
},1500);
 
 
}
 
 
else{
 
 
attempts++;
 
 
document.getElementById("wrong").play();
 
 
button.classList.add("jiggle");
 
 
setTimeout(()=>{
 
button.classList.remove("jiggle");
 
},400);
 
 
if(attempts>=2){
 
 
document.querySelectorAll(".bubble")
.forEach(b=>{
 
if(b.innerHTML==q.answer){
 
b.style.boxShadow=
"0 0 25px 10px #55b77b";
 
}
 
});
 
 
}
 
}
 
 
}
 
 
function nextQuestion(){
 
 
current++;
 
 
if(current>=quiz.length){
 
endGame();
 
}
 
else{
 
loadQuestion();
 
}
 
 
}
 
 
 
function endGame(){
 
 
showScreen("endScreen");
 
 
scoreBox=document.getElementById("score");
 
 
scoreBox.innerHTML=
"You scored "+score+" / "+quiz.length;
 
 
createConfetti();
 
 
}
 
 
function createConfetti(){
 
 
for(let i=0;i<80;i++){
 
 
let c=document.createElement("div");
 
c.className="confetti";
 
 
c.style.left=Math.random()*100+"%";
 
c.style.background=
"hsl("+Math.random()*360+",80%,60%)";
 
 
c.style.animationDelay=
Math.random()*2+"s";
 
 
document.body.appendChild(c);
 
 
}
 
 
}
 
 
function restartGame(){
 
 
document.querySelectorAll(".confetti")
.forEach(c=>c.remove());
 
 
showScreen("gameScreen");
 
startGame();
 
 
}
 
 
</script>
 
 
</body>
</html>
