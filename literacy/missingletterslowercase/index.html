<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Missing Letters Game</title>

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#fff;
    touch-action:manipulation;
}

/* =========================================
   SLIDES
========================================= */

.slide{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:0.6s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
    transform:scale(1.05);
}

.show{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
}

/* =========================================
   SLIDE 1
========================================= */

#slide1{
    background:white;
}

.logo{
    width:min(60vw,320px);
    object-fit:contain;
}

/* =========================================
   SLIDE 2
========================================= */

#slide2{

    background:
    linear-gradient(rgba(255,255,255,0.82),
    rgba(255,255,255,0.82)),
    url("assets/background1.png");

    background-size:cover;
    background-position:center;

    padding:8px;
}

/* GAME WRAPPER */

.game-wrapper{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    align-items:center;
}

/* TITLE */

.game-title{

    font-size:clamp(24px,4vw,42px);

    font-weight:bold;

    color:#ff3366;

    text-align:center;
}

/* LETTER PATH */

.letters-path{

    width:95%;
    max-width:1000px;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:10px;

    padding:10px;
}

/* LETTER CIRCLE */

.circle{

    width:min(11vw,70px);
    height:min(11vw,70px);

    min-width:45px;
    min-height:45px;

    border-radius:50%;

    background:white;

    border:3px solid #5c4033;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:clamp(22px,4vw,36px);

    font-weight:bold;

    color:#111;

    box-shadow:0 4px 8px rgba(0,0,0,0.15);

    transition:0.2s;
}

/* BLANK */

.blank{

    background:#fff7cc;

    border:3px dashed #ff006e;

    color:#ff006e;

    cursor:pointer;
}

/* RANDOM POSITION STYLES */

.up{
    transform:translateY(-18px);
}

.down{
    transform:translateY(18px);
}

.left{
    transform:translateX(-10px);
}

.right{
    transform:translateX(10px);
}

/* FEEDBACK */

.feedback{

    height:40px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:42px;
}

/* HELP BOX */

.options-box{

    width:94%;
    max-width:1000px;

    min-height:120px;

    background:rgba(255,255,255,0.95);

    border-radius:28px;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:12px;

    padding:14px;

    box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

/* OPTION BUTTON */

.option{

    width:min(11vw,68px);
    height:min(11vw,68px);

    min-width:46px;
    min-height:46px;

    border:none;
    border-radius:18px;

    color:white;

    font-size:clamp(22px,4vw,34px);

    font-weight:bold;

    cursor:pointer;

    transition:0.2s;

    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.option:active{
    transform:scale(0.92);
}

.selected{
    outline:4px solid #111;
}

/* COLORS */

.c1{background:#ff006e;}
.c2{background:#8338ec;}
.c3{background:#3a86ff;}
.c4{background:#06d6a0;}
.c5{background:#ffbe0b;}
.c6{background:#fb5607;}

/* =========================================
   SLIDE 3
========================================= */

#slide3{

    overflow:hidden;

    background:
    linear-gradient(rgba(255,255,255,0.15),
    rgba(255,255,255,0.15)),
    url("assets/background2.png");

    background-size:cover;
    background-position:center;
}

/* AMAZING */

.amazing{

    font-size:clamp(42px,8vw,90px);

    font-weight:bold;

    color:#ff006e;

    text-shadow:
    3px 3px white,
    6px 6px 10px rgba(0,0,0,0.2);

    z-index:5;

    animation:bounce 1s infinite alternate;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-12px);
    }
}

/* RAIN LETTERS */

.rain-letter{

    position:absolute;

    top:-60px;

    font-size:clamp(24px,5vw,52px);

    font-weight:bold;

    animation:fall linear forwards;

    user-select:none;
}

@keyframes fall{

    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:700px){

    .letters-path{
        gap:6px;
    }

    .options-box{
        gap:8px;
        padding:10px;
    }

    .game-title{
        font-size:24px;
    }
}

</style>
</head>

<body>

<!-- =========================================
     AUDIO
========================================= -->

<audio id="correctSound" src="assets/correct.mp3"></audio>

<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- =========================================
     SLIDE 1
========================================= -->

<section id="slide1" class="slide show">

    <img
    src="assets/logo.png"
    class="logo"
    alt="Innovine Logo">

</section>

<!-- =========================================
     SLIDE 2
========================================= -->

<section id="slide2" class="slide hidden">

    <div class="game-wrapper">

        <div class="game-title">
            Identify the missing letters
        </div>

        <!-- LETTERS -->
        <div class="letters-path" id="lettersPath"></div>

        <!-- FEEDBACK -->
        <div class="feedback" id="feedback"></div>

        <!-- OPTIONS -->
        <div class="options-box" id="optionsBox"></div>

    </div>

</section>

<!-- =========================================
     SLIDE 3
========================================= -->

<section id="slide3" class="slide hidden">

    <div class="amazing">
        Amazing!
    </div>

</section>

<script>

/* =========================================
   SLIDES
========================================= */

const slide1 =
document.getElementById("slide1");

const slide2 =
document.getElementById("slide2");

const slide3 =
document.getElementById("slide3");

setTimeout(()=>{

    slide1.classList.remove("show");
    slide1.classList.add("hidden");

    slide2.classList.remove("hidden");
    slide2.classList.add("show");

},3000);

/* =========================================
   LETTER DESIGN
========================================= */

/*
VISIBLE LETTERS:
a d k i p s v

ALL OTHER LETTERS IN HELP BOX
*/

const gameData = [

    {show:"a"},
    {show:"?",missing:true,answer:"b"},
    {show:"?",missing:true,answer:"c"},

    {show:"d"},
    {show:"?",missing:true,answer:"e"},
    {show:"?",missing:true,answer:"f"},
    {show:"?",missing:true,answer:"g"},
    {show:"?",missing:true,answer:"h"},

    {show:"i"},
    {show:"?",missing:true,answer:"j"},

    {show:"k"},
    {show:"?",missing:true,answer:"l"},
    {show:"?",missing:true,answer:"m"},
    {show:"?",missing:true,answer:"n"},
    {show:"?",missing:true,answer:"o"},

    {show:"p"},
    {show:"?",missing:true,answer:"q"},
    {show:"?",missing:true,answer:"r"},

    {show:"s"},
    {show:"?",missing:true,answer:"t"},
    {show:"?",missing:true,answer:"u"},

    {show:"v"},
    {show:"?",missing:true,answer:"w"},
    {show:"?",missing:true,answer:"x"},
    {show:"?",missing:true,answer:"y"},
    {show:"?",missing:true,answer:"z"}

];

/* =========================================
   HELP BOX LETTERS
========================================= */

const helpLetters = [

    "b","c","e","f","g",
    "h","j","l","m","n",
    "o","q","r","t","u",
    "w","x","y","z"
];

let selectedLetter = null;

/* =========================================
   RANDOM SHAPES
========================================= */

const randomShapes = [
    "up",
    "down",
    "left",
    "right",
    ""
];

/* =========================================
   ELEMENTS
========================================= */

const lettersPath =
document.getElementById("lettersPath");

const optionsBox =
document.getElementById("optionsBox");

const feedback =
document.getElementById("feedback");

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

/* =========================================
   CREATE LETTERS
========================================= */

gameData.forEach(item=>{

    const div =
    document.createElement("div");

    div.classList.add("circle");

    /* RANDOM POSITION */

    const randomClass =
    randomShapes[
    Math.floor(
    Math.random()*randomShapes.length
    )];

    div.classList.add(randomClass);

    div.innerHTML = item.show;

    if(item.missing){

        div.classList.add("blank");

        div.addEventListener("click",()=>{

            if(!selectedLetter) return;

            if(selectedLetter === item.answer){

                div.innerHTML = selectedLetter;

                div.style.background = "#d8ffd8";

                div.style.border =
                "3px solid green";

                feedback.innerHTML = "✅";

                playCorrect();

                /* REMOVE LETTER FROM HELP BOX */

                const selectedBtn =
                document.querySelector(
                `.option[data-letter="${selectedLetter}"]`
                );

                if(selectedBtn){
                    selectedBtn.remove();
                }

                selectedLetter = null;

                checkComplete();

            }else{

                feedback.innerHTML = "❌";

                playWrong();

                setTimeout(()=>{
                    feedback.innerHTML = "";
                },1000);
            }
        });
    }

    lettersPath.appendChild(div);
});

/* =========================================
   CREATE OPTIONS
========================================= */

helpLetters.forEach((letter,index)=>{

    const btn =
    document.createElement("button");

    btn.className =
    "option c"+((index%6)+1);

    btn.innerHTML = letter;

    btn.dataset.letter = letter;

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".option")
        .forEach(b=>{
            b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedLetter = letter;
    });

    optionsBox.appendChild(btn);
});

/* =========================================
   AUDIO
========================================= */

function playCorrect(){

    correctSound.currentTime = 0;

    correctSound.play().catch(()=>{});
}

function playWrong(){

    wrongSound.currentTime = 0;

    wrongSound.play().catch(()=>{});
}

/* =========================================
   CHECK COMPLETE
========================================= */

function checkComplete(){

    const blanks =
    document.querySelectorAll(".blank");

    let done = true;

    blanks.forEach(box=>{

        if(box.innerHTML === "?"){
            done = false;
        }
    });

    if(done){

        setTimeout(()=>{

            slide2.classList.remove("show");
            slide2.classList.add("hidden");

            slide3.classList.remove("hidden");
            slide3.classList.add("show");

            startLetterRain();

        },1200);
    }
}

/* =========================================
   LETTER RAIN
========================================= */

function startLetterRain(){

    const letters =
    "abcdefghijklmnopqrstuvwxyz";

    setInterval(()=>{

        const span =
        document.createElement("span");

        span.className =
        "rain-letter";

        span.innerHTML =
        letters[
        Math.floor(Math.random()*26)
        ];

        span.style.left =
        Math.random()*100 + "vw";

        span.style.color =
        randomColor();

        span.style.animationDuration =
        (3 + Math.random()*3) + "s";

        slide3.appendChild(span);

        setTimeout(()=>{
            span.remove();
        },7000);

    },180);
}

/* =========================================
   RANDOM COLORS
========================================= */

function randomColor(){

    const colors = [

        "#ff006e",
        "#8338ec",
        "#3a86ff",
        "#06d6a0",
        "#ffbe0b",
        "#fb5607"
    ];

    return colors[
    Math.floor(Math.random()*colors.length)
    ];
}

</script>

</body>
</html>
