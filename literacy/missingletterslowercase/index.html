<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Missing Letters Game</title>

<style>

/* =========================================
RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#fff;
}

/* =========================================
SLIDES
========================================= */

.slide{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:.6s;
}

.hidden{
    opacity:0;
    pointer-events:none;
    transform:scale(1.05);
}

.show{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
}

/* =========================================
SLIDE 1
========================================= */

#slide1{
    background:white;
}

.logo{
    width:min(70vw,380px);
    max-width:380px;
    object-fit:contain;
}

/* =========================================
SLIDE 2
========================================= */

#slide2{

    background:
    linear-gradient(rgba(255,255,255,.92),
    rgba(255,255,255,.92)),
    url("assets/background1.png");

    background-size:cover;
    background-position:center;
}

.game-title{

    margin-top:10px;

    font-size:clamp(22px,4vw,42px);

    color:#ff006e;

    font-weight:bold;

    text-align:center;
}

/* MAIN */

.game-wrapper{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:space-evenly;
    align-items:center;

    padding:10px;
}

/* TABLE */

.table-area{

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* GRID */

.grid{

    display:grid;

    grid-template-columns:repeat(4,70px);

    grid-template-rows:repeat(6,70px);

    gap:4px;
}

/* LAST SMALL ROW */

.bottom-row{

    display:grid;

    grid-template-columns:repeat(2,70px);

    gap:4px;

    margin-top:4px;
}

/* CELL */

.cell{

    width:70px;
    height:70px;

    border-radius:16px;

    background:white;

    border:3px solid #ffb703;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:46px;
    font-weight:bold;

    color:#111;

    box-shadow:0 4px 10px rgba(0,0,0,.15);
}

/* FILLED LETTER */

.fixed{
    background:#ffffff;
}

/* EMPTY */

.blank{

    background:#fff7cc;

    border:3px dashed #ff006e;

    color:#ff006e;

    cursor:pointer;
}

/* HELP BOX */

.help-box{

    width:min(95vw,1000px);

    background:white;

    border-radius:25px;

    padding:12px;

    box-shadow:0 4px 15px rgba(0,0,0,.15);

    display:flex;
    flex-wrap:wrap;

    justify-content:center;

    gap:10px;
}

/* OPTIONS */

.option{

    width:55px;
    height:55px;

    border:none;
    border-radius:14px;

    color:white;

    font-size:30px;
    font-weight:bold;

    cursor:pointer;

    box-shadow:0 4px 10px rgba(0,0,0,.2);

    transition:.2s;
}

.option:active{
    transform:scale(.92);
}

.selected{
    outline:4px solid #111;
}

/* COLORS */

.c1{background:#ff006e;}
.c2{background:#8338ec;}
.c3{background:#3a86ff;}
.c4{background:#06d6a0;}
.c5{background:#ffbe0b;}
.c6{background:#fb5607;}

/* FEEDBACK */

.feedback{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:90px;

    z-index:100;

    pointer-events:none;
}

/* =========================================
SLIDE 3
========================================= */

#slide3{

    overflow:hidden;

    background:
    linear-gradient(rgba(255,255,255,.2),
    rgba(255,255,255,.2)),
    url("assets/background2.png");

    background-size:cover;
    background-position:center;
}

/* AMAZING */

.amazing{

    font-size:clamp(45px,9vw,110px);

    color:#ff006e;

    font-weight:bold;

    text-shadow:
    3px 3px white,
    6px 6px 15px rgba(0,0,0,.25);

    z-index:10;

    animation:bounce 1s infinite alternate;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-12px);
    }
}

/* RAIN */

.rain-letter{

    position:absolute;

    top:-60px;

    font-size:clamp(24px,5vw,60px);

    font-weight:bold;

    animation:fall linear forwards;
}

@keyframes fall{

    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* =========================================
MOBILE
========================================= */

@media(max-width:700px){

    .grid{
        grid-template-columns:repeat(4,52px);
        grid-template-rows:repeat(6,52px);
    }

    .bottom-row{
        grid-template-columns:repeat(2,52px);
    }

    .cell{
        width:52px;
        height:52px;
        font-size:34px;
        border-radius:12px;
    }

    .option{
        width:44px;
        height:44px;
        font-size:24px;
    }

    .help-box{
        gap:7px;
        padding:10px;
    }

    .feedback{
        font-size:70px;
    }
}

</style>
</head>

<body>

<!-- AUDIO -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- =========================================
SLIDE 1
========================================= -->

<section id="slide1" class="slide show">

    <!-- IMPORTANT -->
    <!-- KEEP THIS EXACT FILE NAME -->
    <img
    src="./assets/logo.png"
    class="logo"
    alt="Innovine Logo">

</section>

<!-- =========================================
SLIDE 2
========================================= -->

<section id="slide2" class="slide hidden">

    <div class="game-wrapper">

        <div class="game-title">
            Identify the missing letters
        </div>

        <!-- TABLE -->

        <div class="table-area">

            <div class="grid" id="grid"></div>

            <div class="bottom-row" id="bottomRow"></div>

        </div>

        <!-- HELP BOX -->

        <div class="help-box" id="helpBox"></div>

    </div>

    <!-- FEEDBACK -->

    <div class="feedback" id="feedback"></div>

</section>

<!-- =========================================
SLIDE 3
========================================= -->

<section id="slide3" class="slide hidden">

    <div class="amazing">
        Amazing!
    </div>

</section>

<script>

/* =========================================
SLIDES
========================================= */

const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");
const slide3 = document.getElementById("slide3");

setTimeout(()=>{

    slide1.classList.remove("show");
    slide1.classList.add("hidden");

    slide2.classList.remove("hidden");
    slide2.classList.add("show");

},3000);

/* =========================================
GAME DATA
========================================= */

/*
VISIBLE LETTERS:
a d k i p s v y
*/

const gridData = [

    ["a","","","d"],
    ["","","","h"],
    ["i","","k",""],
    ["","","","p"],
    ["","","",""],
    ["","v","w",""],

];

/* BOTTOM */

const bottomData = ["y",""];

/* ANSWERS */

const answers = {

    "0-1":"b",
    "0-2":"c",

    "1-0":"e",
    "1-1":"f",
    "1-2":"g",

    "2-1":"j",
    "2-3":"l",

    "3-0":"m",
    "3-1":"n",
    "3-2":"o",

    "4-0":"q",
    "4-1":"r",
    "4-2":"s",
    "4-3":"t",

    "5-0":"u",
    "5-3":"x",

    "bottom-1":"z"
};

/* HELP LETTERS */

const helpLetters = [

"b","c","e","f","g","j","l",
"m","n","o","q","r","s",
"t","u","x","z"

];

/* =========================================
ELEMENTS
========================================= */

const grid = document.getElementById("grid");
const bottomRow = document.getElementById("bottomRow");
const helpBox = document.getElementById("helpBox");

const feedback = document.getElementById("feedback");

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

let selectedLetter = null;
let selectedButton = null;

/* =========================================
CREATE GRID
========================================= */

gridData.forEach((row,rowIndex)=>{

    row.forEach((item,colIndex)=>{

        const cell =
        document.createElement("div");

        cell.classList.add("cell");

        if(item === ""){

            cell.classList.add("blank");
            cell.innerHTML="?";

            cell.addEventListener("click",()=>{

                if(!selectedLetter) return;

                const key =
                rowIndex + "-" + colIndex;

                if(selectedLetter === answers[key]){

                    cell.innerHTML =
                    selectedLetter;

                    cell.style.background =
                    "#d8ffd8";

                    cell.style.border =
                    "3px solid green";

                    selectedButton.remove();

                    selectedLetter = null;
                    selectedButton = null;

                    playCorrect();

                    feedback.innerHTML = "✅";

                    setTimeout(()=>{
                        feedback.innerHTML="";
                    },700);

                    checkComplete();

                }else{

                    playWrong();

                    feedback.innerHTML = "❌";

                    setTimeout(()=>{
                        feedback.innerHTML="";
                    },700);
                }
            });

        }else{

            cell.classList.add("fixed");
            cell.innerHTML = item;
        }

        grid.appendChild(cell);

    });

});

/* =========================================
BOTTOM ROW
========================================= */

bottomData.forEach((item,index)=>{

    const cell =
    document.createElement("div");

    cell.classList.add("cell");

    if(item === ""){

        cell.classList.add("blank");

        cell.innerHTML="?";

        cell.addEventListener("click",()=>{

            if(!selectedLetter) return;

            if(selectedLetter === "z"){

                cell.innerHTML = "z";

                cell.style.background =
                "#d8ffd8";

                cell.style.border =
                "3px solid green";

                selectedButton.remove();

                selectedLetter = null;
                selectedButton = null;

                playCorrect();

                feedback.innerHTML = "✅";

                setTimeout(()=>{
                    feedback.innerHTML="";
                },700);

                checkComplete();

            }else{

                playWrong();

                feedback.innerHTML = "❌";

                setTimeout(()=>{
                    feedback.innerHTML="";
                },700);
            }
        });

    }else{

        cell.classList.add("fixed");
        cell.innerHTML=item;
    }

    bottomRow.appendChild(cell);

});

/* =========================================
HELP BOX
========================================= */

helpLetters.forEach((letter,index)=>{

    const btn =
    document.createElement("button");

    btn.className =
    "option c"+((index%6)+1);

    btn.innerHTML = letter;

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".option")
        .forEach(b=>{
            b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedLetter = letter;
        selectedButton = btn;
    });

    helpBox.appendChild(btn);

});

/* =========================================
SOUNDS
========================================= */

function playCorrect(){

    correctSound.currentTime = 0;

    correctSound.play().catch(()=>{});
}

function playWrong(){

    wrongSound.currentTime = 0;

    wrongSound.play().catch(()=>{});
}

/* =========================================
CHECK COMPLETE
========================================= */

function checkComplete(){

    const remaining =
    document.querySelectorAll(".blank");

    let complete = true;

    remaining.forEach(box=>{

        if(box.innerHTML === "?"){
            complete = false;
        }
    });

    if(complete){

        setTimeout(()=>{

            slide2.classList.remove("show");
            slide2.classList.add("hidden");

            slide3.classList.remove("hidden");
            slide3.classList.add("show");

            startRain();

        },1200);
    }
}

/* =========================================
LETTER RAIN
========================================= */

function startRain(){

    const letters =
    "abcdefghijklmnopqrstuvwxyz";

    setInterval(()=>{

        const span =
        document.createElement("span");

        span.className =
        "rain-letter";

        span.innerHTML =
        letters[Math.floor(Math.random()*26)];

        span.style.left =
        Math.random()*100 + "vw";

        span.style.color =
        randomColor();

        span.style.animationDuration =
        (3 + Math.random()*3) + "s";

        slide3.appendChild(span);

        setTimeout(()=>{
            span.remove();
        },7000);

    },150);
}

/* =========================================
RANDOM COLORS
========================================= */

function randomColor(){

    const colors = [

        "#ff006e",
        "#8338ec",
        "#3a86ff",
        "#06d6a0",
        "#ffbe0b",
        "#fb5607"
    ];

    return colors[
    Math.floor(Math.random()*colors.length)
    ];
}

</script>

</body>
</html>
