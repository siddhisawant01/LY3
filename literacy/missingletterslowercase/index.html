<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Missing Letters Game</title>

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#fff;
}

/* =========================================
   COMMON SLIDES
========================================= */

.slide{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:0.6s;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

.show{
    opacity:1;
    pointer-events:auto;
}

/* =========================================
   SLIDE 1
========================================= */

#slide1{
    background:white;
}

.logo{
    width:min(70vw,350px);
    object-fit:contain;
}

/* =========================================
   SLIDE 2
========================================= */

#slide2{

    background:
    linear-gradient(rgba(255,255,255,0.82),
    rgba(255,255,255,0.82)),
    url("assets/background1.png");

    background-size:cover;
    background-position:center;

    padding:10px;
}

.game-title{

    font-size:clamp(24px,4vw,42px);

    color:#ff006e;

    font-weight:bold;

    margin-bottom:10px;

    text-align:center;
}

/* GAME AREA */

.game-area{

    width:100%;
    max-width:900px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

/* TABLE */

.game-table{

    border-collapse:collapse;

    background:white;

    border-radius:18px;

    overflow:hidden;

    box-shadow:0 6px 18px rgba(0,0,0,0.2);
}

.game-table td{

    width:min(12vw,70px);
    height:min(12vw,70px);

    min-width:48px;
    min-height:48px;

    border:3px solid #ffb703;

    text-align:center;

    vertical-align:middle;

    font-size:clamp(24px,4vw,40px);

    font-weight:bold;

    color:#111;

    background:#fffdf5;
}

/* FILLED LETTERS */

.filled{
    background:#d8f3ff;
}

/* EMPTY BOX */

.blank{

    background:#fff4c7;

    border:3px dashed #ff006e !important;

    color:#ff006e;

    cursor:pointer;
}

/* HELP BOX */

.help-box{

    width:100%;

    max-width:900px;

    min-height:120px;

    background:rgba(255,255,255,0.92);

    border-radius:22px;

    padding:12px;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    align-items:center;

    gap:10px;

    box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

/* OPTIONS */

.option{

    width:min(11vw,65px);
    height:min(11vw,65px);

    min-width:48px;
    min-height:48px;

    border:none;

    border-radius:14px;

    color:white;

    font-size:clamp(20px,4vw,34px);

    font-weight:bold;

    cursor:pointer;

    transition:0.2s;

    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.option:active{
    transform:scale(0.9);
}

.selected{
    outline:4px solid #111;
}

/* COLORS */

.c1{background:#ff006e;}
.c2{background:#8338ec;}
.c3{background:#3a86ff;}
.c4{background:#06d6a0;}
.c5{background:#ffbe0b;}
.c6{background:#fb5607;}

/* FEEDBACK */

.feedback{

    height:45px;

    font-size:45px;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* =========================================
   SLIDE 3
========================================= */

#slide3{

    overflow:hidden;

    background:
    linear-gradient(rgba(255,255,255,0.15),
    rgba(255,255,255,0.15)),
    url("assets/background2.png");

    background-size:cover;
    background-position:center;
}

/* AMAZING */

.amazing{

    font-size:clamp(45px,8vw,95px);

    font-weight:bold;

    color:#ff006e;

    z-index:5;

    text-shadow:
    3px 3px white,
    6px 6px 12px rgba(0,0,0,0.2);

    animation:bounce 1s infinite alternate;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-12px);
    }
}

/* LETTER RAIN */

.rain-letter{

    position:absolute;

    top:-60px;

    font-size:clamp(24px,5vw,52px);

    font-weight:bold;

    animation:fall linear forwards;
}

@keyframes fall{

    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* MOBILE */

@media(max-width:700px){

    .game-table td{

        width:48px;
        height:48px;

        font-size:28px;
    }

    .option{

        width:48px;
        height:48px;

        font-size:24px;
    }

    .help-box{
        min-height:100px;
    }
}

</style>
</head>

<body>

<!-- =========================================
     AUDIO
========================================= -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- =========================================
     SLIDE 1
========================================= -->

<section id="slide1" class="slide show">

    <!-- MAKE SURE FILE NAME IS EXACTLY logo.png -->
    <img
    src="assets/logo.png"
    class="logo"
    alt="Innovine Logo">

</section>

<!-- =========================================
     SLIDE 2
========================================= -->

<section id="slide2" class="slide hidden">

    <div class="game-title">
        Identify the missing letters
    </div>

    <div class="game-area">

        <!-- TABLE -->
        <table class="game-table">

            <tr>
                <td class="filled">a</td>
                <td class="blank" data-answer="b">?</td>
                <td class="blank" data-answer="c">?</td>
                <td class="filled">d</td>
            </tr>

            <tr>
                <td class="blank" data-answer="e">?</td>
                <td class="blank" data-answer="f">?</td>
                <td class="blank" data-answer="g">?</td>
                <td class="blank" data-answer="h">?</td>
            </tr>

            <tr>
                <td class="filled">i</td>
                <td class="blank" data-answer="j">?</td>
                <td class="filled">k</td>
                <td class="blank" data-answer="l">?</td>
            </tr>

            <tr>
                <td class="blank" data-answer="m">?</td>
                <td class="blank" data-answer="n">?</td>
                <td class="blank" data-answer="o">?</td>
                <td class="filled">p</td>
            </tr>

            <tr>
                <td class="blank" data-answer="q">?</td>
                <td class="blank" data-answer="r">?</td>
                <td class="blank" data-answer="s">?</td>
                <td class="blank" data-answer="t">?</td>
            </tr>

            <tr>
                <td class="blank" data-answer="u">?</td>
                <td class="filled">v</td>
                <td class="blank" data-answer="w">?</td>
                <td class="blank" data-answer="x">?</td>
            </tr>

            <tr>
                <td class="filled">y</td>
                <td class="blank" data-answer="z">?</td>
            </tr>

        </table>

        <!-- FEEDBACK -->
        <div class="feedback" id="feedback"></div>

        <!-- HELP BOX -->
        <div class="help-box" id="helpBox"></div>

    </div>

</section>

<!-- =========================================
     SLIDE 3
========================================= -->

<section id="slide3" class="slide hidden">

    <div class="amazing">
        Amazing!
    </div>

</section>

<script>

/* =========================================
   SLIDES
========================================= */

const slide1 =
document.getElementById("slide1");

const slide2 =
document.getElementById("slide2");

const slide3 =
document.getElementById("slide3");

setTimeout(()=>{

    slide1.classList.remove("show");
    slide1.classList.add("hidden");

    slide2.classList.remove("hidden");
    slide2.classList.add("show");

},3000);

/* =========================================
   HELP BOX LETTERS
========================================= */

const helpLetters = [

"b","c","e","f","g","h",
"j","l","m","n","o",
"q","r","s","t","u",
"w","x","z"

];

const helpBox =
document.getElementById("helpBox");

const feedback =
document.getElementById("feedback");

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

let selectedLetter = null;
let selectedButton = null;

/* =========================================
   CREATE HELP LETTERS
========================================= */

helpLetters.forEach((letter,index)=>{

    const btn =
    document.createElement("button");

    btn.innerHTML = letter;

    btn.className =
    "option c"+((index%6)+1);

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".option")
        .forEach(b=>{
            b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedLetter = letter;

        selectedButton = btn;
    });

    helpBox.appendChild(btn);
});

/* =========================================
   BLANK BOXES
========================================= */

const blanks =
document.querySelectorAll(".blank");

blanks.forEach(blank=>{

    blank.addEventListener("click",()=>{

        if(!selectedLetter) return;

        const answer =
        blank.dataset.answer;

        /* CORRECT */

        if(selectedLetter === answer){

            blank.innerHTML =
            selectedLetter;

            blank.style.background =
            "#d8ffd8";

            blank.style.border =
            "3px solid green";

            blank.style.color =
            "#111";

            feedback.innerHTML = "✅";

            playCorrect();

            /* REMOVE LETTER FROM HELP BOX */

            selectedButton.remove();

            selectedLetter = null;

            checkComplete();

        }

        /* WRONG */

        else{

            feedback.innerHTML = "❌";

            playWrong();

            setTimeout(()=>{
                feedback.innerHTML = "";
            },1000);
        }
    });
});

/* =========================================
   AUDIO
========================================= */

function playCorrect(){

    correctSound.currentTime = 0;

    correctSound.play().catch(()=>{});
}

function playWrong(){

    wrongSound.currentTime = 0;

    wrongSound.play().catch(()=>{});
}

/* =========================================
   CHECK COMPLETE
========================================= */

function checkComplete(){

    let done = true;

    blanks.forEach(blank=>{

        if(blank.innerHTML === "?"){
            done = false;
        }
    });

    if(done){

        setTimeout(()=>{

            slide2.classList.remove("show");
            slide2.classList.add("hidden");

            slide3.classList.remove("hidden");
            slide3.classList.add("show");

            startLetterRain();

        },1200);
    }
}

/* =========================================
   LETTER RAIN
========================================= */

function startLetterRain(){

    const letters =
    "abcdefghijklmnopqrstuvwxyz";

    setInterval(()=>{

        const span =
        document.createElement("span");

        span.className =
        "rain-letter";

        span.innerHTML =
        letters[Math.floor(Math.random()*26)];

        span.style.left =
        Math.random()*100 + "vw";

        span.style.color =
        randomColor();

        span.style.animationDuration =
        (3 + Math.random()*3) + "s";

        slide3.appendChild(span);

        setTimeout(()=>{
            span.remove();
        },7000);

    },180);
}

/* =========================================
   RANDOM COLOR
========================================= */

function randomColor(){

    const colors = [

        "#ff006e",
        "#8338ec",
        "#3a86ff",
        "#06d6a0",
        "#ffbe0b",
        "#fb5607"
    ];

    return colors[
    Math.floor(Math.random()*colors.length)
    ];
}

</script>

</body>
</html>
