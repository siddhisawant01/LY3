<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Missing Letters Game</title>

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    touch-action:manipulation;
}

/* =========================================
   COMMON SLIDES
========================================= */

.slide{
    position:absolute;
    inset:0;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:0.6s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
    transform:scale(1.05);
}

.show{
    opacity:1;
    pointer-events:auto;
    transform:scale(1);
}

/* =========================================
   SLIDE 1
========================================= */

#slide1{
    background:white;
}

/* IMPORTANT FIX FOR LOGO */

.logo{

    width:min(75vw,420px);
    max-width:420px;
    height:auto;

    display:block;
    object-fit:contain;
}

/* =========================================
   SLIDE 2
========================================= */

#slide2{

    background:
    linear-gradient(rgba(255,255,255,0.88),
    rgba(255,255,255,0.88)),
    url("assets/background1.png");

    background-size:cover;
    background-position:center;

    padding:10px;
}

.game-wrapper{

    width:100%;
    max-width:900px;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
    align-items:center;
}

.game-title{

    font-size:clamp(28px,4vw,52px);
    font-weight:bold;

    color:#ff006e;

    text-align:center;
}

/* =========================================
   TABLE GRID
========================================= */

.grid-wrapper{

    display:flex;
    flex-direction:column;
    align-items:center;
}

.letters-grid{

    display:grid;

    grid-template-columns:repeat(4,68px);

    gap:6px;
}

.bottom-row{

    display:grid;

    grid-template-columns:repeat(2,68px);

    gap:6px;

    margin-top:6px;
}

/* =========================================
   LETTER BOX
========================================= */

.letter-box{

    width:68px;
    height:68px;

    border-radius:16px;

    background:white;

    border:3px solid #ffb703;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:28px;
    font-weight:bold;

    color:#111;

    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

/* EMPTY BOX */

.blank{

    border:3px dashed #ff006e;

    background:#fff6cc;

    color:#ff006e;

    cursor:pointer;
}

/* =========================================
   HELP BOX
========================================= */

.help-box{

    width:100%;
    max-width:760px;

    background:#ffffff;

    border-radius:24px;

    padding:14px;

    box-shadow:0 4px 16px rgba(0,0,0,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:8px;
}

.option{

    width:42px;
    height:42px;

    border:none;
    border-radius:12px;

    color:white;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

.option:active{
    transform:scale(0.9);
}

.selected{
    outline:4px solid #111;
}

/* RANDOM COLORS */

.c1{background:#ff006e;}
.c2{background:#8338ec;}
.c3{background:#3a86ff;}
.c4{background:#06d6a0;}
.c5{background:#ffbe0b;}
.c6{background:#fb5607;}

/* =========================================
   FEEDBACK
========================================= */

.feedback{

    position:absolute;

    top:48%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:90px;

    z-index:100;

    pointer-events:none;
}

/* =========================================
   SLIDE 3
========================================= */

#slide3{

    overflow:hidden;

    background:
    linear-gradient(rgba(255,255,255,0.15),
    rgba(255,255,255,0.15)),
    url("assets/background2.png");

    background-size:cover;
    background-position:center;
}

.amazing{

    font-size:clamp(52px,9vw,100px);

    font-weight:bold;

    color:#ff006e;

    text-shadow:
    3px 3px white,
    6px 6px 12px rgba(0,0,0,0.25);

    animation:bounce 1s infinite alternate;

    z-index:10;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-15px);
    }
}

/* =========================================
   RAIN LETTERS
========================================= */

.rain-letter{

    position:absolute;

    top:-60px;

    font-size:clamp(24px,5vw,50px);

    font-weight:bold;

    animation:fall linear forwards;

    user-select:none;
}

@keyframes fall{

    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:700px){

    .letters-grid{
        grid-template-columns:repeat(4,56px);
    }

    .bottom-row{
        grid-template-columns:repeat(2,56px);
    }

    .letter-box{
        width:56px;
        height:56px;
        font-size:24px;
    }

    .option{
        width:38px;
        height:38px;
        font-size:18px;
    }

    .game-title{
        font-size:24px;
    }

    .help-box{
        padding:10px;
        gap:6px;
    }
}

</style>
</head>

<body>

<!-- =========================================
     AUDIO
========================================= -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- =========================================
     SLIDE 1
========================================= -->

<section id="slide1" class="slide show">

    <!-- VERY IMPORTANT:
         PUT YOUR EXACT LOGO FILE INSIDE assets FOLDER
         FILE NAME MUST BE:
         logo.png
    -->

    <img
    src="assets/logo.png?v=1"
    class="logo"
    alt="Innovine Logo"
    >

</section>

<!-- =========================================
     SLIDE 2
========================================= -->

<section id="slide2" class="slide hidden">

    <div class="game-wrapper">

        <div class="game-title">
            Identify the missing letters
        </div>

        <!-- GRID -->
        <div class="grid-wrapper">

            <div class="letters-grid" id="lettersGrid"></div>

            <div class="bottom-row" id="bottomRow"></div>

        </div>

        <!-- HELP BOX -->
        <div class="help-box" id="optionsContainer"></div>

    </div>

    <!-- FEEDBACK -->
    <div class="feedback" id="feedback"></div>

</section>

<!-- =========================================
     SLIDE 3
========================================= -->

<section id="slide3" class="slide hidden">

    <div class="amazing">
        Amazing!
    </div>

</section>

<script>

/* =========================================
   SLIDES
========================================= */

const slide1 = document.getElementById("slide1");
const slide2 = document.getElementById("slide2");
const slide3 = document.getElementById("slide3");

setTimeout(()=>{

    slide1.classList.remove("show");
    slide1.classList.add("hidden");

    slide2.classList.remove("hidden");
    slide2.classList.add("show");

},3000);

/* =========================================
   GRID DATA
========================================= */

/* VISIBLE LETTERS:
a d e h i k p v w y
*/

const mainGrid = [

[
{letter:"a",fixed:true},
{letter:"b"},
{letter:"c"},
{letter:"d",fixed:true}
],

[
{letter:"e",fixed:true},
{letter:"f"},
{letter:"g"},
{letter:"h",fixed:true}
],

[
{letter:"i",fixed:true},
{letter:"j"},
{letter:"k",fixed:true},
{letter:"l"}
],

[
{letter:"m"},
{letter:"n"},
{letter:"o"},
{letter:"p",fixed:true}
],

[
{letter:"q"},
{letter:"r"},
{letter:"s"},
{letter:"t"}
],

[
{letter:"u"},
{letter:"v",fixed:true},
{letter:"w",fixed:true},
{letter:"x"}
]

];

const bottomGrid = [

[
{letter:"y",fixed:true},
{letter:"z"}
]

];

/* =========================================
   SHUFFLED HELP BOX LETTERS
========================================= */

const helpLetters = [

"q",
"b",
"m",
"z",
"g",
"t",
"c",
"u",
"f",
"n",
"l",
"j",
"x",
"r",
"s",
"o"
];

/* =========================================
   ELEMENTS
========================================= */

const lettersGrid =
document.getElementById("lettersGrid");

const bottomRow =
document.getElementById("bottomRow");

const optionsContainer =
document.getElementById("optionsContainer");

const feedback =
document.getElementById("feedback");

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

let selectedLetter = null;
let selectedButton = null;

/* =========================================
   CREATE GRID
========================================= */

function createBox(item){

    const box =
    document.createElement("div");

    box.classList.add("letter-box");

    if(item.fixed){

        box.innerHTML = item.letter;

    }else{

        box.classList.add("blank");

        box.innerHTML = "?";

        box.dataset.answer = item.letter;

        box.addEventListener("click",()=>{

            if(!selectedLetter) return;

            if(selectedLetter === item.letter){

                box.innerHTML = selectedLetter;

                box.style.background = "#d8ffd8";
                box.style.border = "3px solid green";

                selectedButton.remove();

                selectedLetter = null;
                selectedButton = null;

                playCorrect();
                showFeedback("✅");

                checkGameComplete();

            }else{

                playWrong();
                showFeedback("❌");
            }
        });
    }

    return box;
}

/* MAIN GRID */

mainGrid.forEach(row=>{

    row.forEach(item=>{

        lettersGrid.appendChild(
        createBox(item)
        );

    });

});

/* BOTTOM GRID */

bottomGrid.forEach(row=>{

    row.forEach(item=>{

        bottomRow.appendChild(
        createBox(item)
        );

    });

});

/* =========================================
   CREATE OPTIONS
========================================= */

helpLetters.forEach((letter,index)=>{

    const btn =
    document.createElement("button");

    btn.className =
    "option c"+((index%6)+1);

    btn.innerHTML = letter;

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".option")
        .forEach(b=>{
            b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedLetter = letter;
        selectedButton = btn;
    });

    optionsContainer.appendChild(btn);
});

/* =========================================
   FEEDBACK
========================================= */

function showFeedback(symbol){

    feedback.innerHTML = symbol;

    setTimeout(()=>{
        feedback.innerHTML = "";
    },900);
}

/* =========================================
   AUDIO
========================================= */

function playCorrect(){

    correctSound.currentTime = 0;

    correctSound.play().catch(()=>{});
}

function playWrong(){

    wrongSound.currentTime = 0;

    wrongSound.play().catch(()=>{});
}

/* =========================================
   CHECK COMPLETE
========================================= */

function checkGameComplete(){

    const blanks =
    document.querySelectorAll(".blank");

    let completed = true;

    blanks.forEach(box=>{

        if(box.innerHTML === "?"){
            completed = false;
        }
    });

    if(completed){

        setTimeout(()=>{

            slide2.classList.remove("show");
            slide2.classList.add("hidden");

            slide3.classList.remove("hidden");
            slide3.classList.add("show");

            startLetterRain();

        },1200);
    }
}

/* =========================================
   LETTER RAIN
========================================= */

function startLetterRain(){

    const letters =
    "abcdefghijklmnopqrstuvwxyz";

    setInterval(()=>{

        const span =
        document.createElement("span");

        span.className =
        "rain-letter";

        span.innerHTML =
        letters[Math.floor(Math.random()*26)];

        span.style.left =
        Math.random()*100 + "vw";

        span.style.color =
        randomColor();

        span.style.animationDuration =
        (3 + Math.random()*3) + "s";

        slide3.appendChild(span);

        setTimeout(()=>{
            span.remove();
        },7000);

    },180);
}

/* =========================================
   RANDOM COLORS
========================================= */

function randomColor(){

    const colors = [

        "#ff006e",
        "#8338ec",
        "#3a86ff",
        "#06d6a0",
        "#ffbe0b",
        "#fb5607"
    ];

    return colors[
    Math.floor(Math.random()*colors.length)
    ];
}

</script>

</body>
</html>
