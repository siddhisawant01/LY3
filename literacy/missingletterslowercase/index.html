<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>Missing Letters Game</title>

<style>

/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    touch-action:manipulation;
}

/* =========================================
   SLIDES
========================================= */

.slide{
    position:absolute;
    width:100%;
    height:100vh;
    top:0;
    left:0;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    transition:0.6s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
}

.show{
    opacity:1;
    pointer-events:auto;
}

/* =========================================
   SLIDE 1
========================================= */

#slide1{
    background:white;
}

/* IMPORTANT FIX FOR LOGO */

.logo{
    width:min(70vw,350px);
    max-width:350px;
    object-fit:contain;
    display:block;
}

/* =========================================
   SLIDE 2
========================================= */

#slide2{

    background:
    linear-gradient(rgba(255,255,255,0.90),
    rgba(255,255,255,0.90)),
    url("assets/background1.png");

    background-size:cover;
    background-position:center;

    padding:10px;
}

/* GAME WRAPPER */

.game-wrapper{

    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* TITLE */

.game-title{

    font-size:clamp(24px,4vw,52px);
    font-weight:bold;
    color:#ff006e;

    margin-bottom:12px;
    text-align:center;
}

/* GRID */

.grid{

    display:grid;
    grid-template-columns:repeat(4,70px);

    gap:6px;

    margin-bottom:16px;
}

/* BOX */

.box{

    width:70px;
    height:70px;

    border-radius:16px;

    background:white;

    border:3px solid #ffb703;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    font-weight:bold;

    color:#000;

    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

/* EMPTY BOX */

.blank{

    background:#fff3cd;

    border:3px dashed #ff006e;

    color:#ff006e;

    cursor:pointer;
}

/* INVISIBLE */

.empty{

    visibility:hidden;
}

/* HELP BOX */

.help-box{

    width:min(95vw,760px);

    background:white;

    border-radius:24px;

    padding:14px;

    box-shadow:0 4px 15px rgba(0,0,0,0.15);

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:10px;
}

/* OPTIONS */

.option{

    width:52px;
    height:52px;

    border:none;
    border-radius:14px;

    font-size:30px;
    font-weight:bold;

    color:white;

    cursor:pointer;

    transition:0.2s;

    box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

.option:active{
    transform:scale(0.92);
}

.selected{
    outline:4px solid #111;
}

/* COLORS */

.c1{background:#ff006e;}
.c2{background:#8338ec;}
.c3{background:#3a86ff;}
.c4{background:#06d6a0;}
.c5{background:#ffbe0b;}
.c6{background:#fb5607;}

/* FEEDBACK */

.feedback{

    position:fixed;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    font-size:90px;

    z-index:999;

    display:none;
}

/* =========================================
   SLIDE 3
========================================= */

#slide3{

    overflow:hidden;

    background:
    linear-gradient(rgba(255,255,255,0.15),
    rgba(255,255,255,0.15)),
    url("assets/background2.png");

    background-size:cover;
    background-position:center;
}

.amazing{

    font-size:clamp(48px,8vw,100px);

    font-weight:bold;

    color:#ff006e;

    text-shadow:
    3px 3px white,
    6px 6px 10px rgba(0,0,0,0.2);

    animation:bounce 1s infinite alternate;

    z-index:10;
}

@keyframes bounce{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-12px);
    }
}

/* RAIN */

.rain-letter{

    position:absolute;

    top:-50px;

    font-size:40px;

    font-weight:bold;

    animation:fall linear forwards;

    user-select:none;
}

@keyframes fall{

    to{
        transform:translateY(120vh) rotate(360deg);
    }
}

/* =========================================
   MOBILE
========================================= */

@media(max-width:700px){

    .grid{
        grid-template-columns:repeat(4,58px);
        gap:5px;
    }

    .box{
        width:58px;
        height:58px;
        font-size:24px;
    }

    .option{
        width:44px;
        height:44px;
        font-size:24px;
    }

    .game-title{
        font-size:28px;
    }

    .help-box{
        gap:7px;
        padding:10px;
    }
}

@media(max-height:700px){

    .game-title{
        margin-bottom:6px;
    }

    .grid{
        margin-bottom:10px;
    }
}

</style>
</head>

<body>

<!-- =========================================
     AUDIO
========================================= -->

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- =========================================
     SLIDE 1
========================================= -->

<section id="slide1" class="slide show">

    <!-- IMPORTANT -->
    <!-- KEEP THIS EXACT FILE NAME -->

    <img
    src="./assets/logo.png"
    class="logo"
    alt="Innovine Logo"

    onerror="
    this.style.display='none';
    document.getElementById('logoText').style.display='block';
    ">

    <!-- FALLBACK -->
    <h1
    id="logoText"
    style="
    display:none;
    color:#ff006e;
    font-size:60px;
    font-weight:bold;
    ">
    INNOVINE
    </h1>

</section>

<!-- =========================================
     SLIDE 2
========================================= -->

<section id="slide2" class="slide hidden">

    <div class="game-wrapper">

        <div class="game-title">
            Identify the missing letters
        </div>

        <!-- GRID -->

        <div class="grid" id="grid"></div>

        <!-- HELP BOX -->

        <div class="help-box" id="helpBox"></div>

    </div>

</section>

<!-- =========================================
     SLIDE 3
========================================= -->

<section id="slide3" class="slide hidden">

    <div class="amazing">
        Amazing!
    </div>

</section>

<!-- FEEDBACK -->

<div class="feedback" id="feedback"></div>

<script>

/* =========================================
   SLIDES
========================================= */

const slide1 =
document.getElementById("slide1");

const slide2 =
document.getElementById("slide2");

const slide3 =
document.getElementById("slide3");

setTimeout(()=>{

    slide1.classList.remove("show");
    slide1.classList.add("hidden");

    slide2.classList.remove("hidden");
    slide2.classList.add("show");

},3000);

/* =========================================
   GAME DATA
========================================= */

const gridData = [

"a","b","c","d",
"e","f","g","h",
"i","j","k","l",
"m","n","o","p",
"q","r","s","t",
"u","v","w","x",
"empty","y","z","empty"
];

/* ONLY THESE LETTERS VISIBLE */

const visibleLetters = [
"a","d","e","h","i",
"k","p","v","w","y"
];

/* SHUFFLED HELP BOX */

const helpLetters = [

"q","b","m","u","g",
"z","c","l","x","o",
"n","f","s","r","j",
"t"
];

let selectedLetter = null;

/* =========================================
   ELEMENTS
========================================= */

const grid =
document.getElementById("grid");

const helpBox =
document.getElementById("helpBox");

const feedback =
document.getElementById("feedback");

const correctSound =
document.getElementById("correctSound");

const wrongSound =
document.getElementById("wrongSound");

/* =========================================
   CREATE GRID
========================================= */

gridData.forEach(letter=>{

    const box =
    document.createElement("div");

    box.classList.add("box");

    if(letter === "empty"){

        box.classList.add("empty");

    }else if(visibleLetters.includes(letter)){

        box.innerHTML = letter;

    }else{

        box.innerHTML = "?";

        box.dataset.answer = letter;

        box.classList.add("blank");

        box.addEventListener("click",()=>{

            if(!selectedLetter) return;

            if(selectedLetter === box.dataset.answer){

                box.innerHTML = selectedLetter;

                box.classList.remove("blank");

                box.style.background = "#d8ffd8";
                box.style.border = "3px solid green";

                playCorrect();

                showFeedback("✅");

                removeHelpLetter(selectedLetter);

                selectedLetter = null;

                checkComplete();

            }else{

                playWrong();

                showFeedback("❌");
            }
        });
    }

    grid.appendChild(box);
});

/* =========================================
   HELP BOX
========================================= */

helpLetters.forEach((letter,index)=>{

    const btn =
    document.createElement("button");

    btn.className =
    "option c"+((index%6)+1);

    btn.innerHTML = letter;

    btn.dataset.letter = letter;

    btn.addEventListener("click",()=>{

        document
        .querySelectorAll(".option")
        .forEach(b=>{
            b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedLetter = letter;
    });

    helpBox.appendChild(btn);
});

/* =========================================
   REMOVE HELP LETTER
========================================= */

function removeHelpLetter(letter){

    const buttons =
    document.querySelectorAll(".option");

    buttons.forEach(btn=>{

        if(btn.dataset.letter === letter){

            btn.remove();
        }
    });
}

/* =========================================
   FEEDBACK
========================================= */

function showFeedback(symbol){

    feedback.style.display = "block";

    feedback.innerHTML = symbol;

    setTimeout(()=>{
        feedback.style.display = "none";
    },700);
}

/* =========================================
   AUDIO
========================================= */

function playCorrect(){

    correctSound.currentTime = 0;

    correctSound.play().catch(()=>{});
}

function playWrong(){

    wrongSound.currentTime = 0;

    wrongSound.play().catch(()=>{});
}

/* =========================================
   CHECK COMPLETE
========================================= */

function checkComplete(){

    const remaining =
    document.querySelectorAll(".blank");

    if(remaining.length === 0){

        setTimeout(()=>{

            slide2.classList.remove("show");
            slide2.classList.add("hidden");

            slide3.classList.remove("hidden");
            slide3.classList.add("show");

            startRain();

        },1200);
    }
}

/* =========================================
   LETTER RAIN
========================================= */

function startRain(){

    const letters =
    "abcdefghijklmnopqrstuvwxyz";

    setInterval(()=>{

        const span =
        document.createElement("span");

        span.className =
        "rain-letter";

        span.innerHTML =
        letters[Math.floor(Math.random()*26)];

        span.style.left =
        Math.random()*100 + "vw";

        span.style.color =
        randomColor();

        span.style.animationDuration =
        (3 + Math.random()*3) + "s";

        slide3.appendChild(span);

        setTimeout(()=>{
            span.remove();
        },7000);

    },180);
}

/* =========================================
   RANDOM COLORS
========================================= */

function randomColor(){

    const colors = [

        "#ff006e",
        "#8338ec",
        "#3a86ff",
        "#06d6a0",
        "#ffbe0b",
        "#fb5607"
    ];

    return colors[
    Math.floor(Math.random()*colors.length)
    ];
}

</script>

</body>
</html>
