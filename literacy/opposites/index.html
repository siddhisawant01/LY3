<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opposites Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
}

.slide{
display:none;
width:100vw;
height:100vh;
flex-direction:column;
align-items:center;
justify-content:center;
padding:10px;
}

.active{
display:flex;
}

.logo-slide{
background:white;
}

.game-slide{
background-image:url('background.jpg');
background-size:cover;
background-position:center;
}

h2{
text-align:center;
margin-bottom:10px;
font-size:clamp(16px,3vw,28px);
background:white;
padding:8px 15px;
border-radius:20px;
}

.question-area{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
margin:15px;
}

.main-image,
.answer-slot{
width:min(28vw,180px);
height:min(28vw,180px);
border:8px solid #ff69b4;
border-radius:25px;
background:white;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.main-image img,
.answer-slot img{
width:100%;
height:100%;
object-fit:contain;
}

.options{
display:flex;
justify-content:center;
gap:12px;
width:100%;
}

.option{
width:min(25vw,150px);
height:min(25vw,150px);
background:white;
border:8px solid orange;
border-radius:25px;
cursor:pointer;
overflow:hidden;
}

.option img{
width:100%;
height:100%;
object-fit:contain;
}

.feedback{
position:fixed;
font-size:120px;
display:none;
z-index:999;
}

.tick{
color:green;
}

.cross{
color:red;
}

#finalSlide{
background-image:url('background.jpg');
background-size:cover;
background-position:center;
}

.goodjob{
font-size:50px;
font-weight:bold;
color:#ff1493;
background:white;
padding:20px;
border-radius:20px;
}

.playAgain{
margin-top:20px;
padding:15px 30px;
font-size:24px;
background:#00c853;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

.confetti{
position:absolute;
inset:0;
pointer-events:none;
}

</style>
</head>

<body>

<audio id="clap" src="audio/clap.mp3"></audio>
<audio id="wrong" src="audio/wrong.mp3"></audio>

<div class="feedback tick" id="tick">✔</div>
<div class="feedback cross" id="cross">✖</div>

<!-- Slide 1 -->

<div class="slide active logo-slide" id="slide1">
<img src="assets/innovine-logo.png" style="max-width:80%;">
</div>

<!-- Slides Container -->
<div id="slidesContainer"></div>

<!-- Final Slide -->

<div class="slide" id="finalSlide">
<div class="confetti" id="confetti"></div>

<div class="goodjob">
🎉 Good Job! 🎉
</div>

<button class="playAgain" onclick="location.reload()">
PLAY AGAIN
</button>
</div>

<script>

const questions = [

{
question:"front",
correct:"back",
options:["night","back","dirty"]
},

{
question:"soft",
correct:"hard",
options:["hard","empty","open"]
},

{
question:"happy",
correct:"sad",
options:["back","old","sad"]
},

{
question:"thick",
correct:"thin",
options:["thin","night","full"]
},

{
question:"day",
correct:"night",
options:["front","happy","night"]
},

{
question:"young",
correct:"old",
options:["soft","old","empty"]
},

{
question:"empty",
correct:"full",
options:["full","sad","clean"]
},

{
question:"dirty",
correct:"clean",
options:["clean","old","young"]
},

{
question:"close",
correct:"open",
options:["happy","open","empty"]
}

];

const container=document.getElementById("slidesContainer");

questions.forEach((q,index)=>{

const slide=document.createElement("div");

slide.className="slide game-slide";

slide.id="slide"+(index+2);

slide.innerHTML=`

<h2>
Identify the given image and select correct opposite.
</h2>

<div class="question-area">

<div class="main-image">
<img src="assets/${q.question}.png">
</div>

<div class="answer-slot"
id="answer${index}">
</div>

</div>

<div class="options">

${q.options.map(opt=>`

<div class="option"
onclick="checkAnswer(this,'${opt}','${q.correct}',${index})">

<img src="assets/${opt}${opt==='hard'?'.jpeg':'.png'}">

</div>

`).join("")}

</div>

`;

container.appendChild(slide);

});

let currentSlide=1;

setTimeout(()=>{
document.getElementById("slide1").classList.remove("active");
document.getElementById("slide2").classList.add("active");
},2500);

function showFeedback(correct){

const tick=document.getElementById("tick");
const cross=document.getElementById("cross");

if(correct){

tick.style.display="block";

document.getElementById("clap").play();

setTimeout(()=>{
tick.style.display="none";
},1200);

}else{

cross.style.display="block";

document.getElementById("wrong").play();

setTimeout(()=>{
cross.style.display="none";
},1200);

}
}

function checkAnswer(element,selected,correct,index){

if(selected===correct){

showFeedback(true);

const slot=document.getElementById("answer"+index);

slot.innerHTML=element.innerHTML;

element.style.visibility="hidden";

setTimeout(()=>{

document.getElementById("slide"+(index+2)).classList.remove("active");

if(index===questions.length-1){

document.getElementById("finalSlide").classList.add("active");

launchConfetti();

}else{

document.getElementById("slide"+(index+3)).classList.add("active");

}

},1800);

}else{

showFeedback(false);

}

}

function launchConfetti(){

const confetti=document.getElementById("confetti");

for(let i=0;i<120;i++){

let piece=document.createElement("div");

piece.style.position="absolute";
piece.style.left=Math.random()*100+"%";
piece.style.top="-20px";
piece.style.width="10px";
piece.style.height="10px";
piece.style.background=`hsl(${Math.random()*360},100%,50%)`;
piece.style.animation=`fall ${3+Math.random()*2}s linear forwards`;

confetti.appendChild(piece);

}

}

const style=document.createElement("style");

style.innerHTML=`

@keyframes fall{

to{
transform:translateY(120vh) rotate(720deg);
}

}

`;

document.head.appendChild(style);

</script>

</body>
</html>
