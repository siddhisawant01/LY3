<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Modes of Transport</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
}

.slide{
width:100%;
height:100vh;
display:none;
}

.slide.active{
display:flex;
}

button{
cursor:pointer;
border:none;
}

/* -------------------- */
/* Slide 1 */
/* -------------------- */

#welcome{
justify-content:center;
align-items:center;
background:white;
flex-direction:column;
}

.logo{
max-width:70%;
max-height:45vh;
object-fit:contain;
}

.startBtn{
margin-top:30px;
padding:16px 40px;
font-size:28px;
font-weight:bold;
border-radius:20px;
background:#ff9800;
color:white;
}

/* -------------------- */
/* Slide 2 */
/* -------------------- */

#gameSlide{
flex-direction:column;
height:100vh;
padding:0.5vh;
background:white;
}

.instruction{
height:8%;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(18px,2.6vw,30px);
font-weight:bold;
color:#222;
text-align:center;
}

.topSection{
height:40%;
display:flex;
gap:0.8%;
}

.bottomSection{
height:52%;
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(2,1fr);
gap:0.8%;
padding-top:0.5%;
}

.category{
position:relative;
border-radius:20px;
overflow:hidden;
border:6px solid;
display:flex;
flex-direction:column;
}

.airBorder{
border-color:#00bcd4;
}

.waterBorder{
border-color:#2196f3;
}

.roadBorder{
border-color:#ff9800;
}

.category img{
width:100%;
height:85%;
object-fit:cover;
display:block;
}

.label{
height:15%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:clamp(14px,1.6vw,22px);
background:white;
text-transform:lowercase;
}

.vehicle{
position:relative;
border-radius:18px;
overflow:hidden;
border:4px solid #9c27b0;
background:white;
display:flex;
flex-direction:column;
}

.vehicle img{
width:100%;
height:80%;
object-fit:contain;
padding:2px;
}

.vehicle .label{
height:20%;
font-size:clamp(11px,1.2vw,18px);
}

.vehicle.selected{
transform:scale(1.05);
border-color:red;
}

.tick,
.cross{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:100px;
font-weight:bold;
display:none;
z-index:9999;
pointer-events:none;
}

.tick{
color:#00c853;
}

.cross{
color:#ff1744;
}

/* -------------------- */
/* Placed items */
/* -------------------- */

.placed{
width:60px;
height:60px;
object-fit:contain;
position:absolute;
}

/* -------------------- */
/* Slide 3 */
/* -------------------- */

#finalSlide{
background:linear-gradient(#87ceeb 0%, #87ceeb 60%, #66bb6a 60%);
position:relative;
overflow:hidden;
justify-content:center;
align-items:flex-start;
}

.goodJob{
position:absolute;
top:4%;
width:100%;
text-align:center;
font-size:clamp(30px,5vw,60px);
font-weight:bold;
color:#ff5722;
animation:bounce 1s infinite;
}

@keyframes bounce{
50%{transform:translateY(-10px);}
}

.road{
position:absolute;
bottom:0;
height:18%;
width:100%;
background:#555;
}

.track{
position:absolute;
bottom:18%;
height:5%;
width:100%;
background:#7f8c8d;
}

.trainAnim{
position:absolute;
bottom:18%;
left:-200px;
font-size:50px;
animation:trainRun 8s linear infinite;
}

@keyframes trainRun{
from{left:-200px;}
to{left:110%;}
}

.carAnim{
position:absolute;
bottom:6%;
left:-100px;
font-size:50px;
animation:carRun 6s linear infinite;
}

@keyframes carRun{
from{left:-100px;}
to{left:110%;}
}

.ship1{
position:absolute;
top:55%;
left:-150px;
font-size:60px;
animation:shipMove 12s linear infinite;
}

.ship2{
position:absolute;
top:45%;
left:-300px;
font-size:50px;
animation:shipMove 15s linear infinite;
}

@keyframes shipMove{
from{left:-200px;}
to{left:120%;}
}

.balloon{
position:absolute;
font-size:60px;
left:15%;
bottom:-100px;
animation:balloonFly 12s linear infinite;
}

@keyframes balloonFly{
from{
bottom:-100px;
}
to{
bottom:100%;
}
}

.waterArea{
position:absolute;
top:38%;
height:22%;
width:100%;
background:#42a5f5;
}

</style>
</head>

<body>

<!-- AUDIO -->
<audio id="clapSound" preload="auto">
<source src="assets/clap.mp3" type="audio/mpeg">
</audio>

<audio id="wrongSound" preload="auto">
<source src="assets/indext.html" type="audio/mpeg">
</audio>

<!-- SLIDE 1 -->

<div class="slide active" id="welcome">

<img class="logo"
src="assets/innovine-logo.png">

<button class="startBtn" onclick="startGame()">Start</button>

</div>

<!-- SLIDE 2 -->

<div class="slide" id="gameSlide">

<div class="instruction">
Identify the given vehicles and put them in the correct ways
</div>

<div class="topSection">

<div class="category airBorder" data-category="air">
<img src="assets/air.png">
<div class="label">air ways</div>
</div>

<div class="category waterBorder" data-category="water">
<img src="assets/water.png">
<div class="label">water ways</div>
</div>

<div class="category roadBorder" data-category="road">
<img src="assets/road.png">
<div class="label">road ways</div>
</div>

</div>

<div class="bottomSection" id="vehicleArea">

</div>

</div>

<!-- SLIDE 3 -->

<div class="slide" id="finalSlide">

<div class="goodJob">Good job!</div>

<div class="waterArea"></div>

<div class="balloon">🎈</div>

<div class="ship1">🚢</div>

<div class="ship2">⛵</div>

<div class="trainAnim">🚂🚃🚃</div>

<div class="carAnim">🚗 🚕 🚌</div>

<div class="track"></div>

<div class="road"></div>

</div>

<div class="tick" id="tick">✓</div>
<div class="cross" id="cross">✗</div>

<script>

const vehicles = [

{name:"aeroplane", img:"assets/aeroplane.png", answer:"air"},
{name:"bicycle", img:"assets/bicycle.png", answer:"road"},
{name:"boat", img:"assets/boat.png", answer:"water"},
{name:"car", img:"assets/car.png", answer:"road"},
{name:"helicopter", img:"assets/helicopter.png", answer:"air"},
{name:"hot air balloon", img:"assets/hotairballoon.png", answer:"air"},
{name:"sailboat", img:"assets/sailboat.png", answer:"water"},
{name:"scooty", img:"assets/scooty.png", answer:"road"},
{name:"train", img:"assets/train.png", answer:"road"},
{name:"ship", img:"assets/ship.png", answer:"water"}

];

let selectedVehicle = null;
let completed = 0;

const vehicleArea = document.getElementById("vehicleArea");

vehicles.forEach((v,index)=>{

const card=document.createElement("div");
card.className="vehicle";
card.dataset.answer=v.answer;

card.innerHTML=`
<img src="${v.img}">
<div class="label">${v.name}</div>
`;

card.onclick=()=>{

document.querySelectorAll(".vehicle")
.forEach(x=>x.classList.remove("selected"));

selectedVehicle=card;
card.classList.add("selected");

};

vehicleArea.appendChild(card);

});

document.querySelectorAll(".category").forEach(cat=>{

cat.onclick=()=>{

if(!selectedVehicle) return;

const correct=
selectedVehicle.dataset.answer===
cat.dataset.category;

if(correct){

document.getElementById("clapSound").play();

showTick();

const img=
selectedVehicle.querySelector("img").cloneNode(true);

img.className="placed";

img.style.left=
Math.random()*70+"%";

img.style.top=
Math.random()*60+"%";

cat.appendChild(img);

selectedVehicle.remove();

selectedVehicle=null;

completed++;

if(completed===10){

setTimeout(()=>{

document.getElementById("gameSlide").classList.remove("active");
document.getElementById("finalSlide").classList.add("active");

},1200);

}

}else{

document.getElementById("wrongSound").play();

showCross();

selectedVehicle.classList.remove("selected");
selectedVehicle=null;

}

};

});

function showTick(){

const t=document.getElementById("tick");

t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},800);

}

function showCross(){

const c=document.getElementById("cross");

c.style.display="block";

setTimeout(()=>{
c.style.display="none";
},800);

}

function startGame(){

document.getElementById("welcome").classList.remove("active");
document.getElementById("gameSlide").classList.add("active");

}

</script>

</body>
</html>
