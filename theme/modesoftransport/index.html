<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Modes of Transport</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#fff;
}

.slide{
width:100vw;
height:100vh;
display:none;
}

.slide.active{
display:flex;
}

/* ---------------- Slide 1 ---------------- */

#slide1{
justify-content:center;
align-items:center;
background:white;
}

#slide1 img{
width:min(70vw,400px);
max-height:60vh;
object-fit:contain;
}

/* ---------------- Slide 2 ---------------- */

#slide2{
flex-direction:column;
background:linear-gradient(to bottom,#fff8e8,#eef9ff);
padding:1vh;
}

.instruction{
height:8%;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(16px,2vw,28px);
font-weight:bold;
text-align:center;
color:#333;
}

.top-section{
height:42%;
display:flex;
gap:1%;
}

.bottom-section{
height:50%;
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(2,1fr);
gap:1%;
padding-top:1%;
}

.category{
position:relative;
flex:1;
border-radius:20px;
overflow:hidden;
border:6px solid;
display:flex;
flex-direction:column;
background:white;
}

.air{
border-color:#40c4ff;
}

.water{
border-color:#00bfa5;
}

.road{
border-color:#ff9800;
}

.category-image{
height:88%;
width:100%;
object-fit:cover;
}

.label{
height:12%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:clamp(14px,1.6vw,22px);
background:white;
text-transform:lowercase;
}

.vehicle{
position:relative;
border-radius:15px;
overflow:hidden;
border:4px solid #ba68c8;
background:white;
display:flex;
flex-direction:column;
cursor:pointer;
}

.vehicle img{
width:100%;
height:82%;
object-fit:contain;
}

.vehicle .label{
height:18%;
font-size:clamp(10px,1vw,18px);
}

.selected{
border-color:#ff1744 !important;
transform:scale(1.03);
}

.placed{
position:absolute;
width:22%;
height:22%;
object-fit:contain;
pointer-events:none;
z-index:10;
}

.feedback{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:90px;
font-weight:bold;
display:none;
z-index:999;
}

.correct{
color:#00c853;
}

.wrong{
color:#ff1744;
}

/* ---------------- Slide 3 ---------------- */

#slide3{
justify-content:center;
align-items:center;
flex-direction:column;
background:#fef6ff;
position:relative;
overflow:hidden;
}

.goodjob{
font-size:clamp(40px,8vw,90px);
font-weight:bold;
color:#ff4081;
animation:pop 1s infinite alternate;
z-index:2;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.12);}
}

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px) rotate(0deg);
}
to{
transform:translateY(110vh) rotate(720deg);
}
}

@media(max-width:768px){

.bottom-section{
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
}

.vehicle .label{
font-size:10px;
}

}
</style>
</head>

<body>

<!-- Slide 1 -->

<div id="slide1" class="slide active">
<img src="assets/innovine-logo.png" alt="">
</div>

<!-- Slide 2 -->

<div id="slide2" class="slide">

<div class="instruction">
Identify the given vehicles and put them in the correct ways
</div>

<div class="top-section">

<div class="category air" data-answer="air ways">
<img src="assets/air.png" class="category-image">
<div class="label">air ways</div>
</div>

<div class="category water" data-answer="water ways">
<img src="assets/water.png" class="category-image">
<div class="label">water ways</div>
</div>

<div class="category road" data-answer="road ways">
<img src="assets/road.png" class="category-image">
<div class="label">road ways</div>
</div>

</div>

<div class="bottom-section" id="vehicles">

<div class="vehicle" data-answer="air ways">
<img src="assets/aeroplane.png">
<div class="label">aeroplane</div>
</div>

<div class="vehicle" data-answer="road ways">
<img src="assets/bicycle.png">
<div class="label">bicycle</div>
</div>

<div class="vehicle" data-answer="water ways">
<img src="assets/boat.png">
<div class="label">boat</div>
</div>

<div class="vehicle" data-answer="road ways">
<img src="assets/car.png">
<div class="label">car</div>
</div>

<div class="vehicle" data-answer="air ways">
<img src="assets/helicopter.png">
<div class="label">helicopter</div>
</div>

<div class="vehicle" data-answer="air ways">
<img src="assets/hotairballoon.png">
<div class="label">hot air balloon</div>
</div>

<div class="vehicle" data-answer="water ways">
<img src="assets/sailboat.png">
<div class="label">sailboat</div>
</div>

<div class="vehicle" data-answer="road ways">
<img src="assets/scooty.png">
<div class="label">scooty</div>
</div>

<div class="vehicle" data-answer="water ways">
<img src="assets/ship.png">
<div class="label">ship</div>
</div>

</div>

</div>

<!-- Slide 3 -->

<div id="slide3" class="slide">
<div class="goodjob">🎉 Good job! 🎉</div>
</div>

<div id="tick" class="feedback correct">✓</div>
<div id="cross" class="feedback wrong">✗</div>

<audio id="clap" src="assets/clap.mp3"></audio>

<script>

setTimeout(()=>{
slide1.classList.remove("active");
slide2.classList.add("active");
},2500);

const vehicles=document.querySelectorAll(".vehicle");
const categories=document.querySelectorAll(".category");

let selectedVehicle=null;
let completed=0;

vehicles.forEach(vehicle=>{

vehicle.addEventListener("click",()=>{

document.querySelectorAll(".vehicle").forEach(v=>{
v.classList.remove("selected");
});

selectedVehicle=vehicle;
vehicle.classList.add("selected");

});

});

categories.forEach(category=>{

category.addEventListener("click",()=>{

if(!selectedVehicle) return;

const correct=selectedVehicle.dataset.answer;
const chosen=category.dataset.answer;

if(correct===chosen){

showTick();

document.getElementById("clap").play();

const img=selectedVehicle.querySelector("img").cloneNode();

img.classList.add("placed");

const count=category.querySelectorAll(".placed").length;

img.style.left=(5+(count%3)*25)+"%";
img.style.top=(10+Math.floor(count/3)*25)+"%";

category.appendChild(img);

selectedVehicle.remove();

selectedVehicle=null;

completed++;

if(completed===9){

setTimeout(()=>{
slide2.classList.remove("active");
slide3.classList.add("active");
createConfetti();
},1000);

}

}else{

showCross();

selectedVehicle.classList.remove("selected");
selectedVehicle=null;

}

});

});

function showTick(){
const tick=document.getElementById("tick");
tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},700);
}

function showCross(){
const cross=document.getElementById("cross");
cross.style.display="block";

setTimeout(()=>{
cross.style.display="none";
},700);
}

function createConfetti(){

for(let i=0;i<80;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=
`hsl(${Math.random()*360},100%,60%)`;

c.style.animationDuration=
(3+Math.random()*3)+"s";

document.getElementById("slide3").appendChild(c);

}

}
</script>

</body>
</html>
