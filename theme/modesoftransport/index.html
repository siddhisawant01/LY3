<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Modes of Transport</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#f5f5f5;
}

.slide{
width:100vw;
height:100vh;
display:none;
position:relative;
overflow:hidden;
}

.slide.active{
display:flex;
}

/* Slide 1 */

#slide1{
justify-content:center;
align-items:center;
background:white;
}

.logo{
max-width:70%;
max-height:70%;
object-fit:contain;
}

/* Slide 2 */

#slide2{
flex-direction:column;
background-image:url('assets/background.png');
background-size:cover;
background-position:center;
padding:0.5vh;
}

.instruction{
height:8%;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(14px,2vw,26px);
font-weight:bold;
color:#333;
text-align:center;
}

.topSection{
height:38%;
display:flex;
gap:0.5%;
}

.bottomSection{
height:54%;
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:repeat(2,1fr);
gap:0.4%;
padding-top:0.3%;
}

.category{
position:relative;
display:flex;
flex-direction:column;
border-radius:18px;
overflow:hidden;
border:6px solid;
background:white;
}

.airBorder{
border-color:#ff6ec7;
}

.waterBorder{
border-color:#00bfff;
}

.roadBorder{
border-color:#32cd32;
}

.categoryImage{
height:84%;
width:100%;
object-fit:cover;
}

.label{
height:16%;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:clamp(10px,1.2vw,20px);
background:white;
text-transform:lowercase;
}

.vehicle{
position:relative;
display:flex;
flex-direction:column;
border-radius:15px;
overflow:hidden;
border:4px solid #ff9800;
background:white;
}

.vehicle img{
height:80%;
width:100%;
object-fit:contain;
padding:2px;
}

.vehicleLabel{
height:20%;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(9px,1vw,18px);
font-weight:bold;
text-transform:lowercase;
}

.vehicle.selected{
transform:scale(1.05);
box-shadow:0 0 12px gold;
}

.tickCross{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:100px;
display:none;
z-index:9999;
pointer-events:none;
}

.tick{
color:green;
}

.cross{
color:red;
}

.placed{
width:60px;
height:60px;
object-fit:contain;
position:absolute;
z-index:5;
}

/* Slide 3 */

#slide3{
background:linear-gradient(#87ceeb,#dff6ff);
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

.goodjob{
font-size:clamp(30px,5vw,70px);
font-weight:bold;
color:#ff5722;
margin-bottom:40px;
}

.animationArea{
position:relative;
width:100%;
height:60%;
}

.road{
position:absolute;
bottom:0;
width:100%;
height:80px;
background:#555;
}

.road::after{
content:"";
position:absolute;
top:36px;
width:100%;
height:8px;
background:repeating-linear-gradient(
to right,
white 0px,
white 30px,
transparent 30px,
transparent 60px
);
}

.carAnim{
position:absolute;
bottom:30px;
width:90px;
animation:drive 6s linear infinite;
}

.shipAnim{
position:absolute;
bottom:120px;
width:90px;
animation:sail 10s linear infinite;
}

.balloonAnim{
position:absolute;
top:40px;
width:90px;
animation:fly 8s linear infinite;
}

@keyframes drive{
0%{left:-100px;}
100%{left:100%;}
}

@keyframes sail{
0%{left:100%;}
100%{left:-120px;}
}

@keyframes fly{
0%{left:-100px;}
100%{left:100%;}
}
</style>
</head>

<body>

<!-- Slide 1 -->

<div id="slide1" class="slide active">
<img class="logo" src="assets/innovine-logo.png">
</div>

<!-- Slide 2 -->

<div id="slide2" class="slide">

<div class="instruction">
Identify the given vehicles and put them in the correct ways
</div>

<div class="topSection">

<div class="category airBorder category" data-category="air">
<img src="assets/air.png" class="categoryImage">
<div class="label">air ways</div>
</div>

<div class="category waterBorder category" data-category="water">
<img src="assets/water.png" class="categoryImage">
<div class="label">water ways</div>
</div>

<div class="category roadBorder category" data-category="road">
<img src="assets/road.png" class="categoryImage">
<div class="label">road ways</div>
</div>

</div>

<div class="bottomSection" id="vehicleContainer">

<div class="vehicle" data-answer="air">
<img src="assets/aeroplane.png">
<div class="vehicleLabel">aeroplane</div>
</div>

<div class="vehicle" data-answer="road">
<img src="assets/bicycle.png">
<div class="vehicleLabel">bicycle</div>
</div>

<div class="vehicle" data-answer="water">
<img src="assets/boat.png">
<div class="vehicleLabel">boat</div>
</div>

<div class="vehicle" data-answer="road">
<img src="assets/car.png">
<div class="vehicleLabel">car</div>
</div>

<div class="vehicle" data-answer="air">
<img src="assets/helicopter.png">
<div class="vehicleLabel">helicopter</div>
</div>

<div class="vehicle" data-answer="air">
<img src="assets/hotairballoon.png">
<div class="vehicleLabel">hot air balloon</div>
</div>

<div class="vehicle" data-answer="water">
<img src="assets/sailboat.png">
<div class="vehicleLabel">sailboat</div>
</div>

<div class="vehicle" data-answer="road">
<img src="assets/scooty.png">
<div class="vehicleLabel">scooty</div>
</div>

<div class="vehicle" data-answer="road">
<img src="assets/train.png">
<div class="vehicleLabel">train</div>
</div>

<div class="vehicle" data-answer="water">
<img src="assets/ship.png">
<div class="vehicleLabel">ship</div>
</div>

</div>

<div id="tick" class="tickCross tick">✓</div>
<div id="cross" class="tickCross cross">✗</div>

</div>

<!-- Slide 3 -->

<div id="slide3" class="slide">

<div class="goodjob">
Good job!
</div>

<div class="animationArea">

<img src="assets/car.png" class="carAnim">
<img src="assets/ship.png" class="shipAnim">
<img src="assets/hotairballoon.png" class="balloonAnim">

<div class="road"></div>

</div>

</div>

<audio id="correctSound" src="assets/clap.mp3"></audio>

<script>

setTimeout(()=>{
document.getElementById('slide1').classList.remove('active');
document.getElementById('slide2').classList.add('active');
},3000);

const vehicles=document.querySelectorAll('.vehicle');
const categories=document.querySelectorAll('.category');

let selectedVehicle=null;
let completed=0;

vehicles.forEach(vehicle=>{

vehicle.addEventListener('click',()=>{

document.querySelectorAll('.vehicle').forEach(v=>{
v.classList.remove('selected');
});

selectedVehicle=vehicle;
vehicle.classList.add('selected');

});

});

categories.forEach(category=>{

category.addEventListener('click',()=>{

if(!selectedVehicle) return;

const answer=selectedVehicle.dataset.answer;
const target=category.dataset.category;

if(answer===target){

showTick();

document.getElementById('correctSound').play();

const img=selectedVehicle.querySelector('img').cloneNode(true);
img.className='placed';

const x=Math.random()*120+20;
const y=Math.random()*120+20;

img.style.left=x+'px';
img.style.top=y+'px';

category.appendChild(img);

selectedVehicle.style.visibility='hidden';
selectedVehicle.style.pointerEvents='none';

completed++;

if(completed===10){

setTimeout(()=>{
document.getElementById('slide2').classList.remove('active');
document.getElementById('slide3').classList.add('active');
},1500);

}

}else{

showCross();

const wrongAudio=new Audio();
wrongAudio.src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=";
wrongAudio.play();

}

selectedVehicle.classList.remove('selected');
selectedVehicle=null;

});

});

function showTick(){

const tick=document.getElementById('tick');

tick.style.display='block';

setTimeout(()=>{
tick.style.display='none';
},800);

}

function showCross(){

const cross=document.getElementById('cross');

cross.style.display='block';

setTimeout(()=>{
cross.style.display='none';
},800);

}
</script>

</body>
</html>
