<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Modes of Transport</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
overflow:hidden;
background:#ffffff;
}

.slide{
width:100vw;
height:100vh;
display:none;
}

.slide.active{
display:flex;
}

/* ---------- Slide 1 ---------- */

#slide1{
justify-content:center;
align-items:center;
background:white;
}

#slide1 img{
max-width:70%;
max-height:60%;
}

/* ---------- Slide 2 ---------- */

#slide2{
flex-direction:column;
padding:8px;
background:#f5fbff;
}

.instruction{
text-align:center;
font-size:clamp(14px,2vw,24px);
font-weight:bold;
margin-bottom:8px;
color:#003366;
}

.top-section{
height:42%;
display:flex;
gap:8px;
}

.category{
flex:1;
border:6px solid;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
background:white;
position:relative;
}

.air{
border-color:#ff7f50;
}

.water{
border-color:#1e90ff;
}

.road{
border-color:#32cd32;
}

.category-image{
height:70%;
width:100%;
object-fit:cover;
display:block;
}

.category-label{
height:30%;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(14px,2vw,22px);
font-weight:bold;
text-transform:lowercase;
}

.matched-container{
position:absolute;
top:10px;
left:10px;
right:10px;
bottom:40px;
display:flex;
flex-wrap:wrap;
gap:4px;
align-content:flex-start;
pointer-events:none;
}

.matched-container img{
width:60px;
height:60px;
object-fit:contain;
}

.bottom-section{
height:58%;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
padding-top:8px;
}

.vehicle{
border:4px solid;
border-radius:15px;
overflow:hidden;
background:white;
display:flex;
flex-direction:column;
cursor:pointer;
transition:.2s;
}

.vehicle:nth-child(odd){
border-color:#ff69b4;
}

.vehicle:nth-child(even){
border-color:#00bfff;
}

.vehicle.selected{
transform:scale(1.05);
}

.vehicle img{
width:100%;
height:70%;
object-fit:contain;
}

.vehicle span{
height:30%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
text-transform:lowercase;
text-align:center;
padding:2px;
}

.feedback{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:90px;
display:none;
z-index:999;
}

/* ---------- Slide 3 ---------- */

#slide3{
background:linear-gradient(#87ceeb,#dff6ff);
flex-direction:column;
position:relative;
overflow:hidden;
}

.goodjob{
text-align:center;
font-size:40px;
font-weight:bold;
color:#004080;
margin-top:20px;
}

.sun{
position:absolute;
top:20px;
right:40px;
width:90px;
height:90px;
border-radius:50%;
background:gold;
}

.road-strip{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#444;
}

.road-strip:before{
content:"";
position:absolute;
top:55px;
width:100%;
height:10px;
background:repeating-linear-gradient(
to right,
white 0px,
white 40px,
transparent 40px,
transparent 80px
);
}

.car{
position:absolute;
bottom:40px;
font-size:45px;
animation:carMove 6s linear infinite;
}

.train{
position:absolute;
bottom:125px;
font-size:50px;
animation:trainMove 9s linear infinite;
}

.ship{
position:absolute;
bottom:170px;
font-size:50px;
animation:shipMove 10s linear infinite;
}

.balloon{
position:absolute;
font-size:50px;
animation:balloonMove 12s linear infinite;
}

@keyframes carMove{
from{left:-60px;}
to{left:110%;}
}

@keyframes trainMove{
from{left:110%;}
to{left:-120px;}
}

@keyframes shipMove{
from{left:-80px;}
to{left:110%;}
}

@keyframes balloonMove{
0%{
left:-50px;
top:250px;
}
100%{
left:110%;
top:60px;
}
}

@media(max-width:700px){

.bottom-section{
grid-template-columns:repeat(5,1fr);
}

.vehicle span{
font-size:10px;
}

.matched-container img{
width:40px;
height:40px;
}
}

</style>
</head>
<body>

<!-- Slide 1 -->

<div class="slide active" id="slide1">
<img src="assets/innovine-logo.png">
</div>

<!-- Slide 2 -->

<div class="slide" id="slide2">

<div class="instruction">
Identify the given vehicles and put them in the correct ways
</div>

<div class="top-section">

<div class="category air" data-type="air">
<img class="category-image" src="assets/air.png">
<div class="matched-container" id="airMatched"></div>
<div class="category-label">air ways</div>
</div>

<div class="category water" data-type="water">
<img class="category-image" src="assets/water.png">
<div class="matched-container" id="waterMatched"></div>
<div class="category-label">water ways</div>
</div>

<div class="category road" data-type="road">
<img class="category-image" src="assets/road.png">
<div class="matched-container" id="roadMatched"></div>
<div class="category-label">road ways</div>
</div>

</div>

<div class="bottom-section" id="vehicleArea"></div>

</div>

<!-- Slide 3 -->

<div class="slide" id="slide3">

<div class="sun"></div>

<div class="goodjob">
Good job!
</div>

<div class="balloon">🎈</div>
<div class="ship">🚢</div>
<div class="train">🚂</div>
<div class="car">🚗</div>

<div class="road-strip"></div>

</div>

<div id="feedback" class="feedback"></div>

<audio id="clapSound" src="assets/clap.mp3"></audio>

<script>

setTimeout(()=>{
document.getElementById('slide1').classList.remove('active');
document.getElementById('slide2').classList.add('active');
},2500);

const vehicles=[

{
name:"aeroplane",
file:"aeroplane.png",
answer:"air"
},

{
name:"bicycle",
file:"bicycle.png",
answer:"road"
},

{
name:"boat",
file:"boat.png",
answer:"water"
},

{
name:"car",
file:"car.png",
answer:"road"
},

{
name:"helicopter",
file:"helicopter.png",
answer:"air"
},

{
name:"hot air balloon",
file:"hotairballoon.png",
answer:"air"
},

{
name:"sailboat",
file:"sailboat.png",
answer:"water"
},

{
name:"scooty",
file:"scooty.png",
answer:"road"
},

{
name:"train",
file:"train.png",
answer:"road"
},

{
name:"ship",
file:"ship.png",
answer:"water"
}

];

const area=document.getElementById("vehicleArea");

vehicles.forEach(v=>{

const card=document.createElement("div");
card.className="vehicle";
card.dataset.answer=v.answer;
card.dataset.file=v.file;

card.innerHTML=`
<img src="assets/${v.file}">
<span>${v.name}</span>
`;

card.onclick=()=>{
document.querySelectorAll(".vehicle")
.forEach(x=>x.classList.remove("selected"));

card.classList.add("selected");
selectedVehicle=card;
};

area.appendChild(card);

});

let selectedVehicle=null;
let completed=0;

document.querySelectorAll(".category").forEach(cat=>{

cat.onclick=()=>{

if(!selectedVehicle) return;

const correct=
selectedVehicle.dataset.answer===cat.dataset.type;

if(correct){

showFeedback("✅");

document.getElementById("clapSound").play();

const img=document.createElement("img");

img.src=
`assets/${selectedVehicle.dataset.file}`;

document.getElementById(
cat.dataset.type+"Matched"
).appendChild(img);

selectedVehicle.remove();

selectedVehicle=null;

completed++;

if(completed===10){

setTimeout(()=>{

document.getElementById("slide2")
.classList.remove("active");

document.getElementById("slide3")
.classList.add("active");

},1200);
}

}else{

showFeedback("❌");

const wrong=
new Audio(
"https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"
);

wrong.play();

}

};

});

function showFeedback(symbol){

const f=document.getElementById("feedback");

f.innerHTML=symbol;
f.style.display="block";

setTimeout(()=>{
f.style.display="none";
},800);

}

</script>

</body>
</html>
