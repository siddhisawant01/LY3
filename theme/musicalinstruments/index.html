<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Musical Instruments Game</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  user-select: none;
}

body {
  background: white;
}

/* Splash Screen */
#splash {
  position: fixed;
  inset: 0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

#splash img {
  width: min(55vw, 260px);
  max-height: 45vh;
  object-fit: contain;
}

/* Main Game */
#game {
  width: 100vw;
  height: 100vh;
  display: none;
}

.slide {
  width: 100vw;
  height: 100vh;
  padding: clamp(8px, 2vw, 18px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-around;
  position: relative;
  overflow: hidden;
}

.instruction {
  width: 96%;
  text-align: center;
  font-size: clamp(19px, 3.8vw, 34px);
  font-weight: 900;
  line-height: 1.2;
  color: #222;
}

.note-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.note-button {
  width: clamp(115px, 22vw, 180px);
  height: clamp(115px, 22vw, 180px);
  border-radius: 50%;
  border: none;
  background: #ffffffcc;
  box-shadow: 0 10px 24px rgba(0,0,0,0.13);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  animation: pulse 1.7s infinite;
}

.note-button img {
  width: 76%;
  height: 76%;
  object-fit: contain;
}

.tap-text {
  margin-top: 10px;
  font-size: clamp(13px, 2.8vw, 18px);
  font-weight: 800;
  color: #444;
}

.options {
  width: min(94vw, 850px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(8px, 2vw, 18px);
}

.option-card {
  background: #ffffff;
  border: 3px solid #ffffff;
  border-radius: 18px;
  min-height: clamp(115px, 24vh, 185px);
  padding: clamp(6px, 1.5vw, 12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 18px rgba(0,0,0,0.13);
  cursor: pointer;
  transition: transform 0.15s ease, border 0.15s ease;
}

.option-card img {
  width: 100%;
  height: clamp(70px, 15vh, 125px);
  object-fit: contain;
}

.option-card span {
  margin-top: 5px;
  font-size: clamp(14px, 3.1vw, 22px);
  font-weight: 900;
  color: #222;
  text-transform: lowercase;
}

.option-card:active {
  transform: scale(0.95);
}

.feedback {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 20;
}

.feedback.show {
  display: flex;
}

.mark {
  width: clamp(95px, 22vw, 170px);
  height: clamp(95px, 22vw, 170px);
  border-radius: 50%;
  background: #ffffffee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(60px, 15vw, 120px);
  font-weight: 900;
  box-shadow: 0 12px 28px rgba(0,0,0,0.22);
  animation: pop 0.35s ease;
}

.tick {
  color: #16a34a;
}

.cross {
  color: #e53935;
}

.wrong-shake {
  animation: shake 0.35s ease;
}

/* Final Slide */
.final-slide {
  background: linear-gradient(135deg, #fff0c7, #d7f9ff);
  justify-content: center;
  gap: 24px;
}

.final-message {
  font-size: clamp(44px, 12vw, 90px);
  font-weight: 900;
  color: #222;
  text-align: center;
  background: #ffffffdd;
  padding: 20px 34px;
  border-radius: 28px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.16);
  z-index: 5;
}

.play-again {
  border: none;
  background: white;
  color: #222;
  font-size: clamp(18px, 4vw, 26px);
  font-weight: 900;
  padding: 13px 28px;
  border-radius: 999px;
  box-shadow: 0 8px 18px rgba(0,0,0,0.18);
  cursor: pointer;
  z-index: 5;
  text-transform: lowercase;
}

.rain-item {
  position: absolute;
  top: -90px;
  font-size: clamp(30px, 8vw, 62px);
  animation: rainFall linear forwards;
  z-index: 1;
}

.rain-img {
  position: absolute;
  top: -95px;
  width: clamp(42px, 9vw, 78px);
  height: clamp(42px, 9vw, 78px);
  object-fit: contain;
  animation: rainFall linear forwards;
  z-index: 1;
}

/* Animations */
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

@keyframes pop {
  0% { transform: scale(0.4); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
}

@keyframes rainFall {
  0% {
    transform: translateY(-90px) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(120vh) rotate(360deg);
    opacity: 0.95;
  }
}

/* Mobile */
@media (max-width: 480px) {
  .slide {
    padding: 8px;
  }

  .instruction {
    font-size: 18px;
  }

  .note-button {
    width: 118px;
    height: 118px;
  }

  .tap-text {
    font-size: 13px;
    margin-top: 7px;
  }

  .options {
    width: 96vw;
    gap: 7px;
  }

  .option-card {
    min-height: 112px;
    padding: 6px;
    border-radius: 14px;
  }

  .option-card img {
    height: 72px;
  }

  .option-card span {
    font-size: 14px;
  }
}

/* Small height phones */
@media (max-height: 560px) {
  .instruction {
    font-size: 16px;
  }

  .note-button {
    width: 90px;
    height: 90px;
  }

  .tap-text {
    font-size: 12px;
    margin-top: 4px;
  }

  .option-card {
    min-height: 86px;
    padding: 5px;
  }

  .option-card img {
    height: 52px;
  }

  .option-card span {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<!-- 1st Slide: Innovine Logo -->
<div id="splash">
  <img src="assets/innovine-logo.png" alt="innovine logo">
</div>

<!-- Game Area -->
<div id="game"></div>

<script>
const ASSET_PATH = "assets/";

const questions = [
  {
    answer: "flute",
    audio: "flute.mp3",
    bg: "#fff0d9",
    options: ["flute", "clapping", "xylophone"]
  },
  {
    answer: "violin",
    audio: "violin.mp3",
    bg: "#e5f5ff",
    options: ["violin", "tambourine", "maracas"]
  },
  {
    answer: "clapping",
    audio: "clapping.mp3",
    bg: "#f7e9ff",
    options: ["clapping", "drum", "guitar"]
  },
  {
    answer: "tambourine",
    audio: "tambourine.mp3",
    bg: "#e9ffe9",
    options: ["tambourine", "guitar", "violin"]
  },
  {
    answer: "xylophone",
    audio: "xylophone.mp3",
    bg: "#fff4f4",
    options: ["xylophone", "drum", "maracas"]
  },
  {
    answer: "drum",
    audio: "drum.mp3",
    bg: "#eef0ff",
    options: ["drum", "flute", "tambourine"]
  },
  {
    answer: "maracas",
    audio: "maracas.mp3",
    bg: "#f2ffe7",
    options: ["maracas", "violin", "xylophone"]
  },
  {
    answer: "guitar",
    audio: "guitar.mp3",
    bg: "#fff7df",
    options: ["guitar", "clapping", "drum"]
  }
];

let currentIndex = 0;
let currentAudio = null;
let lockAnswer = false;

const splash = document.getElementById("splash");
const game = document.getElementById("game");

setTimeout(() => {
  splash.style.display = "none";
  game.style.display = "block";
  showQuestion();
}, 3000);

/* Shuffle function so correct answer appears in different places */
function shuffleArray(array) {
  const shuffled = [...array];

  for (let i = shuffled.length - 1; i > 0; i--) {
    const randomIndex = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[i]];
  }

  return shuffled;
}

function showQuestion() {
  lockAnswer = false;

  const q = questions[currentIndex];
  const shuffledOptions = shuffleArray(q.options);

  game.innerHTML = `
    <div class="slide" style="background:${q.bg}">
      
      <div class="instruction">
        Listen to the audio and identify the correct musical instrument.
      </div>

      <div class="note-area">
        <button class="note-button" onclick="playInstrumentAudio()" aria-label="play audio">
          <img src="${ASSET_PATH}musicalnote.png" alt="musical note">
        </button>
        <div class="tap-text">tap the musical note</div>
      </div>

      <div class="options">
        ${shuffledOptions.map(item => `
          <div class="option-card" onclick="checkAnswer('${item}', this)">
            <img src="${ASSET_PATH}${item}.png" alt="${item}">
            <span>${item}</span>
          </div>
        `).join("")}
      </div>

      <div class="feedback" id="feedback">
        <div class="mark" id="mark"></div>
      </div>

    </div>
  `;
}

function playInstrumentAudio() {
  const q = questions[currentIndex];

  stopCurrentAudio();

  currentAudio = new Audio(ASSET_PATH + q.audio);
  currentAudio.currentTime = 0;
  currentAudio.play().catch(() => {});
}

function stopCurrentAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
}

function checkAnswer(selected, card) {
  if (lockAnswer) return;

  const q = questions[currentIndex];
  const feedback = document.getElementById("feedback");
  const mark = document.getElementById("mark");

  if (selected === q.answer) {
    lockAnswer = true;
    stopCurrentAudio();

    mark.className = "mark tick";
    mark.innerHTML = "✓";
    feedback.classList.add("show");

    setTimeout(() => {
      feedback.classList.remove("show");
      currentIndex++;

      if (currentIndex < questions.length) {
        showQuestion();
      } else {
        showFinalSlide();
      }
    }, 950);

  } else {
    card.classList.remove("wrong-shake");
    void card.offsetWidth;
    card.classList.add("wrong-shake");

    mark.className = "mark cross";
    mark.innerHTML = "✕";
    feedback.classList.add("show");

    playWrongSound();

    setTimeout(() => {
      feedback.classList.remove("show");
    }, 750);
  }
}

function playWrongSound() {
  try {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const oscillator = ctx.createOscillator();
    const gain = ctx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(160, ctx.currentTime);
    oscillator.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.28);

    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.32);

    oscillator.connect(gain);
    gain.connect(ctx.destination);

    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.32);
  } catch (e) {}
}

function showFinalSlide() {
  stopCurrentAudio();

  game.innerHTML = `
    <div class="slide final-slide">
      <div class="final-message">Good job!</div>
      <button class="play-again" onclick="restartGame()">play again</button>
    </div>
  `;

  startInstrumentRain();
}

function startInstrumentRain() {
  const finalSlide = document.querySelector(".final-slide");

  const emojis = ["🎵", "🎶", "🎼", "👏", "⭐", "💛"];
  const images = [
    "flute.png",
    "violin.png",
    "clapping.png",
    "tambourine.png",
    "xylophone.png",
    "drum.png",
    "maracas.png",
    "guitar.png"
  ];

  let count = 0;

  const rainInterval = setInterval(() => {
    if (!document.querySelector(".final-slide")) {
      clearInterval(rainInterval);
      return;
    }

    let item;
    const useImage = Math.random() > 0.45;

    if (useImage) {
      item = document.createElement("img");
      item.src = ASSET_PATH + images[Math.floor(Math.random() * images.length)];
      item.className = "rain-img";
    } else {
      item = document.createElement("div");
      item.className = "rain-item";
      item.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    }

    item.style.left = Math.random() * 94 + "vw";
    item.style.animationDuration = (3 + Math.random() * 2.3) + "s";

    finalSlide.appendChild(item);

    setTimeout(() => {
      if (item && item.parentNode) {
        item.remove();
      }
    }, 6000);

    count++;

    if (count > 90) {
      clearInterval(rainInterval);
    }
  }, 170);
}

function restartGame() {
  currentIndex = 0;
  showQuestion();
}
</script>

</body>
</html>
