<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Full Empty Half Game</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Baloo 2',cursive;
    background:#fff;
}

/* ==========================
SLIDES
========================== */

.slide{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

/* ==========================
SLIDE 1
========================== */

#slide1{
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:20;
    transition:1s ease;
}

#slide1.fade{
    opacity:0;
    visibility:hidden;
}

#logo{
    width:min(45vw,320px);
    max-width:320px;
    object-fit:contain;
}

/* ==========================
SLIDE 2
========================== */

#slide2{
    display:none;
    flex-direction:column;
    padding:12px;
    overflow:hidden;

    background-image:
    url("assets/background.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

#slide2::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.45);
    z-index:0;
}

#slide2 *{
    position:relative;
    z-index:2;
}

.title{
    width:100%;
    text-align:center;
    font-size:clamp(24px,3vw,44px);
    font-weight:800;
    color:#5d4037;
    background:rgba(255,255,255,0.96);
    padding:12px;
    border-radius:20px;
    box-shadow:0 5px 12px rgba(0,0,0,0.15);
    margin-bottom:12px;
}

/* ==========================
GAME LAYOUT
========================== */

.game-layout{
    flex:1;
    display:flex;
    gap:16px;
    overflow:hidden;
}

/* ==========================
LEFT PANEL
========================== */

.left-panel{
    width:48%;
    background:rgba(255,255,255,0.92);
    border-radius:25px;
    padding:18px;
    overflow-y:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

.items-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
}

.item{
    background:white;
    border-radius:24px;
    padding:10px;
    cursor:pointer;
    transition:0.25s;
    min-height:210px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    border:6px solid #ff80ab;

    box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

.item:nth-child(2n){
    border-color:#4fc3f7;
}

.item:nth-child(3n){
    border-color:#81c784;
}

.item:nth-child(4n){
    border-color:#ffca28;
}

.item.selected{
    transform:scale(1.08);
    box-shadow:0 0 0 7px #ffd54f;
}

/* ==========================
IMAGE SIZES
========================== */

.item img{
    width:100%;
    object-fit:contain;
}

/* normal images */

.normal-img{
    max-width:150px;
    height:150px;
}

/* bigger empty images */

.big-empty{
    max-width:185px;
    height:185px;
}

/* ==========================
LABELS
========================== */

.item-label{
    margin-top:2px;
    font-size:34px;
    font-weight:800;
    color:#222;
    text-transform:lowercase;
    text-align:center;
    line-height:1;
}

/* ==========================
RIGHT PANEL
========================== */

.right-panel{
    width:52%;
    display:flex;
    gap:14px;
}

.column{
    flex:1;
    background:rgba(255,255,255,0.94);
    border-radius:25px;
    padding:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    border:5px solid white;
    overflow-y:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

.column h2{
    width:100%;
    text-align:center;
    color:white;
    font-size:clamp(24px,2vw,36px);
    border-radius:16px;
    padding:10px;
    margin-bottom:14px;
    text-transform:lowercase;
    font-weight:800;
}

.full h2{
    background:#66bb6a;
}

.empty h2{
    background:#ef5350;
}

.half h2{
    background:#42a5f5;
}

.drop-zone{
    width:100%;
    min-height:520px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

.drop-zone img{
    width:130px;
    height:130px;
    object-fit:contain;
    background:white;
    border-radius:18px;
    padding:6px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ==========================
FEEDBACK
========================== */

#feedback{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
    z-index:100;
}

.feedback-icon{
    font-size:130px;
    animation:pop 0.5s ease;
}

.correct{
    color:#00c853;
}

.wrong{
    color:#ff1744;
}

@keyframes pop{

    0%{
        transform:scale(0);
        opacity:0;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

/* ==========================
SLIDE 3
========================== */

#slide3{
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    linear-gradient(135deg,#ffeb3b,#ff8a65,#4fc3f7,#81c784);

    overflow:hidden;
}

#message{
    font-size:clamp(50px,7vw,110px);
    color:white;
    text-shadow:4px 4px 10px rgba(0,0,0,0.25);
    animation:bounce 1s infinite;
    z-index:5;
}

@keyframes bounce{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-15px);
    }

}

/* ==========================
CONFETTI
========================== */

.confetti{
    position:absolute;
    width:16px;
    height:16px;
    opacity:0.9;
    animation:fall linear forwards;
}

@keyframes fall{

    0%{
        transform:translateY(-100px) rotate(0deg);
    }

    100%{
        transform:translateY(120vh) rotate(720deg);
    }

}

/* ==========================
MOBILE RESPONSIVE
========================== */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    #slide2{
        overflow:auto;
    }

    .game-layout{
        flex-direction:column;
        overflow:auto;
    }

    .left-panel,
    .right-panel{
        width:100%;
    }

    .right-panel{
        flex-direction:column;
    }

    .drop-zone{
        min-height:220px;
    }

    .items-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .item{
        min-height:190px;
    }

    .normal-img{
        max-width:120px;
        height:120px;
    }

    .big-empty{
        max-width:150px;
        height:150px;
    }

    .drop-zone img{
        width:100px;
        height:100px;
    }

    .item-label{
        font-size:26px;
    }

}

/* ==========================
VERY SMALL PHONES
========================== */

@media(max-width:480px){

    .items-grid{
        grid-template-columns:repeat(2,1fr);
        gap:10px;
    }

    .item{
        min-height:170px;
        padding:8px;
    }

    .normal-img{
        width:100px;
        height:100px;
    }

    .big-empty{
        width:130px;
        height:130px;
    }

    .drop-zone img{
        width:85px;
        height:85px;
    }

    .title{
        font-size:22px;
    }

    .item-label{
        font-size:22px;
    }

}

</style>
</head>

<body>

<!-- ==========================
SLIDE 1
========================== -->

<div id="slide1" class="slide">

    <img
    src="assets/innovine-logo.png"
    alt="Innovine Logo"
    id="logo">

</div>

<!-- ==========================
SLIDE 2
========================== -->

<div id="slide2" class="slide">

    <div class="title">
        Place the container on the correct column.
    </div>

    <div class="game-layout">

        <!-- LEFT PANEL -->

        <div class="left-panel">

            <div class="items-grid" id="itemsGrid"></div>

        </div>

        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <div class="column full">

                <h2>full</h2>

                <div class="drop-zone" data-column="full"></div>

            </div>

            <div class="column empty">

                <h2>empty</h2>

                <div class="drop-zone" data-column="empty"></div>

            </div>

            <div class="column half">

                <h2>half</h2>

                <div class="drop-zone" data-column="half"></div>

            </div>

        </div>

    </div>

</div>

<!-- ==========================
SLIDE 3
========================== -->

<div id="slide3" class="slide">

    <div id="message">
        Fantastic!
    </div>

</div>

<!-- ==========================
FEEDBACK
========================== -->

<div id="feedback"></div>

<!-- ==========================
AUDIO
========================== -->

<audio id="correctSound">
<source src="assets/correct.mp3" type="audio/mp3">
</audio>

<audio id="wrongSound">
<source src="assets/wrong.mp3" type="audio/mp3">
</audio>

<script>

/* ==========================
SPLASH SCREEN
========================== */

setTimeout(()=>{

    document
    .getElementById("slide1")
    .classList.add("fade");

    setTimeout(()=>{

        document
        .getElementById("slide1")
        .style.display="none";

        document
        .getElementById("slide2")
        .style.display="flex";

    },1000);

},2000);

/* ==========================
GAME DATA
========================== */

const gameItems = [

{
    label:"half",
    image:"assets/halfbottle.png",
    answer:"half",
    size:"normal-img"
},

{
    label:"empty",
    image:"assets/emptybottle.png",
    answer:"empty",
    size:"big-empty"
},

{
    label:"full",
    image:"assets/fullglass.png",
    answer:"full",
    size:"normal-img"
},

{
    label:"half",
    image:"assets/halfbowl.png",
    answer:"half",
    size:"normal-img"
},

{
    label:"empty",
    image:"assets/emptybowl.png",
    answer:"empty",
    size:"big-empty"
},

{
    label:"full",
    image:"assets/fulljar.png",
    answer:"full",
    size:"normal-img"
},

{
    label:"half",
    image:"assets/halfglass.png",
    answer:"half",
    size:"normal-img"
},

{
    label:"empty",
    image:"assets/emptyglass.png",
    answer:"empty",
    size:"big-empty"
},

{
    label:"full",
    image:"assets/fullbowl.png",
    answer:"full",
    size:"normal-img"
}

];

/* ==========================
SHUFFLE IMAGES
========================== */

gameItems.sort(()=>Math.random()-0.5);

/* ==========================
CREATE ITEMS
========================== */

const itemsGrid = document.getElementById("itemsGrid");

let selectedItem = null;
let completed = 0;

gameItems.forEach((item)=>{

    const div = document.createElement("div");

    div.className = "item";

    div.innerHTML = `

    <img
    src="${item.image}"
    class="${item.size}"
    alt="${item.label}">

    <div class="item-label">
        ${item.label}
    </div>

    `;

    div.addEventListener("click",()=>{

        document
        .querySelectorAll(".item")
        .forEach(i=>i.classList.remove("selected"));

        div.classList.add("selected");

        selectedItem = {
            element:div,
            data:item
        };

    });

    itemsGrid.appendChild(div);

});

/* ==========================
COLUMN CLICK
========================== */

document
.querySelectorAll(".drop-zone")
.forEach(zone=>{

    zone.addEventListener("click",()=>{

        if(!selectedItem) return;

        const chosenColumn =
        zone.dataset.column;

        const correctAnswer =
        selectedItem.data.answer;

        if(chosenColumn === correctAnswer){

            showFeedback(true);

            playCorrect();

            const img =
            document.createElement("img");

            img.src =
            selectedItem.data.image;

            zone.appendChild(img);

            selectedItem.element.remove();

            selectedItem = null;

            completed++;

            if(completed === gameItems.length){

                setTimeout(()=>{

                    showFinalSlide();

                },1200);

            }

        }else{

            showFeedback(false);

            playWrong();

        }

    });

});

/* ==========================
FEEDBACK
========================== */

function showFeedback(correct){

    const feedback =
    document.getElementById("feedback");

    feedback.innerHTML = `
    <div class="feedback-icon ${correct ? 'correct':'wrong'}">
        ${correct ? '✔':'✖'}
    </div>
    `;

    setTimeout(()=>{

        feedback.innerHTML = "";

    },700);

}

/* ==========================
AUDIO
========================== */

function playCorrect(){

    const audio =
    document.getElementById("correctSound");

    audio.currentTime = 0;

    audio.play();

}

function playWrong(){

    const audio =
    document.getElementById("wrongSound");

    audio.currentTime = 0;

    audio.play();

}

/* ==========================
FINAL SLIDE
========================== */

function showFinalSlide(){

    document
    .getElementById("slide2")
    .style.display="none";

    document
    .getElementById("slide3")
    .style.display="flex";

    createConfetti();

}

/* ==========================
CONFETTI
========================== */

function createConfetti(){

    const slide3 =
    document.getElementById("slide3");

    for(let i=0;i<200;i++){

        const confetti =
        document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left =
        Math.random()*100 + "vw";

        confetti.style.animationDuration =
        (Math.random()*3 + 2) + "s";

        confetti.style.background =
        `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.width =
        confetti.style.height =
        (Math.random()*14 + 8) + "px";

        slide3.appendChild(confetti);

    }

}

</script>

</body>
</html>
