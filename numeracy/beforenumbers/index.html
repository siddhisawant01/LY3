<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Numbers Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial;
  touch-action: manipulation;
}

body{
  overflow:hidden;
  background: linear-gradient(#5ecbff, #8fdc6a);
}

/* ---------- SCREEN ---------- */
.screen{
  width:100vw;
  height:100vh;
  display:none;
}
.active{
  display:flex;
  flex-direction:column;
}

/* ---------- SPLASH ---------- */
#splash{
  justify-content:center;
  align-items:center;
  background:#fff;
}
#splash img{
  width:40vmin;
}

/* ---------- HEADER ---------- */
.header{
  text-align:center;
  font-size:3vmin;
  font-weight:bold;
  padding:1vmin;
}

/* ---------- GAME AREA ---------- */
.game-area{
  flex:1;
  position:relative;
}

/* ---------- TRAIN ---------- */
.train{
  position:absolute;
  width:95%;
  left:2.5%;
  top:30%;
  transition: transform 1.2s ease;
}
.train img{
  width:100%;
}

/* ---------- NUMBER OVERLAY ---------- */
.num{
  position:absolute;
  top:48%;
  transform:translate(-50%,-50%);
  font-size:3.5vmin;
  font-weight:bold;
}

/* Adjust if needed */
.n1{ left:34%; }
.n2{ left:46%; }
.n3{ left:57%; }
.n4{ left:68%; }
.n5{ left:79%; }

/* ---------- SUN ---------- */
.sun{
  position:absolute;
  top:2%;
  right:2%;
  font-size:6vmin;
}

/* ---------- OPTIONS ---------- */
.options{
  display:flex;
  justify-content:center;
  gap:3vmin;
  padding:2vmin;
}

.option{
  width:12vmin;
  height:12vmin;
  border-radius:50%;
  background:#fff;
  border:4px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:4vmin;
  font-weight:bold;
}

.option.selected{
  border:6px solid #ff4081;
  transform:scale(1.1);
}

/* ---------- SHAKE ---------- */
@keyframes shake{
  0%{transform:translateX(0)}
  50%{transform:translateX(10px)}
  100%{transform:translateX(0)}
}
.shake{
  animation:shake 0.4s;
}

/* ---------- VICTORY ---------- */
#victory{
  justify-content:center;
  align-items:center;
  font-size:6vmin;
  color:green;
}

/* ---------- CONFETTI ---------- */
.confetti{
  position:absolute;
  width:1vmin;
  height:1vmin;
  animation:fall 2s linear infinite;
}
@keyframes fall{
  to{transform:translateY(100vh)}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div class="header">
    Identify the missing number from the given options
  </div>

  <div class="game-area">

    <div id="sun" class="sun">😊</div>

    <div id="train" class="train">
      <img src="assets/train.png">

      <div class="num n1" id="n1">_</div>
      <div class="num n2" id="n2"></div>
      <div class="num n3" id="n3"></div>
      <div class="num n4" id="n4"></div>
      <div class="num n5" id="n5"></div>
    </div>

  </div>

  <div class="options" id="options"></div>

</div>

<!-- VICTORY -->
<div id="victory" class="screen">
  🎉 Great Job! 🎉
</div>

<script>
const correctSound = new Audio('assets/correct.mp3');
const wrongSound = new Audio('assets/wrong.mp3');

const slides = [
  { nums:['_',18,19,20,21], options:[15,14,17], correct:17 },
  { nums:['_',21,22,23,24], options:[25,20,19], correct:20 },
  { nums:['_',26,27,28,29], options:[25,22,12], correct:25 },
  { nums:['_',18,19,20,21], options:[15,14,17], correct:17 },
  { nums:['_',12,13,14,15], options:[15,14,11], correct:11 }
];

let current = 0;
let selected = null;

/* START */
setTimeout(()=>{
  show('game');
  loadSlide();
},2000);

/* SCREEN SWITCH */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* LOAD SLIDE */
function loadSlide(){
  selected = null;

  const d = slides[current];

  n1.innerText = "_";
  n2.innerText = d.nums[1];
  n3.innerText = d.nums[2];
  n4.innerText = d.nums[3];
  n5.innerText = d.nums[4];

  options.innerHTML = '';

  d.options.forEach(num=>{
    const div = document.createElement('div');
    div.className = 'option';
    div.innerText = num;

    div.onclick = ()=>{
      document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      div.classList.add('selected');
      selected = num;
    };

    options.appendChild(div);
  });

  sun.innerText = '😊';

  // reset position (fix reverse bug)
  train.style.transform = 'translateX(0)';
}

/* CHECK ANSWER */
n1.onclick = ()=>{
  if(selected === null) return;

  const d = slides[current];

  if(selected === d.correct){
    correctSound.play();
    sun.innerText = '😄';

    train.style.transform = 'translateX(-120%)';

    setTimeout(()=>{
      current++;
      if(current >= slides.length){
        showVictory();
      } else {
        loadSlide();
      }
    },1500);

  } else {
    wrongSound.play();
    sun.innerText = '😢';

    train.classList.add('shake');
    setTimeout(()=>train.classList.remove('shake'),400);

    selected = null;
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  }
};

/* VICTORY */
function showVictory(){
  show('victory');

  for(let i=0;i<60;i++){
    let c = document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
