<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{height:100vh;overflow:hidden;background:#87CEEB;}
.game{display:flex;flex-direction:column;height:100vh;}

.header{
  text-align:center;
  font-size:2.2vh;
  font-weight:bold;
  padding:10px;
}

.sun{
  position:absolute;
  top:10px;
  left:10px;
  font-size:40px;
}

/* TRACK */
.track{
  height:60px;
  background:
    repeating-linear-gradient(90deg,#5d4037 0 30px,#8d6e63 30px 60px);
  position:relative;
}
.track:after{
  content:"";
  position:absolute;
  top:20px;
  width:100%;
  height:6px;
  background:#3e2723;
}

/* TRAIN */
.train-wrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.train{
  display:flex;
  align-items:flex-end;
  gap:10px;
  transition:transform 2s linear;
}

/* ENGINE */
.engine{
  width:110px;height:90px;
  background:#1976d2;
  border-radius:15px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:30px;height:30px;
  background:#90caf9;
  top:15px;left:20px;
  border-radius:6px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:12px;height:12px;
  background:#ccc;
  border-radius:50%;
  top:-10px;
  left:80px;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-50px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:90px;height:90px;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.comp .window{
  width:60px;height:50px;
  background:#fff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-15px;
  width:16px;height:16px;
  background:#000;
  border-radius:50%;
}
.w1{left:15px;}
.w2{right:15px;}

/* OPTIONS */
.options{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:15px;
}
.opt{
  width:70px;height:70px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  border:3px solid #444;
}
.opt.selected{border:5px solid green;}

/* FINAL */
.final{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#b3e5fc;
}
.final h1{font-size:40px;margin-bottom:20px;}

.loopTrain{
  position:absolute;
  bottom:60px;
  display:flex;
  animation:loop 8s linear infinite;
}
@keyframes loop{
  0%{transform:translateX(100vw);}
  100%{transform:translateX(-120vw);}
}
</style>
</head>

<body>

<div id="game" class="game">

<div class="header">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="train-wrap">
  <div id="train" class="train"></div>
</div>

<div class="track"></div>

<div class="options" id="options"></div>

</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25},
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",12,13,14,15],opt:[15,14,11],ans:11}
];

let current=0,selected=null;

const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

function createTrain(data){
  train.innerHTML="";
  
  // ENGINE
  let engine=document.createElement("div");
  engine.className="engine";
  
  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);

  train.appendChild(engine);

  data.forEach((n,i)=>{
    let comp=document.createElement("div");
    comp.className="comp c"+(i+1);

    let win=document.createElement("div");
    win.className="window";
    win.innerText=n;

    comp.appendChild(win);

    // wheels
    let w1=document.createElement("div");
    w1.className="wheel w1";
    let w2=document.createElement("div");
    w2.className="wheel w2";
    comp.appendChild(w1);
    comp.appendChild(w2);

    if(i===0){
      comp.onclick=check;
    }

    train.appendChild(comp);
  });

  // center reset
  train.style.transform="translateX(0)";
}

function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;

    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    }

    optionsDiv.appendChild(d);
  });
}

function check(){
  if(selected==null)return;

  if(selected===levels[current].ans){
    new Audio("assets/correct.mp3").play();
    sun.innerText="😊";

    train.style.transform="translateX(-120vw)";

    setTimeout(()=>{
      current++;
      if(current>=levels.length){
        showFinal();
      }else{
        load();
      }
    },2000);

  }else{
    new Audio("assets/wrong.mp3").play();
    sun.innerText="😢";
    selected=null;
    document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
  }
}

function load(){
  selected=null;
  sun.innerText="😊";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

function showFinal(){
  document.body.innerHTML=`
  <div class="final">
    <h1>🎉 Great Job 🎉</h1>
    <div class="track"></div>
    <div class="loopTrain" id="loopTrain"></div>
  </div>
  `;

  const loop=document.getElementById("loopTrain");

  function makeLoopTrain(){
    loop.innerHTML="";

    let engine=document.createElement("div");
    engine.className="engine";
    let smoke=document.createElement("div");
    smoke.className="smoke";
    engine.appendChild(smoke);
    loop.appendChild(engine);

    for(let i=0;i<5;i++){
      let c=document.createElement("div");
      c.className="comp c"+((i%5)+1);

      let w1=document.createElement("div");
      w1.className="wheel w1";
      let w2=document.createElement("div");
      w2.className="wheel w2";

      c.appendChild(w1);
      c.appendChild(w2);
      loop.appendChild(c);
    }
  }

  makeLoopTrain();
}

load();
</script>

</body>
</html>
