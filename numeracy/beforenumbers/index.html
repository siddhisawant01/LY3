<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  overflow:hidden;
}

/* ---------- SLIDES ---------- */
.slide{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* ---------- INTRO SLIDE ---------- */
#intro{
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
}

.logo{
  width:150px;
  margin-bottom:20px;
}

.startBtn{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff9800;
  color:#fff;
}

/* ---------- GAME ---------- */
#game{
  display:none;
  flex-direction:column;
  height:100vh;
  background:linear-gradient(#87CEEB 65%, #4CAF50 65%);
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-weight:bold;
  font-size:clamp(16px,2.5vw,26px);
  padding:10px;
}
.sun{font-size:30px;}

/* MAIN LAYOUT */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* TRAIN AREA */
.train-area{
  flex:2;
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

/* TRACK */
.track{
  position:absolute;
  bottom:10%;
  width:100%;
  height:40px;
  background:repeating-linear-gradient(90deg,#5d4037 0 30px,#8d6e63 30px 60px);
}
.track:before,.track:after{
  content:"";
  position:absolute;
  width:100%;
  height:4px;
  background:#3e2723;
}
.track:before{top:8px;}
.track:after{bottom:8px;}

/* TRAIN */
.train{
  display:flex;
  gap:6px;
  position:absolute;
  bottom:14%;
  transform:translateX(120%);
}

/* ENGINE */
.engine{
  width:70px;height:60px;
  background:#1976d2;
  border-radius:10px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:20px;height:20px;
  background:#90caf9;
  top:10px;left:10px;
  border-radius:5px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:10px;height:10px;
  background:#ddd;
  border-radius:50%;
  top:-10px;
  left:50px;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-40px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:70px;height:60px;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.window{
  width:70%;
  height:60%;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-8px;
  width:10px;height:10px;
  background:#000;
  border-radius:50%;
}
.w1{left:8px;}
.w2{right:8px;}

/* OPTIONS */
.options{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.opt{
  width:60px;height:60px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border:3px solid #444;
}
.opt.selected{border:4px solid green;}

/* ---------- FINAL ---------- */
#final{
  display:none;
  background:linear-gradient(#81d4fa,#a5d6a7);
}

.loopTrain{
  position:absolute;
  bottom:20%;
  display:flex;
  gap:6px;
  animation:move 8s linear infinite;
}
@keyframes move{
  0%{transform:translateX(120vw);}
  100%{transform:translateX(-140vw);}
}
</style>
</head>

<body>

<!-- ---------- INTRO ---------- -->
<div id="intro" class="slide">
  <img src="assets/innovine.png" class="logo">
  <button class="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- ---------- GAME ---------- -->
<div id="game">
  <div class="header">
    <div class="sun" id="sun">😊</div>
    Identify the before number from the given options
  </div>

  <div class="main">
    <div class="train-area">
      <div class="track"></div>
      <div id="train" class="train"></div>
    </div>

    <div id="options" class="options"></div>
  </div>
</div>

<!-- ---------- FINAL ---------- -->
<div id="final" class="slide">
  <h1>🎉 Great Job 🎉</h1>
  <div class="track"></div>
  <div id="loopTrain" class="loopTrain"></div>
</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20}
];

let current=0,selected=null;

/* START */
function startGame(){
  document.getElementById("intro").style.display="none";
  document.getElementById("game").style.display="flex";
  load();
}

/* CREATE TRAIN */
function createTrain(data){
  const t=document.getElementById("train");
  t.innerHTML="";

  let e=document.createElement("div");
  e.className="engine";
  let s=document.createElement("div");
  s.className="smoke";
  e.appendChild(s);
  wheels(e);
  t.appendChild(e);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    wheels(c);

    if(i===0)c.onclick=check;

    t.appendChild(c);
  });

  setTimeout(()=>{
    t.style.transition="1s";
    t.style.transform="translateX(0)";
  },100);
}

function wheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1); el.appendChild(w2);
}

/* OPTIONS */
function createOptions(arr){
  const d=document.getElementById("options");
  d.innerHTML="";

  arr.forEach(v=>{
    let o=document.createElement("div");
    o.className="opt";
    o.innerText=v;

    o.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      o.classList.add("selected");
      selected=v;
    };

    d.appendChild(o);
  });
}

/* CHECK */
function check(){
  if(selected==null)return;

  const t=document.getElementById("train");

  if(selected===levels[current].ans){
    document.getElementById("sun").innerText="😊";

    t.children[1].querySelector(".window").innerText=selected;

    setTimeout(()=>{
      t.style.transform="translateX(-120%)";
    },500);

    setTimeout(()=>{
      current++;
      if(current>=levels.length){
        showFinal();
      }else load();
    },2000);

  }else{
    document.getElementById("sun").innerText="😢";
  }
}

/* LOAD */
function load(){
  selected=null;
  document.getElementById("sun").innerText="😊";

  const t=document.getElementById("train");
  t.style.transition="none";
  t.style.transform="translateX(120%)";

  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

/* FINAL */
function showFinal(){
  document.getElementById("game").style.display="none";
  document.getElementById("final").style.display="flex";

  const loop=document.getElementById("loopTrain");

  let e=document.createElement("div");
  e.className="engine";
  let s=document.createElement("div");
  s.className="smoke";
  e.appendChild(s);
  wheels(e);
  loop.appendChild(e);

  for(let i=0;i<5;i++){
    let c=document.createElement("div");
    c.className="comp c"+((i%5)+1);
    wheels(c);
    loop.appendChild(c);
  }
}
</script>

</body>
</html>
