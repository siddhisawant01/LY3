<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Before Number Train Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
flex-direction:column;
background:linear-gradient(#6ec6ff,#4caf50);
}

/* TITLE */
.title{
text-align:center;
font-size:clamp(16px,3.5vw,28px);
font-weight:bold;
padding:8px;
}

/* SUN */
.sun{
position:absolute;
top:10px;
left:10px;
font-size:32px;
}

/* MAIN GAME */
.game{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* TRACK */
.track{
position:absolute;
bottom:18vh;
width:100%;
height:8vh;
background:repeating-linear-gradient(
90deg,
#5d4037 0px,
#5d4037 20px,
#8d6e63 20px,
#8d6e63 40px
);
border-top:5px solid #3e2723;
border-bottom:5px solid #3e2723;
}

/* TRAIN */
.train{
position:absolute;
bottom:22vh;
display:flex;
gap:2vw;
align-items:flex-end;
}

/* ENGINE */
.engine{
width:16vw;
height:12vw;
background:#e53935;
border-radius:12px;
position:relative;
}

.engine::before{
content:"";
position:absolute;
top:20%;
left:20%;
width:30%;
height:30%;
background:#90caf9;
border-radius:5px;
}

/* SMOKE */
.smoke{
position:absolute;
top:-10px;
left:20%;
width:10px;
height:10px;
background:#ccc;
border-radius:50%;
animation:smoke 1s infinite;
}

@keyframes smoke{
0%{opacity:0; transform:translateY(0);}
100%{opacity:1; transform:translateY(-20px);}
}

/* COMPARTMENTS */
.box{
width:14vw;
height:12vw;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.box span{
background:white;
padding:5px 8px;
border-radius:6px;
font-size:clamp(12px,2.5vw,18px);
font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
position:absolute;
bottom:-8px;
width:10px;
height:10px;
background:black;
border-radius:50%;
}

.w1{left:15%;}
.w2{right:15%;}

/* OPTIONS */
.options{
position:absolute;
bottom:5vh;
display:flex;
gap:5vw;
}

.option{
width:14vw;
height:14vw;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(14px,3vw,20px);
border:3px solid #444;
}

/* ANIMATION */
.enter{
animation:enter 1.5s forwards;
}

@keyframes enter{
0%{transform:translateX(100vw);}
100%{transform:translateX(0);}
}

.exit{
animation:exit 1.5s forwards;
}

@keyframes exit{
0%{transform:translateX(0);}
100%{transform:translateX(-120vw);}
}

/* FINAL LOOP */
.loop{
animation:loop 6s linear infinite;
}

@keyframes loop{
0%{transform:translateX(100vw);}
100%{transform:translateX(-120vw);}
}

</style>
</head>

<body>

<div class="title">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="game">

<div class="track"></div>

<div class="train enter" id="train">

<div class="engine">
<div class="smoke"></div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>

<div class="box c1"><span id="q">_</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c2"><span>18</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c3"><span>19</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c4"><span>20</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c5"><span>21</span><div class="wheel w1"></div><div class="wheel w2"></div></div>

</div>

<div class="options">
<div class="option" onclick="check(15)">15</div>
<div class="option" onclick="check(14)">14</div>
<div class="option" onclick="check(17)">17</div>
</div>

</div>

<script>

let answer = 17;

function check(num){

if(num === answer){
document.getElementById("sun").textContent="😄";

let train = document.getElementById("train");
train.classList.remove("enter");
train.classList.add("exit");

setTimeout(showEnd,1500);

}else{
document.getElementById("sun").textContent="😢";
}
}

function showEnd(){

document.body.innerHTML = `
<div class="title">🎉 Great Job 🎉</div>
<div class="sun">😄</div>

<div class="game">
<div class="track"></div>

<div class="train loop">

<div class="engine">
<div class="smoke"></div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>

<div class="box c1"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c2"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c3"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c4"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c5"><div class="wheel w1"></div><div class="wheel w2"></div></div>

</div>
</div>
`;
}

</script>

</body>
</html>
