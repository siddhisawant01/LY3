<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(#87CEEB 60%, #4CAF50 60%);
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  font-size:clamp(18px,3vw,28px);
  padding:1vh;
}

/* SUN */
.sun{
  position:absolute;
  top:1vh;
  left:2vw;
  font-size:clamp(30px,5vw,50px);
}

/* GAME AREA */
.game{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* TRAIN AREA */
.train-area{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* TRACK */
.track{
  position:absolute;
  bottom:18vh;
  width:100%;
  height:8vh;
  background:repeating-linear-gradient(
    90deg,
    #5d4037 0 5vw,
    #8d6e63 5vw 10vw
  );
}
.track:before,
.track:after{
  content:"";
  position:absolute;
  width:100%;
  height:0.8vh;
  background:#3e2723;
}
.track:before{top:2vh;}
.track:after{top:5vh;}

/* TRAIN */
.train{
  display:flex;
  align-items:flex-end;
  gap:2vw;
  position:absolute;
  bottom:26vh;
  transform:translateX(120vw);
}

/* ENGINE */
.engine{
  width:18vw;
  height:14vw;
  background:#1976d2;
  border-radius:2vw;
  position:relative;
}

/* engine window */
.engine:before{
  content:"";
  position:absolute;
  width:5vw;height:4vw;
  background:#90caf9;
  top:2vw;left:3vw;
  border-radius:1vw;
}

/* smoke */
.smoke{
  position:absolute;
  width:2vw;height:2vw;
  background:#ddd;
  border-radius:50%;
  top:-2vw;
  left:12vw;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-6vw);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:16vw;
  height:14vw;
  border-radius:2vw;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* windows */
.window{
  width:10vw;
  height:8vw;
  background:#fff;
  border-radius:1.5vw;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,2.5vw,26px);
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-2vw;
  width:3vw;height:3vw;
  background:#000;
  border-radius:50%;
}
.w1{left:2vw;}
.w2{right:2vw;}

/* OPTIONS */
.options{
  height:20vh;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:4vw;
}
.opt{
  width:12vw;
  height:12vw;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,3vw,26px);
  border:0.5vw solid #444;
}
.opt.selected{border:1vw solid green;}

/* FINAL */
.final{
  height:100vh;
  background:#b3e5fc;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.loopTrain{
  position:absolute;
  bottom:26vh;
  display:flex;
  gap:2vw;
  animation:loop 10s linear infinite;
}
@keyframes loop{
  0%{transform:translateX(120vw);}
  100%{transform:translateX(-140vw);}
}
</style>
</head>

<body>

<div id="game" class="game">
<div class="header">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="train-area">
  <div class="track"></div>
  <div id="train" class="train"></div>
</div>

<div class="options" id="options"></div>
</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25}
];

let current=0,selected=null;

const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

function addWheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1);
  el.appendChild(w2);
}

function createTrain(data){
  train.innerHTML="";

  let engine=document.createElement("div");
  engine.className="engine";

  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);

  addWheels(engine);
  train.appendChild(engine);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    addWheels(c);

    if(i===0) c.onclick=check;

    train.appendChild(c);
  });

  setTimeout(()=>{
    train.style.transition="transform 1.5s ease-out";
    train.style.transform="translateX(0)";
  },100);
}

function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;

    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    };

    optionsDiv.appendChild(d);
  });
}

function check(){
  if(selected==null)return;

  if(selected===levels[current].ans){
    sun.innerText="😊";

    train.style.transition="transform 2s linear";
    train.style.transform="translateX(-140vw)";

    setTimeout(()=>{
      current++;
      if(current>=levels.length) showFinal();
      else load();
    },2000);

  }else{
    sun.innerText="😢";
    selected=null;
    document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
  }
}

function load(){
  selected=null;
  sun.innerText="😊";
  train.style.transition="none";
  train.style.transform="translateX(120vw)";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

function showFinal(){
  document.body.innerHTML=`
  <div class="final">
    <h1>🎉 Great Job 🎉</h1>
    <div class="track"></div>
    <div id="loopTrain" class="loopTrain"></div>
  </div>`;

  const loop=document.getElementById("loopTrain");

  function makeTrain(){
    loop.innerHTML="";
    let engine=document.createElement("div");
    engine.className="engine";
    addWheels(engine);
    loop.appendChild(engine);

    for(let i=0;i<5;i++){
      let c=document.createElement("div");
      c.className="comp c"+((i%5)+1);
      addWheels(c);
      loop.appendChild(c);
    }
  }

  makeTrain();
}

load();
</script>

</body>
</html>
