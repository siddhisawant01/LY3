<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Numbers Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial Rounded MT Bold, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#eee;
}

#game{
    width:100vw;
    max-width:1200px;
    height:675px;
    position:relative;
    overflow:hidden;
    background-size:cover;
    background-position:center;
}

/* ---------------- SLIDE 1 ---------------- */
#slide1{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

#slide1 img{
    width:300px;
}

/* ---------------- GAME ---------------- */
#gameplay{
    display:none;
    width:100%;
    height:100%;
    position:relative;
}

/* Title */
h1{
    text-align:center;
    padding:20px;
    font-size:28px;
}

/* Train Track */
.track{
    position:absolute;
    bottom:140px;
    width:100%;
    height:10px;
    background:#333;
}

/* Train */
#train{
    position:absolute;
    bottom:150px;
    left:100%;
    display:flex;
    align-items:flex-end;
    transition:all 1.5s ease;
}

/* MOVE TRAIN */
#train.start{
    left:5%;
}

/* Engine */
.engine{
    width:120px;
    height:90px;
    background:#0077b6;
    border-radius:10px;
}

/* Compartments */
.box{
    width:90px;
    height:80px;
    background:#fff;
    border:3px solid black;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    margin-left:5px;
}

/* Options */
#options{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:40px;
}

.option{
    width:80px;
    height:80px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    color:white;
    cursor:pointer;
}

.option:nth-child(1){background:#00b4d8;}
.option:nth-child(2){background:#ff4d6d;}
.option:nth-child(3){background:#38b000;}

</style>
</head>

<body>

<div id="game">

<!-- SLIDE 1 -->
<div id="slide1">
    <img src="assets/innovine-logo.png" alt="logo">
</div>

<!-- GAMEPLAY -->
<div id="gameplay">

<h1><b>Identify the missing number from the given options 😊</b></h1>

<div class="track"></div>

<div id="train">
    <!-- ENGINE FIRST -->
    <div class="engine"></div>

    <!-- COMPARTMENTS -->
    <div class="box" id="target">_</div>
    <div class="box">18</div>
    <div class="box">19</div>
    <div class="box">20</div>
    <div class="box">21</div>
</div>

<div id="options">
    <div class="option">15</div>
    <div class="option">14</div>
    <div class="option">17</div>
</div>

</div>
</div>

<script>

// SHOW GAME AFTER 2 SEC
setTimeout(()=>{
    document.getElementById("slide1").style.display="none";
    document.getElementById("gameplay").style.display="block";

    // SET BACKGROUND
    document.getElementById("game").style.backgroundImage="url('assets/bg-slide2.png')";

    // START TRAIN
    document.getElementById("train").classList.add("start");

},2000);


// GAME LOGIC
let correct = "17";

document.querySelectorAll(".option").forEach(btn=>{
    btn.onclick=()=>{
        if(btn.innerText===correct){
            document.getElementById("target").innerText=correct;

            // MOVE TRAIN LEFT OUT
            document.getElementById("train").style.left="-120%";
        }else{
            alert("Try again!");
        }
    }
});

</script>

</body>
</html>
