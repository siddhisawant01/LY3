<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-weight:bold;
  font-size:clamp(16px,2.5vw,26px);
  padding:10px;
  text-align:center;
}
.sun{font-size:clamp(22px,4vw,36px);}

/* GAME LAYOUT (IMPORTANT FIX) */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* TRAIN AREA */
.train-area{
  flex:2;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}

/* TRACK */
.track{
  position:absolute;
  bottom:10%;
  width:100%;
  height:40px;
  background:repeating-linear-gradient(90deg,#5d4037 0 30px,#8d6e63 30px 60px);
}
.track:before,.track:after{
  content:"";
  position:absolute;
  width:100%;
  height:4px;
  background:#3e2723;
}
.track:before{top:8px;}
.track:after{bottom:8px;}

/* TRAIN */
.train{
  display:flex;
  gap:6px;
  align-items:flex-end;
  position:absolute;
  bottom:14%;
  transform:translateX(120%);
}

/* ENGINE */
.engine{
  width:clamp(50px,12vw,90px);
  height:clamp(50px,12vw,80px);
  background:#1976d2;
  border-radius:10px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:30%;
  height:30%;
  background:#90caf9;
  top:20%;
  left:15%;
  border-radius:5px;
}

/* COMPARTMENTS */
.comp{
  width:clamp(50px,12vw,90px);
  height:clamp(50px,12vw,80px);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* WINDOW */
.window{
  width:70%;
  height:60%;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(14px,3vw,22px);
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-8px;
  width:10px;height:10px;
  background:#000;
  border-radius:50%;
}
.w1{left:8px;}
.w2{right:8px;}

/* OPTIONS AREA (FIXED VISIBILITY) */
.options{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  padding:10px;
}

/* OPTION BUTTON */
.opt{
  width:clamp(50px,15vw,80px);
  height:clamp(50px,15vw,80px);
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,3vw,22px);
  border:3px solid #444;
}
.opt.selected{border:4px solid green;}
</style>
</head>

<body>

<div class="header">
  <div class="sun" id="sun">😊</div>
  Identify the before number from the given options
</div>

<div class="main">

  <div class="train-area">
    <div class="track"></div>
    <div id="train" class="train"></div>
  </div>

  <div id="options" class="options"></div>

</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25}
];

let current=0,selected=null;

/* SOUND */
const ctx=new (window.AudioContext||window.webkitAudioContext)();
function sound(type){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.frequency.value = type==="correct"?600:200;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.5);
}

/* CREATE TRAIN */
function createTrain(data){
  const t=document.getElementById("train");
  t.innerHTML="";

  let e=document.createElement("div");
  e.className="engine";
  wheels(e);
  t.appendChild(e);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    wheels(c);

    if(i===0)c.onclick=check;

    t.appendChild(c);
  });

  setTimeout(()=>{
    t.style.transition="1s";
    t.style.transform="translateX(0)";
  },100);
}

function wheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1); el.appendChild(w2);
}

/* OPTIONS */
function createOptions(arr){
  const d=document.getElementById("options");
  d.innerHTML="";

  arr.forEach(v=>{
    let o=document.createElement("div");
    o.className="opt";
    o.innerText=v;

    o.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      o.classList.add("selected");
      selected=v;
    };

    d.appendChild(o);
  });
}

/* CHECK */
function check(){
  if(selected==null)return;

  const t=document.getElementById("train");

  if(selected===levels[current].ans){
    sound("correct");
    document.getElementById("sun").innerText="😊";

    /* fill answer */
    t.children[1].querySelector(".window").innerText=selected;

    setTimeout(()=>{
      t.style.transition="2s linear";
      t.style.transform="translateX(-120%)";
    },400);

    setTimeout(()=>{
      current++;
      if(current>=levels.length){
        alert("🎉 Great Job!");
        location.reload();
      }else load();
    },2200);

  }else{
    sound("wrong");
    document.getElementById("sun").innerText="😢";
  }
}

/* LOAD */
function load(){
  selected=null;
  document.getElementById("sun").innerText="😊";

  const t=document.getElementById("train");
  t.style.transition="none";
  t.style.transform="translateX(120%)";

  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

load();
</script>

</body>
</html>
