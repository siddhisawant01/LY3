<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
  height:100vh;
  overflow:hidden;
}

/* ---------- INTRO SCREEN ---------- */
.intro{
  height:100vh;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a1c4fd);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.logo{
  width:180px;
  margin-bottom:20px;
}

.startBtn{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff5722;
  color:#fff;
  margin-top:20px;
}

/* ---------- GAME ---------- */
.game{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(#87CEEB 60%, #4CAF50 60%);
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  padding:8px;
  font-size:18px;
}

/* SUN */
.sun{
  position:absolute;
  top:50px;
  left:10px;
  font-size:30px;
}

/* TRAIN AREA */
.train-area{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}

/* TRACK */
.track{
  height:60px;
  position:absolute;
  bottom:70px;
  width:100%;
  background:
    repeating-linear-gradient(
      90deg,
      #5d4037 0 30px,
      #8d6e63 30px 60px
    );
}

/* TRAIN */
.train{
  display:flex;
  gap:8px;
  position:absolute;
  bottom:110px;
  transform:translateX(120vw);
}

/* ENGINE */
.engine{
  width:70px;height:60px;
  background:#1976d2;
  border-radius:10px;
  position:relative;
}

.engine:before{
  content:"";
  position:absolute;
  width:20px;height:15px;
  background:#90caf9;
  top:10px;left:10px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:8px;height:8px;
  background:#ddd;
  border-radius:50%;
  top:-8px;
  left:40px;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-30px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:65px;height:60px;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* WINDOW */
.window{
  width:40px;height:30px;
  background:#fff;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-10px;
  width:10px;height:10px;
  background:#000;
  border-radius:50%;
}
.w1{left:10px;}
.w2{right:10px;}

/* OPTIONS */
.options{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}
.opt{
  width:55px;height:55px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  border:2px solid #444;
}
.opt.selected{border:4px solid green;}

/* FINAL */
.final{
  height:100vh;
  background:#b3e5fc;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" class="intro">
  <img src="assets/logo.png" class="logo">
  <h2>Welcome to Number Train Game</h2>
  <button class="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="game" style="display:none;">
  <div class="header">Identify the before number</div>
  <div class="sun" id="sun">😊</div>

  <div class="train-area">
    <div class="track"></div>
    <div id="train" class="train"></div>
  </div>

  <div class="options" id="options"></div>
</div>

<script>
function startGame(){
  document.getElementById("intro").style.display="none";
  document.getElementById("game").style.display="flex";
}

/* GAME LOGIC (same as yours) */
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25}
];

let current=0,selected=null;
const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

function createTrain(data){
  train.innerHTML="";

  let engine=document.createElement("div");
  engine.className="engine";
  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);
  addWheels(engine);
  train.appendChild(engine);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    addWheels(c);

    if(i===0) c.onclick=check;

    train.appendChild(c);
  });

  setTimeout(()=>{
    train.style.transition="1s";
    train.style.transform="translateX(0)";
  },100);
}

function addWheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1);
  el.appendChild(w2);
}

function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;

    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    };

    optionsDiv.appendChild(d);
  });
}

function check(){
  if(selected===levels[current].ans){
    document.querySelector(".window").innerText=selected;

    train.style.transform="translateX(-120vw)";

    setTimeout(()=>{
      current++;
      if(current>=levels.length){
        document.body.innerHTML="<div class='final'><h1>🎉 Great Job 🎉</h1></div>";
      }else load();
    },1500);

  }else{
    sun.innerText="😢";
    setTimeout(()=>sun.innerText="😊",1000);
  }
}

function load(){
  selected=null;
  train.style.transform="translateX(120vw)";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

load();
</script>

</body>
</html>
