<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Numbers Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
  touch-action:manipulation;
}

body{
  overflow:hidden;
  background: linear-gradient(#6ec6ff, #7ed957);
}

/* SCREEN */
.screen{
  width:100vw;
  height:100vh;
  display:none;
}
.active{
  display:flex;
  flex-direction:column;
}

/* SPLASH */
#splash{
  justify-content:center;
  align-items:center;
  background:#fff;
}
#splash img{
  width:40vmin;
}

/* HEADER */
.header{
  text-align:center;
  font-size:3vmin;
  font-weight:bold;
  padding:1vmin;
}

/* GAME AREA */
.game-area{
  flex:1;
  position:relative;
}

/* SUN */
.sun{
  position:absolute;
  top:2%;
  right:2%;
  font-size:6vmin;
}

/* TRAIN */
.train{
  position:absolute;
  display:flex;
  align-items:flex-end;
  gap:1vmin;
  left:5%;
  top:35%;
  transition: transform 1.2s ease;
}

/* ENGINE */
.engine{
  width:18vmin;
  height:12vmin;
  background:#1976d2;
  border-radius:1vmin;
  position:relative;
}

.engine::before{
  content:'';
  position:absolute;
  width:4vmin;
  height:6vmin;
  background:red;
  left:-3vmin;
  top:3vmin;
  border-radius:1vmin;
}

/* WHEELS */
.wheel{
  width:3vmin;
  height:3vmin;
  background:black;
  border-radius:50%;
  position:absolute;
  bottom:-2vmin;
}

/* COMPARTMENTS */
.comp{
  width:14vmin;
  height:12vmin;
  border-radius:1vmin;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:4vmin;
  font-weight:bold;
  color:#000;
  position:relative;
}

.c1{background:#ffe082;}
.c2{background:#81c784;}
.c3{background:#ffcc80;}
.c4{background:#b39ddb;}
.c5{background:#f48fb1;}

.comp::after{
  content:'';
  width:3vmin;
  height:3vmin;
  background:black;
  border-radius:50%;
  position:absolute;
  bottom:-2vmin;
  left:2vmin;
}

.comp::before{
  content:'';
  width:3vmin;
  height:3vmin;
  background:black;
  border-radius:50%;
  position:absolute;
  bottom:-2vmin;
  right:2vmin;
}

/* OPTIONS */
.options{
  display:flex;
  justify-content:center;
  gap:3vmin;
  padding:2vmin;
}

.option{
  width:12vmin;
  height:12vmin;
  border-radius:50%;
  background:#fff;
  border:4px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:4vmin;
  font-weight:bold;
}

.option.selected{
  border:6px solid #ff4081;
  transform:scale(1.1);
}

/* SHAKE */
@keyframes shake{
  0%{transform:translateX(0)}
  50%{transform:translateX(10px)}
  100%{transform:translateX(0)}
}
.shake{
  animation:shake 0.4s;
}

/* VICTORY */
#victory{
  justify-content:center;
  align-items:center;
  font-size:6vmin;
  color:green;
}

/* CONFETTI */
.confetti{
  position:absolute;
  width:1vmin;
  height:1vmin;
  animation:fall 2s linear infinite;
}
@keyframes fall{
  to{transform:translateY(100vh)}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div class="header">
    Identify the missing number from the given options
  </div>

  <div class="game-area">

    <div id="sun" class="sun">😊</div>

    <div id="train" class="train">
      <div class="engine"></div>

      <div class="comp c1" id="c1">_</div>
      <div class="comp c2" id="c2"></div>
      <div class="comp c3" id="c3"></div>
      <div class="comp c4" id="c4"></div>
      <div class="comp c5" id="c5"></div>
    </div>

  </div>

  <div class="options" id="options"></div>

</div>

<!-- VICTORY -->
<div id="victory" class="screen">
  🎉 Great Job! 🎉
</div>

<script>
const correctSound = new Audio('assets/correct.mp3');
const wrongSound = new Audio('assets/wrong.mp3');

const slides = [
  { nums:['_',18,19,20,21], options:[15,14,17], correct:17 },
  { nums:['_',21,22,23,24], options:[25,20,19], correct:20 },
  { nums:['_',26,27,28,29], options:[25,22,12], correct:25 },
  { nums:['_',18,19,20,21], options:[15,14,17], correct:17 },
  { nums:['_',12,13,14,15], options:[15,14,11], correct:11 }
];

let current=0, selected=null;

setTimeout(()=>{
  show('game');
  loadSlide();
},2000);

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function loadSlide(){
  selected=null;
  let d=slides[current];

  c1.innerText='_';
  c2.innerText=d.nums[1];
  c3.innerText=d.nums[2];
  c4.innerText=d.nums[3];
  c5.innerText=d.nums[4];

  options.innerHTML='';

  d.options.forEach(n=>{
    let div=document.createElement('div');
    div.className='option';
    div.innerText=n;

    div.onclick=()=>{
      document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      div.classList.add('selected');
      selected=n;
    };

    options.appendChild(div);
  });

  sun.innerText='😊';
  train.style.transform='translateX(0)';
}

c1.onclick=()=>{
  if(selected===null)return;

  let d=slides[current];

  if(selected===d.correct){
    correctSound.play();
    sun.innerText='😄';

    train.style.transform='translateX(-120%)';

    setTimeout(()=>{
      current++;
      if(current>=slides.length){
        showVictory();
      }else{
        loadSlide();
      }
    },1500);

  }else{
    wrongSound.play();
    sun.innerText='😢';

    train.classList.add('shake');
    setTimeout(()=>train.classList.remove('shake'),400);

    selected=null;
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  }
};

function showVictory(){
  show('victory');
  for(let i=0;i<60;i++){
    let c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
