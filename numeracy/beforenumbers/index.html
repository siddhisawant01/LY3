<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numeracy Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Comic Sans MS', sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f2f2f2;
}

/* GAME CONTAINER */
#game{
width:95vw;
max-width:900px;
aspect-ratio:16/9;
background:white;
border-radius:15px;
overflow:hidden;
position:relative;
}

/* SPLASH */
#splash{
position:absolute;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:10;
}

#splash img{
width:50%;
}

/* SLIDE */
#slide{
width:100%;
height:100%;
background-size:cover;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:10px;
}

/* HEADER */
#instruction{
font-size:clamp(14px,2.5vw,24px);
font-weight:bold;
text-align:center;
}

/* SUN */
#sun{
position:absolute;
top:10px;
right:10px;
font-size:40px;
}

/* TRAIN */
#train{
display:flex;
justify-content:center;
gap:10px;
}

.compartment{
width:clamp(50px,10vw,90px);
height:clamp(50px,10vw,90px);
background:#ffcc66;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(18px,4vw,28px);
font-weight:bold;
}

/* OPTIONS */
#optionsBox{
border:3px solid black;
display:flex;
justify-content:center;
gap:20px;
padding:10px;
}

.option{
width:clamp(50px,10vw,80px);
height:clamp(50px,10vw,80px);
border-radius:50%;
background:#66ccff;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(18px,4vw,28px);
cursor:pointer;
}

.selected{
background:#ff6666;
}

/* ANIMATIONS */
.move{
animation:move 2s linear;
}
@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.shake{
animation:shake 0.4s;
}
@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-5px);}
75%{transform:translateX(5px);}
}

/* SUCCESS */
#success{
position:absolute;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
flex-direction:column;
}
</style>
</head>

<body>

<div id="game">

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine_logo.png">
</div>

<!-- SUN -->
<div id="sun">😊</div>

<!-- SLIDE -->
<div id="slide">

<div id="instruction">
Identify the missing number from the given options
</div>

<div id="train"></div>

<div id="optionsBox"></div>

</div>

<!-- SUCCESS -->
<div id="success">Great Job! 🎉</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
const slides=[
{bg:"assets/slide2.png",train:["_",18,19,20,21],options:[15,14,17],correct:17},
{bg:"assets/slide3.png",train:["_",21,22,23,24],options:[25,20,19],correct:20},
{bg:"assets/slide4.png",train:["_",26,27,28,29],options:[25,22,12],correct:25},
{bg:"assets/slide1.png",train:["_",18,19,20,21],options:[15,14,17],correct:17},
{bg:"assets/slide6.png",train:["_",12,13,14,15],options:[15,14,11],correct:11}
];

let current=0;
let selected=null;

const slideEl=document.getElementById("slide");
const trainEl=document.getElementById("train");
const optionsEl=document.getElementById("optionsBox");
const sun=document.getElementById("sun");

const correctSound=document.getElementById("correctSound");
const wrongSound=document.getElementById("wrongSound");

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
loadSlide();
},2000);

/* LOAD */
function loadSlide(){
let data=slides[current];
slideEl.style.backgroundImage=`url(${data.bg})`;

trainEl.innerHTML="";
data.train.forEach((num,i)=>{
let d=document.createElement("div");
d.className="compartment";
d.innerText=num;

if(i===0){
d.onclick=handleDrop;
}
trainEl.appendChild(d);
});

optionsEl.innerHTML="";
data.options.forEach(num=>{
let d=document.createElement("div");
d.className="option";
d.innerText=num;

d.onclick=()=>{
selected=num;
document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
d.classList.add("selected");
};

optionsEl.appendChild(d);
});
}

/* CHECK */
function handleDrop(){
if(selected===null)return;

let correct=slides[current].correct;

if(selected===correct){
correctSound.play();
sun.innerText="😄";
trainEl.children[0].innerText=correct;

trainEl.classList.add("move");

setTimeout(()=>{
trainEl.classList.remove("move");
next();
},2000);

}else{
wrongSound.play();
sun.innerText="😢";
optionsEl.classList.add("shake");
setTimeout(()=>optionsEl.classList.remove("shake"),400);
}
}

/* NEXT */
function next(){
current++;
if(current>=slides.length){
showSuccess();
return;
}
selected=null;
sun.innerText="😊";
loadSlide();
}

/* SUCCESS */
function showSuccess(){
document.getElementById("slide").style.display="none";
document.getElementById("sun").style.display="none";
document.getElementById("success").style.display="flex";
confetti();
}

/* CONFETTI */
function confetti(){
for(let i=0;i<60;i++){
let d=document.createElement("div");
d.style.position="absolute";
d.style.width="6px";
d.style.height="6px";
d.style.background="red";
d.style.top=Math.random()*100+"%";
d.style.left=Math.random()*100+"%";
d.style.animation="fall 2s linear";
document.body.appendChild(d);

setTimeout(()=>d.remove(),2000);
}
}
</script>

</body>
</html>
