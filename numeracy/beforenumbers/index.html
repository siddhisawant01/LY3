<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Number Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    overflow:hidden;
    background:#6ec6ff;
}

/* MAIN SCREEN */
.screen{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    text-align:center;
    font-size:2.5vmax;
    font-weight:bold;
    padding:10px;
}

/* JUNGLE BG */
.game-area{
    flex:1;
    position:relative;
    background:linear-gradient(#6ec6ff 60%, #2ecc71 60%);
}

/* SUN */
.sun{
    position:absolute;
    left:20px;
    top:20px;
    font-size:3vmax;
}

/* TRACK */
.track{
    position:absolute;
    bottom:18%;
    width:100%;
    height:60px;
    background:
    repeating-linear-gradient(
        90deg,
        #5d4037 0px,
        #5d4037 20px,
        #8d6e63 20px,
        #8d6e63 40px
    );
}
.track::before{
    content:"";
    position:absolute;
    top:20px;
    width:100%;
    height:8px;
    background:#3e2723;
}

/* TRAIN */
.train{
    position:absolute;
    bottom:25%;
    display:flex;
    align-items:flex-end;
    transition:transform 2s linear;
}

/* ENGINE */
.engine{
    width:120px;
    height:90px;
    background:#1976d2;
    border-radius:12px;
    position:relative;
}

/* MOTORMAN */
.motorman{
    position:absolute;
    top:-20px;
    left:40px;
    font-size:22px;
    animation:wave 1s infinite alternate;
}
@keyframes wave{
    from{transform:rotate(0deg);}
    to{transform:rotate(20deg);}
}

/* CHIMNEY */
.engine::before{
    content:"";
    position:absolute;
    left:-15px;
    top:20px;
    width:20px;
    height:40px;
    background:red;
    border-radius:5px;
}

/* COMPARTMENTS */
.comp{
    width:110px;
    height:90px;
    border-radius:12px;
    margin-left:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2vmax;
    font-weight:bold;
    position:relative;
}

/* WINDOW */
.window{
    width:70%;
    height:60%;
    background:white;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* COLORS */
.c1{background:#f4d03f;}
.c2{background:#58d68d;}
.c3{background:#f5b041;}
.c4{background:#af7ac5;}
.c5{background:#ec7063;}

/* WHEELS */
.wheel{
    width:22px;
    height:22px;
    background:black;
    border-radius:50%;
    position:absolute;
    bottom:-12px;
}
.w1{left:15px;}
.w2{right:15px;}

/* OPTIONS */
.options{
    position:absolute;
    bottom:3%;
    width:100%;
    display:flex;
    justify-content:center;
    gap:40px;
}
.opt{
    width:90px;
    height:90px;
    border-radius:50%;
    background:white;
    border:4px solid #333;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2vmax;
}

/* SELECT */
.selected{
    background:yellow;
}

/* SMOKE */
.smoke{
    position:absolute;
    left:-10px;
    top:-10px;
    width:15px;
    height:15px;
    background:white;
    border-radius:50%;
    opacity:0;
}
.smoke.show{
    animation:smoke 1s infinite;
}
@keyframes smoke{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-40px);}
}

/* FINAL */
.final{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:4vmax;
    height:100%;
}

</style>
</head>

<body>

<div id="app"></div>

<script>

const data=[
{nums:["_",18,19,20,21], opts:[15,14,17], ans:17},
{nums:["_",21,22,23,24], opts:[25,20,19], ans:20},
{nums:["_",26,27,28,29], opts:[25,22,12], ans:25},
{nums:["_",18,19,20,21], opts:[15,14,17], ans:17},
{nums:["_",12,13,14,15], opts:[15,14,11], ans:11},
];

let slide=0;
let selected=null;

function render(){

if(slide>=data.length){
document.getElementById("app").innerHTML=`
<div class="screen">
<div class="final">🎉 Great Job 🎉</div>

<div class="track"></div>

<div class="train" id="finalTrain" style="transform:translateX(100vw)">
<div class="engine">
<div class="motorman">👋</div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>

${[1,2,3,4,5].map(()=>`
<div class="comp c1">
<div class="window"></div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>`).join("")}
</div>
</div>`;

setTimeout(()=>{
document.getElementById("finalTrain").style.transform="translateX(-120vw)";
},100);

return;
}

const d=data[slide];

document.getElementById("app").innerHTML=`
<div class="screen">

<div class="header">
Identify the before number from the given options
</div>

<div class="game-area">

<div class="sun" id="sun">😊</div>

<div class="track"></div>

<div class="train" id="train" style="transform:translateX(100vw)">

<div class="engine">
<div class="motorman">👋</div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
<div class="smoke" id="smoke"></div>
</div>

${d.nums.map((n,i)=>`
<div class="comp c${i+1}" onclick="submitAns()">
<div class="window">${n}</div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>`).join("")}

</div>

<div class="options">
${d.opts.map(o=>`
<div class="opt" onclick="selectOpt(this,${o})">${o}</div>
`).join("")}
</div>

</div>
</div>
`;

/* CENTER STOP */
setTimeout(()=>{
document.getElementById("train").style.transform="translateX(0)";
},100);

}

/* SELECT */
function selectOpt(el,val){
document.querySelectorAll(".opt").forEach(o=>o.classList.remove("selected"));
el.classList.add("selected");
selected=val;
}

/* SUBMIT */
function submitAns(){
if(selected===null) return;

if(selected===data[slide].ans){

document.getElementById("sun").textContent="😄";
document.getElementById("smoke").classList.add("show");

/* EXIT LEFT */
document.getElementById("train").style.transform="translateX(-120vw)";

setTimeout(()=>{
slide++;
selected=null;
render();
},2000);

}else{
document.getElementById("sun").textContent="😢";
}
}

render();

</script>

</body>
</html>
