<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numeracy Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    overflow:hidden;
    font-family:'Comic Sans MS';
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#game{
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    position:relative;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}

#splash img{
    width:35%;
}

/* GAME BACKGROUND */
#gameplay{
    width:100%;
    height:100%;
    display:none;
    background:url('assets/bg-slide2.png') no-repeat center/cover;
}

/* HEADING */
h1{
    position:absolute;
    top:2%;
    width:100%;
    text-align:center;
    font-size:2.5vw;
    color:#1d3557;
    font-weight:bold;
}

/* TRAIN */
#train{
    position:absolute;
    bottom:18%;
    display:flex;
    align-items:flex-end;
    left:120%;
}

/* ENTER */
.enter{
    animation:enter 1.5s forwards;
}
@keyframes enter{
    from{left:120%;}
    to{left:5%;}
}

/* EXIT */
.exit{
    animation:exit 1.5s forwards;
}
@keyframes exit{
    from{left:5%;}
    to{left:-120%;}
}

/* ENGINE */
.engine{
    width:12vw;
    height:10vw;
    background:#0077b6;
    border-radius:2vw;
    border:0.4vw solid #222;
}

/* COMPARTMENTS */
.comp{
    width:10vw;
    height:8vw;
    background:#fff;
    border:0.4vw solid #222;
    margin-left:0.5vw;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3vw;
    font-weight:bold;
    border-radius:1vw;
}

/* OPTIONS */
#options{
    position:absolute;
    bottom:5%;
    width:100%;
    display:flex;
    justify-content:center;
    gap:3vw;
}

.option{
    width:8vw;
    height:8vw;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3vw;
    color:#fff;
    cursor:pointer;
}

.option:nth-child(1){background:#00b4d8;}
.option:nth-child(2){background:#ff4d6d;}
.option:nth-child(3){background:#70e000;}

</style>
</head>

<body>

<div id="game">

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine_logo.png"
         onerror="this.style.display='none';this.parentNode.innerHTML='<h1>INNOVINE</h1>'">
</div>

<!-- GAME -->
<div id="gameplay">

<h1>Identify the missing number from the given options</h1>

<div id="train"></div>
<div id="options"></div>

</div>

</div>

<script>

const data = [
{
nums:["18","19","20","21"],
missing:"17",
options:["15","14","17"]
}
];

let current=0;

const train=document.getElementById("train");
const options=document.getElementById("options");

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("gameplay").style.display="block";
loadGame();
},2000);

/* LOAD GAME */
function loadGame(){

train.innerHTML="";
options.innerHTML="";

let d=data[current];

/* ENGINE FIRST (CORRECT DIRECTION) */
let engine=document.createElement("div");
engine.className="engine";
train.appendChild(engine);

/* MISSING BOX */
let miss=document.createElement("div");
miss.className="comp";
miss.innerText="_";
train.appendChild(miss);

/* OTHER NUMBERS */
d.nums.forEach(n=>{
let div=document.createElement("div");
div.className="comp";
div.innerText=n;
train.appendChild(div);
});

/* ENTER */
train.className="enter";

/* OPTIONS */
d.options.forEach(o=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=o;

btn.onclick=()=>{
if(o===d.missing){

miss.innerText=o;

train.classList.remove("enter");
train.classList.add("exit");

setTimeout(()=>{
alert("Great Job!");
},1500);

}else{
alert("Try Again!");
}
};

options.appendChild(btn);
});
}

</script>

</body>
</html>
