<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100dvh;
  overflow:hidden;
  background:linear-gradient(#87CEEB 60%, #4CAF50 60%);
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  padding:10px;
  font-size:18px;
}

/* SUN */
.sun{
  position:absolute;
  top:8px;
  left:8px;
  font-size:32px;
}

/* GAME AREA */
.game{
  height:100%;
  display:flex;
  flex-direction:column;
}

/* TRAIN AREA */
.train-area{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
}

/* TRACK */
.track{
  height:70px;
  width:100%;
  position:absolute;
  bottom:60px;
  background:repeating-linear-gradient(90deg,#5d4037 0 40px,#8d6e63 40px 80px);
}
.track:before,.track:after{
  content:"";
  position:absolute;
  width:100%;
  height:6px;
  background:#3e2723;
}
.track:before{top:18px;}
.track:after{top:45px;}

/* TRAIN */
.train{
  display:flex;
  gap:10px;
  position:absolute;
  bottom:110px;
  transform:translateX(120vw) scale(0.9);
  transform-origin:center bottom;
}

/* ENGINE */
.engine{
  width:110px;height:90px;
  background:#1976d2;
  border-radius:15px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:35px;height:28px;
  background:#90caf9;
  top:15px;left:20px;
  border-radius:6px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:12px;height:12px;
  background:#ddd;
  border-radius:50%;
  top:-10px;
  left:75px;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-50px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:95px;height:90px;
  border-radius:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* WINDOW */
.window{
  width:60px;height:50px;
  background:#fff;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-15px;
  width:16px;height:16px;
  background:#000;
  border-radius:50%;
}
.w1{left:15px;}
.w2{right:15px;}

/* OPTIONS */
.options{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:12px;
  padding:10px;
  margin-bottom:5px;
}
.opt{
  width:65px;height:65px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  border:3px solid #444;
}
.opt.selected{border:4px solid green;}

/* FINAL */
.final{
  background:#b3e5fc;
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.loopTrain{
  position:absolute;
  bottom:110px;
  display:flex;
  gap:10px;
  animation:loop 10s linear infinite;
}
@keyframes loop{
  0%{transform:translateX(120vw);}
  100%{transform:translateX(-140vw);}
}

/* 📱 EXTRA MOBILE FIX */
@media(max-width:480px){
  .train{transform:translateX(120vw) scale(0.75);}
  .header{font-size:16px;}
  .opt{width:55px;height:55px;font-size:18px;}
}
</style>
</head>

<body>

<div id="game" class="game">
<div class="header">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="train-area">
  <div class="track"></div>
  <div id="train" class="train"></div>
</div>

<div class="options" id="options"></div>
</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25},
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",12,13,14,15],opt:[15,14,11],ans:11}
];

let current=0,selected=null;
const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

/* TRAIN */
function createTrain(data){
  train.innerHTML="";

  let engine=document.createElement("div");
  engine.className="engine";
  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);
  addWheels(engine);
  train.appendChild(engine);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);
    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;
    c.appendChild(w);
    addWheels(c);

    if(i===0){
      c.onclick=()=>{
        if(selected===levels[current].ans){
          w.innerText=selected; // fill correct answer
          correctSound();
          moveTrain();
        }else if(selected!=null){
          wrongSound();
        }
      };
    }

    train.appendChild(c);
  });

  setTimeout(()=>{
    train.style.transition="transform 1.2s ease-out";
    train.style.transform="translateX(0)";
  },100);
}

/* SOUND FIX (MOBILE FRIENDLY) */
function correctSound(){
  let audio=new Audio("assets/correct.mp3");
  audio.play().catch(()=>{});
}
function wrongSound(){
  let audio=new Audio("assets/wrong.mp3");
  audio.play().catch(()=>{});
}

/* MOVE TRAIN */
function moveTrain(){
  train.style.transition="transform 2s linear";
  train.style.transform="translateX(-140vw)";
  setTimeout(()=>{
    current++;
    if(current>=levels.length) showFinal();
    else load();
  },2000);
}

function addWheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1);
  el.appendChild(w2);
}

/* OPTIONS */
function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;
    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    };
    optionsDiv.appendChild(d);
  });
}

/* LOAD */
function load(){
  selected=null;
  train.style.transition="none";
  train.style.transform="translateX(120vw)";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

/* FINAL */
function showFinal(){
  document.body.innerHTML=`
  <div class="final">
    <h1>🎉 Great Job 🎉</h1>
    <div class="track"></div>
    <div id="loopTrain" class="loopTrain"></div>
  </div>`;

  const loop=document.getElementById("loopTrain");

  function makeTrain(){
    loop.innerHTML="";
    let engine=document.createElement("div");
    engine.className="engine";
    let smoke=document.createElement("div");
    smoke.className="smoke";
    engine.appendChild(smoke);
    addWheels(engine);
    loop.appendChild(engine);

    for(let i=0;i<5;i++){
      let c=document.createElement("div");
      c.className="comp c"+((i%5)+1);
      addWheels(c);
      loop.appendChild(c);
    }
  }

  makeTrain();
}

load();
</script>

</body>
</html>
