<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:linear-gradient(#87CEEB 65%, #4CAF50 65%);
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  font-size:clamp(16px,2.5vw,26px);
  padding:6px;
}

/* SUN */
.sun{
  position:absolute;
  top:8px;
  left:10px;
  font-size:clamp(24px,5vw,40px);
}

/* GAME AREA */
.game{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TRAIN AREA */
.train-area{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* TRACK */
.track{
  position:absolute;
  bottom:18%;
  width:100%;
  height:6%;
  background:repeating-linear-gradient(
    90deg,
    #5d4037 0 30px,
    #8d6e63 30px 60px
  );
}
.track:before,.track:after{
  content:"";
  position:absolute;
  width:100%;
  height:4px;
  background:#3e2723;
}
.track:before{top:10px;}
.track:after{top:30px;}

/* TRAIN */
.train{
  display:flex;
  align-items:flex-end;
  gap:10px;
  position:absolute;
  bottom:24%;
  transform:translateX(120%);
}

/* ENGINE */
.engine{
  width:min(90px,18vw);
  height:min(80px,16vw);
  background:#1976d2;
  border-radius:12px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:30%;
  height:30%;
  background:#90caf9;
  top:15%;
  left:15%;
  border-radius:5px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:10px;height:10px;
  background:#ddd;
  border-radius:50%;
  top:-10px;
  right:10px;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-40px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:min(80px,16vw);
  height:min(80px,16vw);
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* WINDOW */
.window{
  width:70%;
  height:60%;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(14px,3vw,22px);
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-10px;
  width:12px;height:12px;
  background:#000;
  border-radius:50%;
}
.w1{left:15%;}
.w2{right:15%;}

/* OPTIONS */
.options{
  height:20%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
}
.opt{
  width:min(70px,14vw);
  height:min(70px,14vw);
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(14px,3vw,22px);
  border:3px solid #444;
}
.opt.selected{border:4px solid green;}

/* FINAL */
.final{
  height:100vh;
  background:#b3e5fc;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.loopTrain{
  position:absolute;
  bottom:25%;
  display:flex;
  gap:10px;
  animation:loop 8s linear infinite;
}
@keyframes loop{
  from{transform:translateX(120%);}
  to{transform:translateX(-140%);}
}
</style>
</head>

<body>

<div id="game" class="game">
<div class="header">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="train-area">
  <div class="track"></div>
  <div id="train" class="train"></div>
</div>

<div class="options" id="options"></div>
</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25}
];

let current=0,selected=null;

const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

function addWheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1);
  el.appendChild(w2);
}

function createTrain(data){
  train.innerHTML="";

  let engine=document.createElement("div");
  engine.className="engine";

  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);

  addWheels(engine);
  train.appendChild(engine);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    addWheels(c);

    if(i===0) c.onclick=check;

    train.appendChild(c);
  });

  setTimeout(()=>{
    train.style.transition="transform 1.2s ease-out";
    train.style.transform="translateX(0)";
  },100);
}

function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;

    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    };

    optionsDiv.appendChild(d);
  });
}

function check(){
  if(selected==null)return;

  if(selected===levels[current].ans){
    sun.innerText="😊";

    train.style.transition="transform 1.5s linear";
    train.style.transform="translateX(-140%)";

    setTimeout(()=>{
      current++;
      if(current>=levels.length) showFinal();
      else load();
    },1500);

  }else{
    sun.innerText="😢";
    selected=null;
    document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
  }
}

function load(){
  selected=null;
  sun.innerText="😊";
  train.style.transition="none";
  train.style.transform="translateX(120%)";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

function showFinal(){
  document.body.innerHTML=`
  <div class="final">
    <h1>🎉 Great Job 🎉</h1>
    <div class="track"></div>
    <div id="loopTrain" class="loopTrain"></div>
  </div>`;

  const loop=document.getElementById("loopTrain");

  function makeTrain(){
    loop.innerHTML="";

    let engine=document.createElement("div");
    engine.className="engine";
    addWheels(engine);
    loop.appendChild(engine);

    for(let i=0;i<5;i++){
      let c=document.createElement("div");
      c.className="comp c"+((i%5)+1);
      addWheels(c);
      loop.appendChild(c);
    }
  }

  makeTrain();
}

load();
</script>

</body>
</html>
