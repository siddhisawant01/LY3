<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  background:linear-gradient(#87CEEB 65%, #4CAF50 65%);
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  font-size:clamp(16px,3vw,28px);
  padding:8px;
}

/* SUN */
.sun{
  position:absolute;
  top:10px;
  left:10px;
  font-size:clamp(24px,5vw,40px);
}

/* GAME */
.game{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* TRAIN AREA */
.train-area{
  flex:2;
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

/* TRACK */
.track{
  position:absolute;
  bottom:5vh;
  width:100%;
  height:8vh;
  background:repeating-linear-gradient(90deg,#5d4037 0 30px,#8d6e63 30px 60px);
}
.track:before,.track:after{
  content:"";
  position:absolute;
  width:100%;
  height:5px;
  background:#3e2723;
}
.track:before{top:20%;}
.track:after{bottom:20%;}

/* TRAIN */
.train{
  display:flex;
  gap:2vw;
  position:absolute;
  bottom:12vh;
  transform:translateX(120vw);
}

/* ENGINE */
.engine{
  width:clamp(70px,12vw,130px);
  height:clamp(60px,10vw,110px);
  background:#1976d2;
  border-radius:12px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:30%;
  height:30%;
  background:#90caf9;
  top:20%;
  left:20%;
  border-radius:6px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:10px;height:10px;
  background:#ddd;
  border-radius:50%;
  top:-10px;
  left:70%;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-40px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:clamp(60px,11vw,110px);
  height:clamp(60px,10vw,110px);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* WINDOW */
.window{
  width:70%;
  height:60%;
  background:#fff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,3vw,26px);
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-12px;
  width:clamp(10px,2.5vw,18px);
  height:clamp(10px,2.5vw,18px);
  background:#000;
  border-radius:50%;
}
.w1{left:15%;}
.w2{right:15%;}

/* OPTIONS */
.options{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:4vw;
  padding:10px;
}

.opt{
  width:clamp(50px,12vw,90px);
  height:clamp(50px,12vw,90px);
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,4vw,26px);
  border:3px solid #444;
}
.opt.selected{border:5px solid green;}
</style>
</head>

<body>

<div class="game">
<div class="header">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="train-area">
  <div class="track"></div>
  <div id="train" class="train"></div>
</div>

<div class="options" id="options"></div>
</div>

<script>
const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25},
{nums:["_",12,13,14,15],opt:[15,14,11],ans:11}
];

let current=0,selected=null;

const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

/* 🔊 SOUND (FIX FOR MOBILE) */
const correctSound = new Audio("assets/correct.mp3");
const wrongSound = new Audio("assets/wrong.mp3");

/* unlock audio for iOS */
document.body.addEventListener("click", () => {
  correctSound.play().then(()=>correctSound.pause()).catch(()=>{});
  wrongSound.play().then(()=>wrongSound.pause()).catch(()=>{});
}, { once:true });

function addWheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1);
  el.appendChild(w2);
}

function createTrain(data){
  train.innerHTML="";

  let engine=document.createElement("div");
  engine.className="engine";

  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);

  addWheels(engine);
  train.appendChild(engine);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    addWheels(c);

    if(i===0) c.onclick=check;

    train.appendChild(c);
  });

  setTimeout(()=>{
    train.style.transition="transform 1.5s ease-out";
    train.style.transform="translateX(0)";
  },100);
}

function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;

    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    };

    optionsDiv.appendChild(d);
  });
}

function check(){
  if(selected==null)return;

  if(selected===levels[current].ans){
    correctSound.currentTime=0;
    correctSound.play();

    sun.innerText="😊";

    train.style.transition="transform 2s linear";
    train.style.transform="translateX(-140vw)";

    setTimeout(()=>{
      current++;
      if(current>=levels.length) location.reload();
      else load();
    },2000);

  }else{
    wrongSound.currentTime=0;
    wrongSound.play();

    sun.innerText="😢";
    selected=null;
    document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
  }
}

function load(){
  selected=null;
  sun.innerText="😊";
  train.style.transition="none";
  train.style.transform="translateX(120vw)";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

load();
</script>

</body>
</html>
