<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Numbers</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Comic Sans MS';
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#000;
    overflow:hidden;
}

/* MAIN */
#game{
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    position:relative;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}
#splash img{
    width:300px;
}

/* GAME */
#gameplay{
    display:none;
    width:100%;
    height:100%;
    background:url('assets/bg-slide2.png') center/cover no-repeat;
}

/* TITLE */
h1{
    position:absolute;
    top:2%;
    width:100%;
    text-align:center;
    font-size:2.5vw;
    color:#1d3557;
    font-weight:900;
}

/* TRAIN */
#train{
    position:absolute;
    bottom:22%;
    left:120%;
    display:flex;
    align-items:flex-end;
}

/* ANIMATIONS */
.enter{ animation:enter 1.5s forwards; }
.exit{ animation:exit 1.5s forwards; }

@keyframes enter{
    from{left:120%;}
    to{left:5%;}
}
@keyframes exit{
    from{left:5%;}
    to{left:-120%;}
}

/* ENGINE (VISIBLE FIXED) */
.engine{
    width:11vw;
    height:9vw;
    background:#0077b6;
    border:0.4vw solid #222;
    border-radius:2vw;
}

/* COMPARTMENTS */
.comp{
    width:9vw;
    height:7vw;
    margin-left:0.5vw;
    border-radius:1vw;
    border:0.4vw solid #333;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3vw;
    font-weight:bold;
    background:#fff;
}

/* COLORS */
.comp:nth-child(2){background:#ffd166;}
.comp:nth-child(3){background:#06d6a0;}
.comp:nth-child(4){background:#f4a261;}
.comp:nth-child(5){background:#9b5de5;}
.comp:nth-child(6){background:#ff6b6b;}

/* OPTIONS BOX (FIXED POSITION — NO OVERLAP) */
#options{
    position:absolute;
    bottom:5%;
    left:50%;
    transform:translateX(-50%);
    width:70%;
    background:#fff;
    padding:2vw;
    border-radius:2vw;
    border:0.4vw solid #8338ec;
    display:flex;
    justify-content:center;
    gap:3vw;
}

/* OPTIONS */
.option{
    width:7vw;
    height:7vw;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3vw;
    color:#fff;
    cursor:pointer;
}

.option:nth-child(1){background:#00b4d8;}
.option:nth-child(2){background:#ff4d6d;}
.option:nth-child(3){background:#70e000;}

</style>
</head>

<body>

<div id="game">

<!-- SPLASH -->
<div id="splash">
    <img src="assets/innovine_logo.png"
         onerror="this.style.display='none';this.parentNode.innerHTML='<h1>INNOVINE</h1>'">
</div>

<!-- GAME -->
<div id="gameplay">

<h1>Identify the missing number from the given options 😊</h1>

<div id="train"></div>
<div id="options"></div>

</div>
</div>

<audio id="correct" src="assets/correct.mp3"></audio>
<audio id="wrong" src="assets/wrong.mp3"></audio>

<script>

const data = {
    numbers:["18","19","20","21"],
    missing:"17",
    options:["15","14","17"]
};

const train=document.getElementById("train");
const options=document.getElementById("options");

/* START */
setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("gameplay").style.display="block";
    loadGame();
},2000);

function loadGame(){

train.innerHTML="";
options.innerHTML="";

/* ENGINE FIRST */
let engine=document.createElement("div");
engine.className="engine";
train.appendChild(engine);

/* MISSING */
let missing=document.createElement("div");
missing.className="comp";
missing.innerText="_";
train.appendChild(missing);

/* NUMBERS */
data.numbers.forEach(n=>{
    let c=document.createElement("div");
    c.className="comp";
    c.innerText=n;
    train.appendChild(c);
});

/* ENTER */
train.className="enter";

/* OPTIONS */
data.options.forEach(o=>{
    let btn=document.createElement("div");
    btn.className="option";
    btn.innerText=o;

    btn.onclick=()=>{
        if(o===data.missing){
            document.getElementById("correct").play();
            missing.innerText=o;

            train.classList.remove("enter");
            train.classList.add("exit");

        }else{
            document.getElementById("wrong").play();
        }
    };

    options.appendChild(btn);
});
}

</script>

</body>
</html>
