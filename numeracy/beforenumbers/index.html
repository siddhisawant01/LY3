<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Before Number Train Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(#6ed0ff,#3ccf7a);
display:flex;
flex-direction:column;
}

/* TITLE */
.title{
text-align:center;
font-size:clamp(18px,3.5vw,32px);
font-weight:bold;
padding:10px;
}

/* SUN */
.sun{
position:absolute;
top:10px;
left:10px;
font-size:40px;
}

/* GAME AREA */
.game{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

/* TRACK */
.track{
position:absolute;
bottom:25%;
width:100%;
height:60px;
background:repeating-linear-gradient(
90deg,
#5d4037 0px,
#5d4037 20px,
#8d6e63 20px,
#8d6e63 40px
);
border-top:6px solid #3e2723;
border-bottom:6px solid #3e2723;
}

/* TRAIN */
.train{
position:absolute;
bottom:32%;
display:flex;
align-items:flex-end;
gap:12px;
transform:translateX(100vw);
}

/* ENGINE */
.engine{
width:100px;
height:80px;
background:#e53935;
border-radius:15px;
position:relative;
}

.engine::before{
content:"";
position:absolute;
top:15px;
left:20px;
width:30px;
height:30px;
background:#90caf9;
border-radius:5px;
}

/* SMOKE */
.smoke{
position:absolute;
top:-20px;
left:20px;
width:15px;
height:15px;
background:#ccc;
border-radius:50%;
animation:smoke 1s infinite;
}

@keyframes smoke{
0%{opacity:0; transform:translateY(0);}
100%{opacity:1; transform:translateY(-30px);}
}

/* COMPARTMENTS */
.box{
width:90px;
height:80px;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.box span{
background:white;
padding:10px 15px;
border-radius:8px;
font-size:clamp(14px,2vw,22px);
font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
position:absolute;
bottom:-10px;
width:15px;
height:15px;
background:black;
border-radius:50%;
}

.w1{left:10px;}
.w2{right:10px;}

/* OPTIONS */
.options{
position:absolute;
bottom:5%;
display:flex;
gap:20px;
}

.option{
width:60px;
height:60px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:18px;
border:3px solid #444;
}

/* ANIMATION STATES */
.center{
animation:enterCenter 2s forwards;
}

@keyframes enterCenter{
0%{transform:translateX(100vw);}
100%{transform:translateX(0);}
}

.exit{
animation:exitLeft 2s forwards;
}

@keyframes exitLeft{
0%{transform:translateX(0);}
100%{transform:translateX(-120vw);}
}

/* FINAL LOOP */
.loop{
animation:loopMove 6s linear infinite;
}

@keyframes loopMove{
0%{transform:translateX(100vw);}
100%{transform:translateX(-120vw);}
}

/* RESPONSIVE */
@media(max-width:600px){
.box{width:65px;height:60px;}
.engine{width:70px;height:60px;}
.option{width:50px;height:50px;}
}
</style>
</head>

<body>

<div class="title">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="game">

<div class="track"></div>

<div class="train center" id="train">

<div class="engine">
<div class="smoke"></div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>

<div class="box c1"><span id="q">_</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c2"><span>18</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c3"><span>19</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c4"><span>20</span><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c5"><span>21</span><div class="wheel w1"></div><div class="wheel w2"></div></div>

</div>

<div class="options">
<div class="option" onclick="check(15)">15</div>
<div class="option" onclick="check(14)">14</div>
<div class="option" onclick="check(17)">17</div>
</div>

</div>

<script>

let answer = 17;

function check(num){

if(num === answer){
document.getElementById("sun").textContent="😄";

let train = document.getElementById("train");

train.classList.remove("center");
train.classList.add("exit");

setTimeout(showEnd,2000);

}else{
document.getElementById("sun").textContent="😢";
}
}

function showEnd(){

document.body.innerHTML = `
<div class="title">🎉 Great Job 🎉</div>
<div class="sun">😄</div>

<div class="game">
<div class="track"></div>

<div class="train loop">

<div class="engine">
<div class="smoke"></div>
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>

<div class="box c1"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c2"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c3"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c4"><div class="wheel w1"></div><div class="wheel w2"></div></div>
<div class="box c5"><div class="wheel w1"></div><div class="wheel w2"></div></div>

</div>
</div>
`;
}

</script>

</body>
</html>
