<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Numbers Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
  touch-action:manipulation;
}

body{
  overflow:hidden;
  background: linear-gradient(#6ed0ff 40%, #6bd96b 60%);
}

/* SCREEN */
.screen{
  width:100vw;
  height:100vh;
  display:none;
}
.active{
  display:flex;
  flex-direction:column;
}

/* SPLASH */
#splash{
  justify-content:center;
  align-items:center;
  background:#fff;
}
#splash img{
  width:40vmin;
}

/* HEADER */
.header{
  text-align:center;
  font-size:3vmin;
  font-weight:bold;
  padding:1vmin;
  color:#0d47a1;
}

/* GAME AREA */
.game-area{
  flex:1;
  position:relative;
}

/* SUN */
.sun{
  position:absolute;
  top:2%;
  left:2%;
  font-size:8vmin;
}

/* TRACK */
.track{
  position:absolute;
  bottom:30%;
  width:100%;
  height:2vmin;
  background:#5d4037;
}

/* TRAIN */
.train{
  position:absolute;
  bottom:32%;
  display:flex;
  align-items:flex-end;
  gap:2vmin;
  transform:translateX(120%);
  transition:transform 1.5s linear;
}

/* BIGGER SCALE */
.train-scale{
  transform:scale(1.3);
  transform-origin:left bottom;
}

/* ENGINE */
.engine{
  width:18vmin;
  height:14vmin;
  background:#1565c0;
  border-radius:2vmin;
  position:relative;
}

/* ENGINE FRONT */
.engine::before{
  content:'';
  position:absolute;
  width:5vmin;
  height:8vmin;
  background:#ff3d00;
  left:-4vmin;
  top:3vmin;
  border-radius:2vmin;
}

/* ENGINE WINDOW */
.engine::after{
  content:'';
  position:absolute;
  width:6vmin;
  height:5vmin;
  background:#bbdefb;
  top:2vmin;
  left:4vmin;
  border-radius:1vmin;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:2vmin;
  height:2vmin;
  background:#ccc;
  border-radius:50%;
  top:-3vmin;
  left:4vmin;
  animation:smoke 1s infinite;
}

@keyframes smoke{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-5vmin);opacity:0}
}

/* COMPARTMENTS */
.comp{
  width:16vmin;
  height:13vmin;
  border-radius:2vmin;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* COLORS */
.c1{background:#ffd54f;}
.c2{background:#66bb6a;}
.c3{background:#ffb74d;}
.c4{background:#9575cd;}
.c5{background:#f06292;}

/* WINDOW */
.window{
  width:10vmin;
  height:7vmin;
  background:#fff;
  border-radius:1vmin;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:4vmin;
  font-weight:bold;
}

/* OPTIONS */
.options{
  position:absolute;
  bottom:5%;
  width:100%;
  display:flex;
  justify-content:center;
  gap:3vmin;
}

.option{
  width:14vmin;
  height:14vmin;
  border-radius:50%;
  background:#fff;
  border:5px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:5vmin;
  font-weight:bold;
}

.option.selected{
  border:7px solid #ff4081;
  transform:scale(1.1);
}

/* SHAKE */
@keyframes shake{
  0%{transform:translateX(0)}
  50%{transform:translateX(10px)}
  100%{transform:translateX(0)}
}
.shake{
  animation:shake 0.4s;
}

/* VICTORY */
#victory{
  justify-content:center;
  align-items:center;
  font-size:6vmin;
  color:green;
  position:relative;
}

/* FINAL TRAIN LOOP */
.final-train{
  position:absolute;
  bottom:30%;
  display:flex;
  animation:moveTrain 6s linear infinite;
  transform:scale(1.3);
}

@keyframes moveTrain{
  from{left:100%}
  to{left:-120%}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash" class="screen active">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div class="header">
    Identify the before number from the given options
  </div>

  <div class="game-area">

    <div id="sun" class="sun">🌞</div>

    <div class="track"></div>

    <div id="train" class="train train-scale">
      <div class="engine">
        <div class="smoke"></div>
      </div>

      <div class="comp c1"><div class="window" id="w1">_</div></div>
      <div class="comp c2"><div class="window" id="w2"></div></div>
      <div class="comp c3"><div class="window" id="w3"></div></div>
      <div class="comp c4"><div class="window" id="w4"></div></div>
      <div class="comp c5"><div class="window" id="w5"></div></div>
    </div>

  </div>

  <div class="options" id="options"></div>

</div>

<!-- VICTORY -->
<div id="victory" class="screen">
  🎉 Great Job! 🎉

  <div class="track"></div>

  <div class="final-train">
    <div class="engine"><div class="smoke"></div></div>
    <div class="comp c1"></div>
    <div class="comp c2"></div>
  </div>
</div>

<script>
const correctSound=new Audio('assets/correct.mp3');
const wrongSound=new Audio('assets/wrong.mp3');

const slides=[
{nums:['_',18,19,20,21],options:[15,14,17],correct:17},
{nums:['_',21,22,23,24],options:[25,20,19],correct:20},
{nums:['_',26,27,28,29],options:[25,22,12],correct:25},
{nums:['_',18,19,20,21],options:[15,14,17],correct:17},
{nums:['_',12,13,14,15],options:[15,14,11],correct:11}
];

let current=0,selected=null;

setTimeout(()=>{
show('game');
loadSlide();
},2000);

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function loadSlide(){
selected=null;
let d=slides[current];

w1.innerText='_';
w2.innerText=d.nums[1];
w3.innerText=d.nums[2];
w4.innerText=d.nums[3];
w5.innerText=d.nums[4];

options.innerHTML='';

d.options.forEach(n=>{
let div=document.createElement('div');
div.className='option';
div.innerText=n;

div.onclick=()=>{
document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
div.classList.add('selected');
selected=n;
};

options.appendChild(div);
});

sun.innerText='🌞';

/* RESET: START FROM RIGHT */
train.style.transition='none';
train.style.transform='translateX(120%)';

/* FORCE REPAINT */
train.offsetHeight;

/* ENTER FROM RIGHT */
train.style.transition='transform 1.2s linear';
train.style.transform='translateX(0)';
}

w1.onclick=()=>{
if(selected===null)return;

let d=slides[current];

if(selected===d.correct){
correctSound.play();
sun.innerText='😄';

/* EXIT LEFT */
train.style.transform='translateX(-150%)';

setTimeout(()=>{
current++;
if(current>=slides.length){
showVictory();
}else{
loadSlide();
}
},1500);

}else{
wrongSound.play();
sun.innerText='😢';

train.classList.add('shake');
setTimeout(()=>train.classList.remove('shake'),400);

selected=null;
document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
}
};

function showVictory(){
show('victory');
}
</script>

</body>
</html>
