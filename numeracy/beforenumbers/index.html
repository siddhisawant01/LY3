<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Numbers Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Comic Sans MS';
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

/* GAME CONTAINER */
#game{
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    position:relative;
    overflow:hidden;
}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}
#splash img{
    width:40%;
}

/* GAMEPLAY */
#gameplay{
    display:none;
    width:100%;
    height:100%;
    background:url('assets/bg-slide2.png') no-repeat center/cover;
}

/* HEADER */
h1{
    position:absolute;
    top:3%;
    width:100%;
    text-align:center;
    font-size:2.5vw;
    color:#1d3557;
    font-weight:900;
    text-shadow:2px 2px #fff;
}

/* SUN */
#sun{
    position:absolute;
    top:3%;
    right:3%;
    font-size:4vw;
}

/* TRAIN */
#train{
    position:absolute;
    bottom:20%;
    display:flex;
    align-items:flex-end;
    left:120%;
}

/* ENTER */
.enter{
    animation:enter 1.5s forwards;
}
@keyframes enter{
    to{left:5%;}
}

/* EXIT */
.exit{
    animation:exit 1.5s forwards;
}
@keyframes exit{
    to{left:-120%;}
}

/* ENGINE */
.engine{
    width:11vw;
    height:9vw;
    background:#0077b6;
    border-radius:2vw;
    border:0.4vw solid #222;
    position:relative;
}

/* COMPARTMENTS */
.comp{
    width:9vw;
    height:7vw;
    background:#fff;
    border-radius:1vw;
    border:0.4vw solid #333;
    margin-left:0.5vw;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3vw;
    font-weight:bold;
    position:relative;
}

/* COLORS */
.comp:nth-child(2){background:#ffd166;}
.comp:nth-child(3){background:#06d6a0;}
.comp:nth-child(4){background:#f4a261;}
.comp:nth-child(5){background:#9b5de5;}
.comp:nth-child(6){background:#ff6b6b;}

/* WHEELS */
.comp::after{
    content:"";
    position:absolute;
    bottom:-1.5vw;
    left:50%;
    transform:translateX(-50%);
    width:5vw;
    height:1vw;
    background:#333;
}

/* OPTIONS BOX */
#options-box{
    position:absolute;
    bottom:5%;
    width:70%;
    left:15%;
    background:#fff;
    padding:2vw;
    border-radius:2vw;
    border:0.4vw solid #8338ec;
    display:flex;
    justify-content:center;
    gap:4vw;
}

/* OPTIONS */
.option{
    width:7vw;
    height:7vw;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:3vw;
    color:#fff;
    cursor:pointer;
}

.option:nth-child(1){background:#00b4d8;}
.option:nth-child(2){background:#ff4d6d;}
.option:nth-child(3){background:#70e000;}

.correct{
    transform:scale(1.2);
}
</style>
</head>

<body>

<div id="game">

<!-- SPLASH -->
<div id="splash">
<img src="assets/innovine_logo.png"
onerror="this.style.display='none';this.parentNode.innerHTML='<h1>INNOVINE</h1>'">
</div>

<!-- GAME -->
<div id="gameplay">

<h1>Identify the missing number from the given options</h1>
<div id="sun">😊</div>

<div id="train"></div>

<div id="options-box"></div>

</div>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>

const data = [
{
nums:["18","19","20","21"],
missing:"17",
options:["15","14","17"]
}
];

let train=document.getElementById("train");
let optionsBox=document.getElementById("options-box");
let sun=document.getElementById("sun");

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("gameplay").style.display="block";
loadGame();
},2000);

function loadGame(){

train.innerHTML="";
optionsBox.innerHTML="";

let d=data[0];

/* ENGINE */
let engine=document.createElement("div");
engine.className="engine";
train.appendChild(engine);

/* MISSING */
let missingBox=document.createElement("div");
missingBox.className="comp";
missingBox.innerText="_";
train.appendChild(missingBox);

/* NUMBERS */
d.nums.forEach(n=>{
let c=document.createElement("div");
c.className="comp";
c.innerText=n;
train.appendChild(c);
});

/* ENTER */
train.className="enter";

/* OPTIONS */
d.options.forEach(o=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=o;

btn.onclick=()=>{

if(o===d.missing){

document.getElementById("correctSound").play();
sun.innerText="😄";

missingBox.innerText=o;
btn.classList.add("correct");

train.classList.remove("enter");
train.classList.add("exit");

}else{
document.getElementById("wrongSound").play();
sun.innerText="😢";
}

};

optionsBox.appendChild(btn);
});
}

</script>

</body>
</html>
