<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Numbers Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Comic Sans MS';
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#87CEEB;
}

/* CONTAINER */
#game{
    width:100vw;
    height:56.25vw;
    max-height:100vh;
    max-width:177.78vh;
    position:relative;
    overflow:hidden;
    border-radius:10px;
}

/* BACKGROUND */
#game::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(#87CEEB 60%, #6ecf68 60%);
    z-index:-2;
}

/* TREES */
.tree{
    position:absolute;
    bottom:12%;
    width:6vw;
    height:8vw;
    background:green;
    border-radius:50%;
}
.tree::after{
    content:"";
    position:absolute;
    bottom:-2vw;
    left:40%;
    width:1vw;
    height:3vw;
    background:#5a3e1b;
}
.tree1{left:5%;}
.tree2{left:15%;}
.tree3{right:10%;}
.tree4{right:20%;}

/* SPLASH */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
}
#splash img{
    max-width:40%;
}

/* HEADER */
h1{
    position:absolute;
    top:3%;
    width:100%;
    text-align:center;
    font-size:2.5vw;
    color:#003049;
}

/* TRACK */
.track{
    position:absolute;
    bottom:15%;
    width:100%;
    height:1vw;
    background:#5c3d2e;
}

/* TRAIN */
#train{
    position:absolute;
    bottom:16%;
    display:flex;
    align-items:flex-end;
    left:120%;
}

/* ENTER */
.enter{
    animation:enter 1.5s forwards;
}
@keyframes enter{
    to{left:10%;}
}

/* EXIT */
.exit{
    animation:exit 1.5s forwards;
}
@keyframes exit{
    to{left:-120%;}
}

/* COMPARTMENTS */
.comp{
    width:10vw;
    height:8vw;
    background:#fff;
    border:0.4vw solid #333;
    margin-right:0.5vw;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:3vw;
    font-weight:bold;
    border-radius:1vw;
}

/* ENGINE */
.engine{
    width:12vw;
    height:10vw;
    background:#0077b6;
    border-radius:2vw;
    border:0.4vw solid #333;
}

/* OPTIONS */
#options{
    position:absolute;
    bottom:3%;
    width:100%;
    display:flex;
    justify-content:center;
    gap:3vw;
}
.option{
    width:8vw;
    height:8vw;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:3vw;
    color:#fff;
    cursor:pointer;
}
.option:nth-child(1){background:#00b4d8;}
.option:nth-child(2){background:#ff4d6d;}
.option:nth-child(3){background:#70e000;}

</style>
</head>

<body>

<div id="game">

<div id="splash">
    <img src="assets/innovine_logo.png" onerror="this.style.display='none';this.parentNode.innerHTML='<h1>INNOVINE</h1>'">
</div>

<h1>Identify the missing number from the given options</h1>

<div class="tree tree1"></div>
<div class="tree tree2"></div>
<div class="tree tree3"></div>
<div class="tree tree4"></div>

<div class="track"></div>

<div id="train"></div>

<div id="options"></div>

</div>

<script>

const data = [
{
nums:["_","18","19","20","21"],
opt:["15","14","17"],
ans:"17"
}
];

let current=0;
let selected=null;

const train=document.getElementById("train");
const options=document.getElementById("options");

/* START */
setTimeout(()=>{
document.getElementById("splash").style.display="none";
loadGame();
},2000);

function loadGame(){

train.innerHTML="";
options.innerHTML="";
selected=null;

let d=data[current];

/* CREATE COMPARTMENTS (LEFT SIDE) */
d.nums.forEach(n=>{
let div=document.createElement("div");
div.className="comp";
div.innerText=n;
train.appendChild(div);
});

/* ENGINE ON RIGHT */
let engine=document.createElement("div");
engine.className="engine";
train.appendChild(engine);

/* ENTER ANIMATION */
train.className="enter";

/* OPTIONS */
d.opt.forEach(o=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=o;

btn.onclick=()=>{
selected=o;
checkAnswer();
};

options.appendChild(btn);
});
}

/* CHECK */
function checkAnswer(){
if(selected===data[current].ans){

train.classList.remove("enter");
train.classList.add("exit");

setTimeout(()=>{
current++;
if(current<data.length){
train.className="";
train.style.left="120%";
loadGame();
}else{
alert("Great Job!");
}
},1500);

}else{
alert("Try Again!");
}
}

</script>

</body>
</html>
