<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before Numbers Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
  background: #eaf6ff;
}

/* SLIDES */
.slide {
  display: none;
  width: 100vw;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
}

.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* LOGO */
.logo {
  width: 200px;
}

/* INSTRUCTION */
.instruction {
  font-weight: bold;
  font-size: 20px;
  text-align: center;
  margin-top: 10px;
}

/* BACKGROUND IMAGE */
.bg {
  width: 100%;
  height: 40%;
  object-fit: cover;
}

/* TRAIN */
.train {
  display: flex;
  gap: 10px;
  margin: 20px;
  transition: transform 1s ease;
}

.compartment {
  width: 60px;
  height: 60px;
  background: #ffd54f;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border-radius: 10px;
}

/* OPTIONS */
.options {
  display: flex;
  gap: 20px;
  margin-top: 20px;
}

.option {
  width: 60px;
  height: 60px;
  background: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border: 2px solid black;
}

/* SUN */
.sun {
  font-size: 40px;
}

/* CONFETTI */
#confetti {
  font-size: 30px;
}

/* MOBILE FIX */
@media (max-width:600px){
  .compartment, .option {
    width: 50px;
    height: 50px;
    font-size: 18px;
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<!-- SLIDE 1 -->
<div class="slide active" id="slide1" style="background:white;">
  <img src="assets/innovine_logo.png" class="logo">
</div>

<!-- GAME SLIDES -->
<div id="gameSlides"></div>

<!-- SLIDE 7 -->
<div class="slide" id="lastSlide">
  <div id="confetti">🎉🎉🎉</div>
  <h1>Great Job!</h1>
</div>

<script>

let currentSlide = 0;
let selected = null;

/* DATA FOR ALL SLIDES */
const slidesData = [
  {img:"slide2.png", nums:["_",18,19,20,21], options:[15,14,17], correct:17},
  {img:"slide3.png", nums:["_",21,22,23,24], options:[25,20,19], correct:20},
  {img:"slide4.png", nums:["_",26,27,28,29], options:[25,22,12], correct:25},
  {img:"slide1.png", nums:["_",18,19,20,21], options:[15,14,17], correct:17},
  {img:"slide6.png", nums:["_",12,13,14,15], options:[15,14,11], correct:11}
];

/* CREATE SLIDES */
const container = document.getElementById("gameSlides");

slidesData.forEach((data,index)=>{
  const slide = document.createElement("div");
  slide.className="slide";

  slide.innerHTML = `
    <div class="sun" id="sun${index}">😊</div>
    <div class="instruction">Identify the missing number from the given options</div>
    <img src="assets/${data.img}" class="bg">

    <div class="train" id="train${index}">
      ${data.nums.map(n=>`<div class="compartment">${n}</div>`).join("")}
    </div>

    <div class="options">
      ${data.options.map(opt=>`<div class="option" onclick="selectOption(${opt}, this)">${opt}</div>`).join("")}
    </div>
  `;

  slide.onclick = () => checkAnswer(index);
  container.appendChild(slide);
});

/* SHOW SLIDE */
function showSlide(i){
  document.querySelectorAll(".slide").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".slide")[i].classList.add("active");
}

/* SELECT OPTION */
function selectOption(value, el){
  selected = value;
  document.querySelectorAll(".option").forEach(o=>o.style.background="white");
  el.style.background="lightgreen";
}

/* CHECK ANSWER */
function checkAnswer(i){

  if(selected === null) return;

  let data = slidesData[i];
  let sun = document.getElementById("sun"+i);
  let train = document.getElementById("train"+i);

  if(selected === data.correct){

    document.getElementById("correctSound").play();
    sun.textContent = "😄";

    train.style.transform = "translateX(-200px)";

    setTimeout(()=>{
      currentSlide++;
      if(currentSlide < slidesData.length+1){
        showSlide(currentSlide);
      }else{
        showSlide(slidesData.length+1);
      }
      selected = null;
    },1000);

  } else {

    document.getElementById("wrongSound").play();
    sun.textContent = "😢";
  }
}

/* START GAME */
setTimeout(()=>{
  showSlide(1);
},2000);

</script>

</body>
</html>
