<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Numbers Game</title>

<style>
/* ---------- RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  touch-action: manipulation;
}

body {
  background: #ffffff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* ---------- MAIN WRAPPER ---------- */
#app {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.screen {
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
}

.active {
  display: flex;
}

/* ---------- SPLASH ---------- */
#splash {
  justify-content: center;
  align-items: center;
  background: #fff;
}

#splash img {
  width: 40vmin;
}

/* ---------- HEADER ---------- */
.header {
  text-align: center;
  font-weight: bold;
  font-size: 3vmin;
  padding: 1vmin;
}

/* ---------- GAME AREA ---------- */
.game-area {
  flex: 1;
  position: relative;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---------- SUN ---------- */
.sun {
  position: absolute;
  top: 2%;
  right: 2%;
  font-size: 6vmin;
  transition: transform 0.3s;
}

/* ---------- TRAIN ---------- */
.train {
  display: flex;
  gap: 1vmin;
  transition: transform 1s ease;
}

.compartment {
  width: 10vmin;
  height: 10vmin;
  background: #fff;
  border: 3px solid #333;
  border-radius: 1vmin;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4vmin;
  font-weight: bold;
}

.target {
  background: #ffe082;
}

/* ---------- OPTIONS ---------- */
.options {
  display: flex;
  justify-content: center;
  gap: 3vmin;
  padding: 2vmin;
}

.option {
  width: 12vmin;
  height: 12vmin;
  border-radius: 50%;
  background: #e3f2fd;
  border: 3px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 4vmin;
  font-weight: bold;
}

.option.selected {
  border: 5px solid #ff4081;
  transform: scale(1.1);
}

/* ---------- ANIMATIONS ---------- */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: shake 0.5s;
}

/* ---------- VICTORY ---------- */
#victory {
  justify-content: center;
  align-items: center;
  font-size: 6vmin;
  color: green;
  font-weight: bold;
}

/* ---------- CONFETTI ---------- */
.confetti {
  position: absolute;
  width: 1vmin;
  height: 1vmin;
  background: red;
  animation: fall 2s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="app">

<!-- SPLASH -->
<div id="splash" class="screen active">
  <img src="assets/innovine-logo.png">
</div>

<!-- GAME -->
<div id="game" class="screen">

  <div class="header">
    Identify the missing number from the given options
  </div>

  <div id="gameArea" class="game-area">
    <div id="sun" class="sun">😊</div>

    <div id="train" class="train"></div>
  </div>

  <div id="options" class="options"></div>
</div>

<!-- VICTORY -->
<div id="victory" class="screen">
  Great Job!
</div>

</div>

<script>
/* ---------- AUDIO ---------- */
const correctSound = new Audio('assets/correct.mp3');
const wrongSound = new Audio('assets/wrong.mp3');

/* ---------- GAME DATA ---------- */
const slides = [
  { bg:'assets/slide2.png', nums:['_',18,19,20,21], options:[15,14,17], correct:17 },
  { bg:'assets/slide3.png', nums:['_',21,22,23,24], options:[25,20,19], correct:20 },
  { bg:'assets/slide4.png', nums:['_',26,27,28,29], options:[25,22,12], correct:25 },
  { bg:'assets/slide1.png', nums:['_',18,19,20,21], options:[15,14,17], correct:17 },
  { bg:'assets/slide6.png', nums:['_',12,13,14,15], options:[15,14,11], correct:11 }
];

let current = 0;
let selected = null;

/* ---------- INIT ---------- */
setTimeout(() => {
  showScreen('game');
  loadSlide();
}, 2000);

/* ---------- SCREEN SWITCH ---------- */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- LOAD SLIDE ---------- */
function loadSlide() {
  selected = null;

  const data = slides[current];

  const area = document.getElementById('gameArea');
  area.style.backgroundImage = `url(${data.bg})`;

  const train = document.getElementById('train');
  train.innerHTML = '';

  data.nums.forEach((n, i) => {
    const div = document.createElement('div');
    div.className = 'compartment' + (i===0 ? ' target':'');
    div.textContent = n;

    if(i===0){
      div.onclick = checkAnswer;
    }

    train.appendChild(div);
  });

  const options = document.getElementById('options');
  options.innerHTML = '';

  data.options.forEach(n => {
    const div = document.createElement('div');
    div.className = 'option';
    div.textContent = n;

    div.onclick = () => {
      document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
      div.classList.add('selected');
      selected = n;
    };

    options.appendChild(div);
  });

  document.getElementById('sun').textContent = '😊';
}

/* ---------- CHECK ---------- */
function checkAnswer(){
  if(selected === null) return;

  const data = slides[current];

  if(selected === data.correct){
    correctSound.play();
    document.getElementById('sun').textContent = '😄';

    const train = document.getElementById('train');
    train.style.transform = 'translateX(-120vw)';

    setTimeout(()=>{
      current++;
      if(current >= slides.length){
        showVictory();
      } else {
        train.style.transform = 'translateX(0)';
        loadSlide();
      }
    },2000);

  } else {
    wrongSound.play();
    document.getElementById('sun').textContent = '😢';

    const train = document.getElementById('train');
    train.classList.add('shake');

    setTimeout(()=>train.classList.remove('shake'),500);

    selected = null;
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  }
}

/* ---------- VICTORY ---------- */
function showVictory(){
  showScreen('victory');
  createConfetti();
}

/* ---------- CONFETTI ---------- */
function createConfetti(){
  for(let i=0;i<50;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (Math.random()*2+1)+'s';
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
