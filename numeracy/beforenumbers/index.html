<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Before Number Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

/* FIRST SLIDE */
#intro{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffffff;
}
#intro img{
  width:200px;
  max-width:80%;
}

/* GAME BACKGROUND */
body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(#87CEEB 60%, #4CAF50 60%);
}

/* HEADER */
.header{
  text-align:center;
  font-weight:bold;
  padding:10px;
}

/* SUN */
.sun{
  position:absolute;
  top:10px;
  left:10px;
  font-size:40px;
}

/* GAME AREA */
.game{
  height:100%;
  display:flex;
  flex-direction:column;
}

/* TRAIN AREA */
.train-area{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* TRACK */
.track{
  height:80px;
  position:absolute;
  bottom:90px;
  width:100%;
  background:
    repeating-linear-gradient(
      90deg,
      #5d4037 0 40px,
      #8d6e63 40px 80px
    );
}
.track:before{
  content:"";
  position:absolute;
  top:20px;
  width:100%;
  height:6px;
  background:#3e2723;
}
.track:after{
  content:"";
  position:absolute;
  top:50px;
  width:100%;
  height:6px;
  background:#3e2723;
}

/* TRAIN */
.train{
  display:flex;
  align-items:flex-end;
  gap:12px;
  position:absolute;
  bottom:130px;
  transform:translateX(120vw);
}

/* ENGINE */
.engine{
  width:130px;height:110px;
  background:#1976d2;
  border-radius:20px;
  position:relative;
}
.engine:before{
  content:"";
  position:absolute;
  width:40px;height:35px;
  background:#90caf9;
  top:20px;left:25px;
  border-radius:8px;
}

/* SMOKE */
.smoke{
  position:absolute;
  width:15px;height:15px;
  background:#ddd;
  border-radius:50%;
  top:-15px;
  left:90px;
  animation:smoke 1.5s infinite;
}
@keyframes smoke{
  0%{transform:translateY(0);opacity:1;}
  100%{transform:translateY(-60px);opacity:0;}
}

/* COMPARTMENTS */
.comp{
  width:110px;height:110px;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}
.window{
  width:70px;height:60px;
  background:#fff;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
}

/* COLORS */
.c1{background:#fbc02d;}
.c2{background:#66bb6a;}
.c3{background:#ffa726;}
.c4{background:#ab47bc;}
.c5{background:#ec407a;}

/* WHEELS */
.wheel{
  position:absolute;
  bottom:-20px;
  width:20px;height:20px;
  background:#000;
  border-radius:50%;
}
.w1{left:20px;}
.w2{right:20px;}

/* OPTIONS */
.options{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:20px;
}
.opt{
  width:80px;height:80px;
  border-radius:50%;
  background:#eee;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  border:3px solid #444;
}
.opt.selected{border:5px solid green;}

/* FINAL */
.final{
  background:#b3e5fc;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.loopTrain{
  position:absolute;
  bottom:130px;
  display:flex;
  gap:12px;
  animation:loop 10s linear infinite;
}
@keyframes loop{
  0%{transform:translateX(120vw);}
  100%{transform:translateX(-140vw);}
}
</style>
</head>

<body>

<!-- FIRST SLIDE -->
<div id="intro">
  <img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->
<div id="game" class="game" style="display:none;">
<div class="header">Identify the before number from the given options</div>
<div class="sun" id="sun">😊</div>

<div class="train-area">
  <div class="track"></div>
  <div id="train" class="train"></div>
</div>

<div class="options" id="options"></div>
</div>

<script>
/* AUTO SHOW GAME AFTER 2 SEC */
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("game").style.display="flex";
},2000);

const levels=[
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",21,22,23,24],opt:[25,20,19],ans:20},
{nums:["_",26,27,28,29],opt:[25,22,12],ans:25},
{nums:["_",18,19,20,21],opt:[15,14,17],ans:17},
{nums:["_",12,13,14,15],opt:[15,14,11],ans:11}
];

let current=0,selected=null;

const train=document.getElementById("train");
const optionsDiv=document.getElementById("options");
const sun=document.getElementById("sun");

function createTrain(data){
  train.innerHTML="";

  let engine=document.createElement("div");
  engine.className="engine";

  let smoke=document.createElement("div");
  smoke.className="smoke";
  engine.appendChild(smoke);

  addWheels(engine);
  train.appendChild(engine);

  data.forEach((n,i)=>{
    let c=document.createElement("div");
    c.className="comp c"+(i+1);

    let w=document.createElement("div");
    w.className="window";
    w.innerText=n;

    c.appendChild(w);
    addWheels(c);

    if(i===0) c.onclick=check;

    train.appendChild(c);
  });

  setTimeout(()=>{
    train.style.transition="transform 1.5s ease-out";
    train.style.transform="translateX(0)";
  },100);
}

function addWheels(el){
  let w1=document.createElement("div");
  w1.className="wheel w1";
  let w2=document.createElement("div");
  w2.className="wheel w2";
  el.appendChild(w1);
  el.appendChild(w2);
}

function createOptions(opts){
  optionsDiv.innerHTML="";
  opts.forEach(o=>{
    let d=document.createElement("div");
    d.className="opt";
    d.innerText=o;

    d.onclick=()=>{
      document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
      d.classList.add("selected");
      selected=o;
    };

    optionsDiv.appendChild(d);
  });
}

function check(){
  if(selected==null)return;

  if(selected===levels[current].ans){
    new Audio("assets/correct.mp3").play();
    sun.innerText="😊";

    train.style.transition="transform 2s linear";
    train.style.transform="translateX(-140vw)";

    setTimeout(()=>{
      current++;
      if(current>=levels.length) showFinal();
      else load();
    },2000);

  }else{
    new Audio("assets/wrong.mp3").play();
    sun.innerText="😢";
    selected=null;
    document.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
  }
}

function load(){
  selected=null;
  sun.innerText="😊";
  train.style.transition="none";
  train.style.transform="translateX(120vw)";
  createTrain(levels[current].nums);
  createOptions(levels[current].opt);
}

function showFinal(){
  document.body.innerHTML=`
  <div class="final">
    <h1>🎉 Great Job 🎉</h1>
    <div class="track"></div>
    <div id="loopTrain" class="loopTrain"></div>
  </div>`;

  const loop=document.getElementById("loopTrain");

  function makeTrain(){
    loop.innerHTML="";

    let engine=document.createElement("div");
    engine.className="engine";
    let smoke=document.createElement("div");
    smoke.className="smoke";
    engine.appendChild(smoke);
    addWheels(engine);
    loop.appendChild(engine);

    for(let i=0;i<5;i++){
      let c=document.createElement("div");
      c.className="comp c"+((i%5)+1);
      addWheels(c);
      loop.appendChild(c);
    }
  }

  makeTrain();
}

load();
</script>

</body>
</html>
