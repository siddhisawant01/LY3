<script>


/* =====================================================
ELEMENTS
===================================================== */


var logoScreen =

document.getElementById(

"logoScreen"

);


var startScreen =

document.getElementById(

"startScreen"

);


var gameScreen =

document.getElementById(

"gameScreen"

);


var endScreen =

document.getElementById(

"endScreen"

);



var instruction =

document.getElementById(

"instruction"

);


var progress =

document.getElementById(

"progress"

);


var beforeDoor =

document.getElementById(

"beforeDoor"

);


var middleDoor =

document.getElementById(

"middleDoor"

);


var afterDoor =

document.getElementById(

"afterDoor"

);


var beforeHouse =

document.getElementById(

"beforeHouse"

);


var middleHouse =

document.getElementById(

"middleHouse"

);


var afterHouse =

document.getElementById(

"afterHouse"

);


var optionsBox =

document.getElementById(

"options"

);


var feedback =

document.getElementById(

"feedback"

);


var car =

document.getElementById(

"car"

);


var clapSound =

document.getElementById(

"clapSound"

);


var wrongSound =

document.getElementById(

"wrongSound"

);



/* =====================================================
QUESTIONS
===================================================== */


var questionsOriginal = [


{

number:31,

type:"before"

},


{

number:37,

type:"after"

},


{

number:34,

type:"before"

},


{

number:39,

type:"after"

},


{

number:36,

type:"before"

},


{

number:32,

type:"after"

},


{

number:40,

type:"before"

},


{

number:35,

type:"after"

},


{

number:38,

type:"before"

},


{

number:33,

type:"after"

},


{

number:36,

type:"both"

},


{

number:39,

type:"both"

}


];



var questions = [];


var currentQuestion = 0;


var wrongAttempts = 0;


var selectedBefore = false;


var selectedAfter = false;


var questionLocked = false;



/* =====================================================
HOUSE COLOURS
===================================================== */


var houseColours = [


{

body:"#ffb2c8",

roof:"#e96988"

},


{

body:"#9bdcf5",

roof:"#4ca8dd"

},


{

body:"#ffd995",

roof:"#e9984c"

},


{

body:"#b6e3a7",

roof:"#62b66d"

},


{

body:"#c8b4f2",

roof:"#8969d0"

},


{

body:"#ffbd99",

roof:"#e77d55"

},


{

body:"#a8e3d6",

roof:"#4eb2a1"

},


{

body:"#ffd2eb",

roof:"#db77b0"

}


];



/* =====================================================
LOGO FOR TWO SECONDS
===================================================== */


setTimeout(


function(){


logoScreen.className =

"screen";


startScreen.className =

"screen active";


},


2000


);



/* =====================================================
START GAME
===================================================== */


function startGame(){


unlockAudio();


startScreen.className =

"screen";


endScreen.className =

"screen";


gameScreen.className =

"screen active";


prepareGame();


}



/* =====================================================
RESTART
===================================================== */


function restartGame(){


clearConfetti();


endScreen.className =

"screen";


gameScreen.className =

"screen active";


prepareGame();


}



/* =====================================================
PREPARE QUESTIONS
===================================================== */


function prepareGame(){


var mixed =

shuffleArray(

questionsOriginal.slice()

);


var normal = [];


var both = [];


var i;



for(

i=0;

i<mixed.length;

i++

){


if(

mixed[i].type === "both"

){


both.push(

mixed[i]

);


}


else{


normal.push(

mixed[i]

);


}


}



questions =

shuffleArray(

normal

)

.concat(

shuffleArray(

both

)

);


currentQuestion = 0;


loadQuestion();


}



/* =====================================================
PERMANENT INSTRUCTION SPACING FIX

The entire sentence is placed inside one span.

Permanent spaces are inserted around before and after.

The browser cannot display:

comesafter37

===================================================== */


function setInstruction(

question

){



if(

question.type === "before"

||

question.type === "after"

){


instruction.innerHTML =


'<span class="instruction-line">' +


'Tap the number that comes&nbsp;' +


'<span class="instruction-word">' +


question.type +


'</span>' +


'&nbsp;' +


'<span class="instruction-number">' +


question.number +


'.</span>' +


'</span>';


}



else{


instruction.innerHTML =


'<span class="instruction-line">' +


'Find both neighbours of&nbsp;' +


'<span class="instruction-number">' +


question.number +


'.</span>' +


'</span>';


}


}



/* =====================================================
LOAD QUESTION
===================================================== */


function loadQuestion(){


var question =

questions[

currentQuestion

];


var number =

question.number;



questionLocked = false;


wrongAttempts = 0;


selectedBefore = false;


selectedAfter = false;



hideFeedback();


resetCar();


removeAllGlows();



beforeHouse.className =

"house";


middleHouse.className =

"house";


afterHouse.className =

"house";



progress.textContent =

(

currentQuestion + 1

)

+

" / "

+

questions.length;



setInstruction(

question

);



middleDoor.textContent =

number;


middleDoor.className =

"door";



beforeDoor.textContent =

"?";


afterDoor.textContent =

"?";



beforeDoor.className =

"door empty";


afterDoor.className =

"door empty";



if(

question.type === "before"

){


afterDoor.textContent =

number + 1;


afterDoor.className =

"door";


}



else if(

question.type === "after"

){


beforeDoor.textContent =

number - 1;


beforeDoor.className =

"door";


}



colourHouses();


createOptions(

question

);


}



/* =====================================================
COLOUR HOUSES
===================================================== */


function colourHouses(){


var colours =

shuffleArray(

houseColours.slice()

);


setHouseColour(

beforeHouse,

colours[0]

);


setHouseColour(

middleHouse,

colours[1]

);


setHouseColour(

afterHouse,

colours[2]

);


}



/* =====================================================
SET HOUSE COLOUR
===================================================== */


function setHouseColour(

house,

colour

){


house.style.setProperty(

"--body",

colour.body

);


house.style.setProperty(

"--roof",

colour.roof

);


}



/* =====================================================
CREATE OPTIONS
===================================================== */


function createOptions(

question

){


var number =

question.number;


var answers;


var i;



optionsBox.innerHTML =

"";



if(

question.type === "before"

){


answers = [


number - 1,


number + 1,


number - 2


];


}



else if(

question.type === "after"

){


answers = [


number + 1,


number - 1,


number + 2


];


}



else{


answers = [


number - 1,


number + 1,


number - 2,


number + 2


];


}



answers =

shuffleArray(

answers

);



for(

i=0;

i<answers.length;

i++

){


var button =

document.createElement(

"button"

);


button.type =

"button";


button.className =

"option";


button.textContent =

answers[i];


button.setAttribute(

"data-number",

answers[i]

);


button.onclick =

function(){


checkAnswer(

this

);


};


optionsBox.appendChild(

button

);


}


}



/* =====================================================
CHECK ANSWER
===================================================== */


function checkAnswer(

button

){



if(

questionLocked

){


return;


}



var question =

questions[

currentQuestion

];


var chosenNumber =

parseInt(

button.getAttribute(

"data-number"

),

10

);


var correctBefore =

question.number - 1;


var correctAfter =

question.number + 1;



/* BEFORE */


if(

question.type === "before"

){


if(

chosenNumber === correctBefore

){


beforeDoor.textContent =

correctBefore;


beforeDoor.className =

"door";


button.className =

"option correct-card";


finishQuestion();


}


else{


wrongAnswer(

button

);


}


return;


}



/* AFTER */


if(

question.type === "after"

){


if(

chosenNumber === correctAfter

){


afterDoor.textContent =

correctAfter;


afterDoor.className =

"door";


button.className =

"option correct-card";


finishQuestion();


}


else{


wrongAnswer(

button

);


}


return;


}



/* BOTH */


if(

chosenNumber === correctBefore

&&

!selectedBefore

){


selectedBefore = true;


beforeDoor.textContent =

correctBefore;


beforeDoor.className =

"door";


button.className =

"option correct-card used";


button.classList.remove(

"correct-glow"

);



if(

selectedAfter

){


finishQuestion();


}


return;


}



if(

chosenNumber === correctAfter

&&

!selectedAfter

){


selectedAfter = true;


afterDoor.textContent =

correctAfter;


afterDoor.className =

"door";


button.className =

"option correct-card used";


button.classList.remove(

"correct-glow"

);



if(

selectedBefore

){


finishQuestion();


}


return;


}



if(

chosenNumber === correctBefore

&&

selectedBefore

){


return;


}



if(

chosenNumber === correctAfter

&&

selectedAfter

){


return;


}



wrongAnswer(

button

);


}



/* =====================================================
WRONG ANSWER
===================================================== */


function wrongAnswer(

button

){


wrongAttempts++;


playSound(

wrongSound

);



button.classList.remove(

"wrong-jiggle"

);


void button.offsetWidth;


button.classList.add(

"wrong-jiggle"

);



setTimeout(


function(){


button.classList.remove(

"wrong-jiggle"

);


},


500


);



if(

wrongAttempts >= 2

){


glowCorrectAnswers();


}


}



/* =====================================================
GLOW CORRECT ANSWERS
===================================================== */


function glowCorrectAnswers(){


var question =

questions[

currentQuestion

];


var correctBefore =

question.number - 1;


var correctAfter =

question.number + 1;


var buttons =

optionsBox.getElementsByTagName(

"button"

);


var i;



for(

i=0;

i<buttons.length;

i++

){


var value =

parseInt(

buttons[i].getAttribute(

"data-number"

),

10

);



if(

question.type === "before"

&&

value === correctBefore

){


buttons[i].classList.add(

"correct-glow"

);


}



else if(

question.type === "after"

&&

value === correctAfter

){


buttons[i].classList.add(

"correct-glow"

);


}



else if(

question.type === "both"

){



if(

value === correctBefore

&&

!selectedBefore

){


buttons[i].classList.add(

"correct-glow"

);


}



if(

value === correctAfter

&&

!selectedAfter

){


buttons[i].classList.add(

"correct-glow"

);


}


}


}


}



/* =====================================================
REMOVE ALL GLOWS
===================================================== */


function removeAllGlows(){


var buttons =

optionsBox.getElementsByTagName(

"button"

);


var i;



for(

i=0;

i<buttons.length;

i++

){


buttons[i].classList.remove(

"correct-glow"

);


}


}



/* =====================================================
FINISH QUESTION
===================================================== */


function finishQuestion(){



if(

questionLocked

){


return;


}



questionLocked = true;



removeAllGlows();



beforeHouse.classList.add(

"lit"

);


middleHouse.classList.add(

"lit"

);


afterHouse.classList.add(

"lit"

);



showFeedback();


playSound(

clapSound

);


driveCar();



setTimeout(


function(){


currentQuestion++;



if(

currentQuestion >=

questions.length

){


showEndScreen();


}


else{


loadQuestion();


}


},


2200


);


}



/* =====================================================
FEEDBACK
===================================================== */


function showFeedback(){


feedback.className =

"feedback show";


}


function hideFeedback(){


feedback.className =

"feedback";


}



/* =====================================================
CAR
===================================================== */


function driveCar(){


car.classList.remove(

"drive"

);


void car.offsetWidth;


car.classList.add(

"drive"

);


}


function resetCar(){


car.classList.remove(

"drive"

);


}



/* =====================================================
END SCREEN
===================================================== */


function showEndScreen(){


hideFeedback();


gameScreen.className =

"screen";


endScreen.className =

"screen active";


createConfetti();


}



/* =====================================================
CONFETTI
===================================================== */


function createConfetti(){


clearConfetti();



var colours = [


"#ff5f83",


"#ffd84d",


"#6fcf78",


"#66b8ff",


"#9b73e8",


"#ff954e"


];


var i;



for(

i=0;

i<95;

i++

){


var piece =

document.createElement(

"div"

);


piece.className =

"confetti-piece";


piece.style.left =

Math.floor(

Math.random()

*

100

)

+

"%";


piece.style.background =

colours[


Math.floor(

Math.random()

*

colours.length

)


];


piece.style.animationDuration =

(

2.5

+

Math.random()

*

3

)

+

"s";


piece.style.animationDelay =

(

Math.random()

*

1.4

)

+

"s";


document.body.appendChild(

piece

);


}


}



/* =====================================================
CLEAR CONFETTI
===================================================== */


function clearConfetti(){


var pieces =

document.getElementsByClassName(

"confetti-piece"

);



while(

pieces.length > 0

){


pieces[0]

.parentNode

.removeChild(

pieces[0]

);


}


}



/* =====================================================
PLAY AUDIO
===================================================== */


function playSound(

audio

){


try{


audio.pause();


audio.currentTime = 0;


var promise =

audio.play();



if(

promise

&&

promise.catch

){


promise.catch(

function(){}

);


}


}


catch(

error

){


}


}



/* =====================================================
UNLOCK AUDIO
===================================================== */


function unlockAudio(){


try{


clapSound.volume = 0;


var firstPromise =

clapSound.play();



if(

firstPromise

&&

firstPromise.catch

){


firstPromise.catch(

function(){}

);


}



clapSound.pause();


clapSound.currentTime = 0;


clapSound.volume = 1;



wrongSound.volume = 0;


var secondPromise =

wrongSound.play();



if(

secondPromise

&&

secondPromise.catch

){


secondPromise.catch(

function(){}

);


}



wrongSound.pause();


wrongSound.currentTime = 0;


wrongSound.volume = 1;


}


catch(

error

){


}


}



/* =====================================================
SHUFFLE
===================================================== */


function shuffleArray(

array

){


var i;


var randomIndex;


var temporaryValue;



for(

i = array.length - 1;

i > 0;

i--

){


randomIndex =

Math.floor(

Math.random()

*

(

i + 1

)

);


temporaryValue =

array[i];


array[i] =

array[randomIndex];


array[randomIndex] =

temporaryValue;


}



return array;


}
