<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Number Neighbour Street</title>

<style>

/* =========================================================
   BASIC SETTINGS
========================================================= */

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;
    user-select:none;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:
    "Arial Rounded MT Bold",
    "Comic Sans MS",
    Arial,
    sans-serif;

    background:#ffffff;
}

button{
    font-family:inherit;
    touch-action:manipulation;
}


/* =========================================================
   COMMON SCREEN
========================================================= */

.screen{
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    display:none;

    align-items:center;
    justify-content:center;

    overflow:hidden;
}

.screen.active{
    display:flex;
}


/* =========================================================
   LOGO SCREEN
========================================================= */

#logoScreen{
    background:#ffffff;
}

.logo{
    width:250px;
    max-width:68%;

    height:auto;

    animation:logoPop 1.1s ease;
}

@keyframes logoPop{

    0%{
        opacity:0;
        transform:scale(.7);
    }

    70%{
        opacity:1;
        transform:scale(1.06);
    }

    100%{
        transform:scale(1);
    }
}


/* =========================================================
   START SCREEN
========================================================= */

#startScreen{

    flex-direction:column;

    padding:20px;

    text-align:center;

    background:
    linear-gradient(
    to bottom,
    #cceeff 0%,
    #e5f8ff 48%,
    #c9f1b8 48%,
    #9bd878 100%
    );
}

.start-card{

    position:relative;

    width:92%;
    max-width:730px;

    padding:25px 25px 28px;

    border:6px solid #ffffff;

    border-radius:35px;

    background:rgba(255,255,255,.95);

    box-shadow:
    0 10px 0 rgba(75,135,120,.18),
    0 16px 28px rgba(0,0,0,.12);
}

.start-icon{

    font-size:70px;

    line-height:1;

    margin-bottom:5px;
}

.start-card h1{

    margin:4px 0 10px;

    color:#ef5a83;

    font-size:43px;

    line-height:1.08;
}

.start-card p{

    margin:8px auto 20px;

    max-width:580px;

    color:#355879;

    font-size:23px;

    line-height:1.35;
}

.start-btn{

    min-width:190px;

    padding:15px 35px;

    border:0;

    border-radius:50px;

    background:#56bd75;

    color:#ffffff;

    font-size:27px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:
    0 7px 0 #319755,
    0 10px 16px rgba(0,0,0,.15);
}

.start-btn:active{

    transform:translateY(5px);

    box-shadow:
    0 2px 0 #319755;
}


/* =========================================================
   MAIN GAME SCREEN
========================================================= */

#gameScreen{

    flex-direction:column;

    justify-content:flex-start;

    background:
    linear-gradient(
    to bottom,
    #bfeaff 0%,
    #e9f8ff 53%,
    #d9f4bc 53%,
    #a8dd78 100%
    );
}


/* =========================================================
   SKY DECORATIONS
========================================================= */

.sun{

    position:absolute;

    top:65px;
    right:5%;

    width:70px;
    height:70px;

    border-radius:50%;

    background:#ffd95a;

    box-shadow:
    0 0 0 10px rgba(255,221,91,.25);

    z-index:0;
}

.cloud{

    position:absolute;

    width:95px;
    height:32px;

    border-radius:40px;

    background:#ffffff;

    opacity:.96;

    z-index:0;
}

.cloud:before,
.cloud:after{

    content:"";

    position:absolute;

    border-radius:50%;

    background:#ffffff;
}

.cloud:before{

    width:42px;
    height:42px;

    left:15px;
    top:-20px;
}

.cloud:after{

    width:52px;
    height:52px;

    right:12px;
    top:-28px;
}

.cloud-one{

    top:88px;
    left:5%;
}

.cloud-two{

    top:130px;
    right:18%;

    transform:scale(.75);
}


/* =========================================================
   RAINBOW
========================================================= */

.rainbow{

    position:absolute;

    left:50%;

    top:89px;

    transform:translateX(-50%);

    width:190px;
    height:94px;

    border-radius:
    190px 190px 0 0;

    background:

    radial-gradient(
    ellipse at center bottom,

    transparent 0,
    transparent 38%,

    #ffffff 39%,
    #ffffff 43%,

    #8fd7ff 44%,
    #8fd7ff 50%,

    #8be086 51%,
    #8be086 57%,

    #ffe064 58%,
    #ffe064 64%,

    #ff9b66 65%,
    #ff9b66 71%,

    #ec7d9f 72%,
    #ec7d9f 100%
    );

    opacity:.8;

    z-index:0;
}


/* =========================================================
   HEADER
========================================================= */

.game-header{

    position:relative;

    z-index:5;

    width:100%;

    min-height:71px;

    padding:
    10px 16px 7px;

    display:flex;

    align-items:center;
    justify-content:space-between;

    background:
    rgba(255,255,255,.93);

    border-bottom:
    4px solid #ffffff;

    box-shadow:
    0 4px 12px rgba(0,0,0,.08);
}

.small-title{

    color:#ec5682;

    font-size:24px;

    font-weight:bold;
}

.progress-box{

    min-width:100px;

    padding:8px 13px;

    border-radius:25px;

    background:#fff1a8;

    color:#795c16;

    font-size:18px;

    font-weight:bold;
}


/* =========================================================
   GAME CONTENT
========================================================= */

.game-area{

    position:relative;

    z-index:4;

    width:100%;

    flex:1;

    min-height:0;

    display:flex;

    flex-direction:column;

    align-items:center;

    padding:
    7px 12px 5px;
}


/* =========================================================
   INSTRUCTION
========================================================= */

.instruction{

    position:relative;

    z-index:5;

    width:92%;
    max-width:760px;

    min-height:48px;

    display:flex;

    align-items:center;
    justify-content:center;

    padding:
    7px 15px;

    border:
    3px solid #ffffff;

    border-radius:28px;

    background:
    rgba(255,255,255,.94);

    color:#3b6282;

    font-size:25px;

    font-weight:bold;

    text-align:center;

    box-shadow:
    0 5px 12px rgba(0,0,0,.09);
}


/* =========================================================
   STREET SCENE
========================================================= */

.street-scene{

    position:relative;

    width:100%;
    max-width:950px;

    flex:1;

    min-height:275px;

    display:flex;

    align-items:flex-end;

    justify-content:center;

    padding-bottom:58px;
}


/* =========================================================
   TREES
========================================================= */

.tree{

    position:absolute;

    bottom:65px;

    width:30px;
    height:83px;

    border-radius:10px;

    background:#a46a43;

    z-index:1;
}

.tree:before{

    content:"";

    position:absolute;

    width:76px;
    height:76px;

    left:-23px;
    top:-42px;

    border-radius:50%;

    background:#63c66e;

    box-shadow:

    -23px 20px 0 #79d481,

    24px 17px 0 #50b961;
}

.tree-left{

    left:3%;
}

.tree-right{

    right:3%;
}


/* =========================================================
   FLOWERS
========================================================= */

.flower{

    position:absolute;

    bottom:59px;

    font-size:28px;

    z-index:3;
}

.flower-one{

    left:14%;
}

.flower-two{

    right:14%;
}


/* =========================================================
   HOUSE AREA
========================================================= */

.houses{

    position:relative;

    z-index:3;

    width:89%;
    max-width:770px;

    display:flex;

    align-items:flex-end;

    justify-content:center;

    gap:20px;
}


/* =========================================================
   HOUSE
========================================================= */

.house{

    position:relative;

    width:30%;

    max-width:225px;

    min-width:155px;

    height:190px;

    border:

    6px solid #ffffff;

    border-radius:

    16px 16px 9px 9px;

    background:#ffb5c8;

    box-shadow:

    0 9px 0 rgba(95,91,95,.18),

    0 13px 18px rgba(0,0,0,.13);
}

.house:before{

    content:"";

    position:absolute;

    left:50%;

    top:-72px;

    transform:

    translateX(-50%)

    rotate(45deg);

    width:128px;
    height:128px;

    border:

    6px solid #ffffff;

    border-radius:

    13px 0 0 0;

    background:#e76c82;

    z-index:-1;
}


/* =========================================================
   CHIMNEY
========================================================= */

.chimney{

    position:absolute;

    right:19px;

    top:-68px;

    width:25px;
    height:57px;

    border:

    4px solid #ffffff;

    background:#985947;

    z-index:-1;
}


/* =========================================================
   HOUSE LABEL
========================================================= */

.house-label{

    position:absolute;

    top:9px;

    left:50%;

    transform:translateX(-50%);

    width:94%;

    color:#6c4454;

    font-size:20px;

    font-weight:bold;

    text-align:center;
}


/* =========================================================
   WINDOW
========================================================= */

.window{

    position:absolute;

    top:49px;

    left:17px;

    width:48px;
    height:48px;

    border:

    5px solid #ffffff;

    border-radius:8px;

    background:#98d9f4;

    overflow:hidden;

    transition:.3s;
}

.window:before{

    content:"";

    position:absolute;

    width:100%;
    height:4px;

    left:0;

    top:50%;

    background:#ffffff;

    transform:translateY(-50%);
}

.window:after{

    content:"";

    position:absolute;

    width:4px;
    height:100%;

    top:0;

    left:50%;

    background:#ffffff;

    transform:translateX(-50%);
}

.house.lit .window{

    background:#ffe85e;

    box-shadow:

    0 0 12px #ffe34b,

    0 0 23px #fff08a;
}


/* =========================================================
   DOOR
========================================================= */

.door{

    position:absolute;

    right:17px;

    bottom:0;

    width:80px;
    height:118px;

    display:flex;

    align-items:center;

    justify-content:center;

    border:

    6px solid #ffffff;

    border-bottom:0;

    border-radius:

    15px 15px 0 0;

    background:#915e45;

    color:#ffffff;

    font-size:44px;

    font-weight:bold;

    text-shadow:

    0 3px 0 rgba(0,0,0,.13);
}

.door.empty{

    color:#75584d;

    background:#fff7e7;

    border-color:#ffffff;
}


/* =========================================================
   ROAD
========================================================= */

.road{

    position:absolute;

    left:0;

    bottom:0;

    width:100%;
    height:62px;

    overflow:hidden;

    border-top:

    5px solid #f9d183;

    background:#646d77;

    z-index:4;
}

.road-line{

    position:absolute;

    top:28px;

    left:0;

    width:200%;

    height:7px;

    background:

    repeating-linear-gradient(

    to right,

    #ffffff 0,

    #ffffff 45px,

    transparent 45px,

    transparent 85px
    );
}


/* =========================================================
   CAR
========================================================= */

.car{

    position:absolute;

    left:-130px;

    bottom:10px;

    z-index:7;

    width:115px;
    height:42px;

    border-radius:

    18px 27px 10px 10px;

    background:#ff605d;

    box-shadow:

    inset 0 -6px 0 rgba(0,0,0,.1);

    transition:none;
}

.car:before{

    content:"";

    position:absolute;

    left:26px;

    top:-26px;

    width:61px;
    height:34px;

    border-radius:

    25px 25px 0 0;

    border:

    5px solid #ff605d;

    background:#9de3fb;
}

.car:after{

    content:"";

    position:absolute;

    left:17px;

    bottom:-11px;

    width:24px;
    height:24px;

    border-radius:50%;

    background:#263a4b;

    box-shadow:

    60px 0 0 #263a4b;
}

.car-drive{

    animation:

    driveAcross 1.65s ease-in-out forwards;
}

@keyframes driveAcross{

    0%{
        left:-130px;
    }

    100%{
        left:110%;
    }
}


/* =========================================================
   ANSWER AREA
========================================================= */

.answer-area{

    position:relative;

    z-index:7;

    width:100%;

    min-height:100px;

    display:flex;

    align-items:center;

    justify-content:center;

    padding:

    4px 7px 8px;
}

.options{

    width:96%;
    max-width:730px;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:17px;
}


/* =========================================================
   ANSWER BUTTON
========================================================= */

.option{

    width:135px;
    height:76px;

    padding:4px;

    border:

    5px solid #ffffff;

    border-radius:24px;

    background:#8c7ce4;

    color:#ffffff;

    font-size:38px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:

    0 7px 0 #6255b8,

    0 11px 14px rgba(0,0,0,.14);

    transition:

    transform .15s,

    opacity .2s;
}

.option:active{

    transform:

    translateY(5px);

    box-shadow:

    0 2px 0 #6255b8;
}

.option.used{

    opacity:.32;

    pointer-events:none;

    box-shadow:none;
}

.option.correct-card{

    background:#61c97d;

    box-shadow:

    0 7px 0 #3c9a57;
}


/* =========================================================
   WRONG JIGGLE
========================================================= */

.wrong-jiggle{

    animation:

    wrongJiggle .43s ease;
}

@keyframes wrongJiggle{

    0%{
        transform:translateX(0);
    }

    20%{
        transform:translateX(-13px) rotate(-3deg);
    }

    40%{
        transform:translateX(13px) rotate(3deg);
    }

    60%{
        transform:translateX(-9px) rotate(-2deg);
    }

    80%{
        transform:translateX(9px) rotate(2deg);
    }

    100%{
        transform:translateX(0);
    }
}


/* =========================================================
   CORRECT GLOW
========================================================= */

.correct-glow{

    animation:

    correctGlow .75s infinite alternate;
}

@keyframes correctGlow{

    from{

        transform:scale(1);

        background:#ffd75d;

        box-shadow:

        0 0 8px #fff171,

        0 7px 0 #d5a42e;
    }

    to{

        transform:scale(1.1);

        background:#ffef6f;

        box-shadow:

        0 0 24px #fff02c,

        0 7px 0 #d5a42e;
    }
}


/* =========================================================
   FEEDBACK
========================================================= */

.feedback{

    position:fixed;

    left:50%;
    top:50%;

    transform:

    translate(-50%,-50%)

    scale(.5);

    z-index:30;

    display:none;

    min-width:230px;

    padding:

    16px 26px;

    border:

    6px solid #ffffff;

    border-radius:30px;

    background:#59ca76;

    color:#ffffff;

    font-size:34px;

    font-weight:bold;

    text-align:center;

    box-shadow:

    0 12px 32px rgba(0,0,0,.22);
}

.feedback.show{

    display:block;

    animation:

    feedbackPop .48s ease forwards;
}

@keyframes feedbackPop{

    0%{

        opacity:0;

        transform:

        translate(-50%,-50%)

        scale(.45)

        rotate(-6deg);
    }

    75%{

        opacity:1;

        transform:

        translate(-50%,-50%)

        scale(1.1)

        rotate(2deg);
    }

    100%{

        transform:

        translate(-50%,-50%)

        scale(1);
    }
}


/* =========================================================
   END SCREEN
========================================================= */

#endScreen{

    flex-direction:column;

    padding:18px;

    text-align:center;

    background:

    linear-gradient(

    #c5efff,

    #f7e4ff,

    #fff1b9
    );
}

.end-card{

    position:relative;

    z-index:4;

    width:92%;
    max-width:680px;

    padding:

    27px 25px;

    border:

    7px solid #ffffff;

    border-radius:38px;

    background:

    rgba(255,255,255,.94);

    box-shadow:

    0 12px 0 rgba(157,105,173,.16),

    0 18px 35px rgba(0,0,0,.14);
}

.end-stars{

    font-size:58px;

    line-height:1;

    margin-bottom:7px;
}

.end-card h1{

    margin:6px 0;

    color:#eb5683;

    font-size:52px;
}

.end-card p{

    margin:

    10px 0 20px;

    color:#476483;

    font-size:24px;
}

.play-again{

    padding:

    15px 34px;

    border:0;

    border-radius:50px;

    background:#6c72dd;

    color:#ffffff;

    font-size:25px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:

    0 7px 0 #4d50aa;
}

.play-again:active{

    transform:translateY(5px);

    box-shadow:

    0 2px 0 #4d50aa;
}


/* =========================================================
   CONFETTI
========================================================= */

.confetti-piece{

    position:fixed;

    z-index:2;

    top:-30px;

    width:13px;
    height:20px;

    border-radius:3px;

    pointer-events:none;

    animation:

    confettiFall linear forwards;
}

@keyframes confettiFall{

    0%{

        transform:

        translateY(-20px)

        rotate(0deg);

        opacity:1;
    }

    100%{

        transform:

        translateY(115vh)

        rotate(760deg);

        opacity:.95;
    }
}


/* =========================================================
   TABLET SIZE
========================================================= */

@media screen and (max-height:730px){

    .game-header{

        min-height:57px;

        padding:

        6px 13px;
    }

    .small-title{

        font-size:20px;
    }

    .progress-box{

        font-size:16px;

        padding:

        6px 11px;
    }

    .game-area{

        padding-top:5px;
    }

    .instruction{

        min-height:40px;

        font-size:21px;

        padding:5px 12px;
    }

    .street-scene{

        min-height:240px;

        padding-bottom:52px;
    }

    .house{

        height:154px;

        max-width:190px;

        min-width:130px;
    }

    .house:before{

        top:-59px;

        width:107px;
        height:107px;
    }

    .house-label{

        top:4px;

        font-size:17px;
    }

    .window{

        top:37px;

        left:12px;

        width:41px;
        height:41px;
    }

    .door{

        right:11px;

        width:69px;
        height:98px;

        font-size:35px;
    }

    .road{

        height:53px;
    }

    .road-line{

        top:24px;
    }

    .answer-area{

        min-height:87px;

        padding:

        2px 5px 6px;
    }

    .option{

        width:120px;
        height:63px;

        font-size:32px;
    }

    .tree{

        transform:scale(.8);

        bottom:50px;
    }
}


/* =========================================================
   MOBILE PORTRAIT
========================================================= */

@media screen and (max-width:650px){

    .start-card{

        padding:

        21px 15px 24px;
    }

    .start-icon{

        font-size:54px;
    }

    .start-card h1{

        font-size:32px;
    }

    .start-card p{

        font-size:18px;
    }

    .start-btn{

        font-size:23px;
    }

    .game-header{

        min-height:55px;

        padding:

        6px 9px;
    }

    .small-title{

        font-size:17px;
    }

    .progress-box{

        min-width:84px;

        font-size:14px;

        padding:

        7px 8px;
    }

    .instruction{

        width:97%;

        min-height:40px;

        font-size:19px;

        padding:

        5px 8px;
    }

    .rainbow{

        width:145px;

        height:72px;

        top:98px;
    }

    .sun{

        width:48px;
        height:48px;

        top:82px;
    }

    .cloud{

        transform:scale(.58);
    }

    .cloud-one{

        left:-10px;
    }

    .cloud-two{

        right:8%;
    }

    .street-scene{

        width:100%;

        min-height:305px;

        padding-bottom:53px;
    }

    .houses{

        width:98%;

        gap:6px;
    }

    .house{

        width:32%;

        min-width:0;

        height:155px;

        border-width:4px;
    }

    .house:before{

        width:90px;
        height:90px;

        top:-50px;

        border-width:4px;
    }

    .chimney{

        top:-53px;

        right:10px;

        width:18px;
        height:41px;

        border-width:3px;
    }

    .house-label{

        top:5px;

        font-size:14px;
    }

    .window{

        left:7px;

        top:37px;

        width:37px;
        height:37px;

        border-width:4px;
    }

    .door{

        right:6px;

        width:58px;
        height:96px;

        border-width:4px;

        border-bottom:0;

        font-size:30px;
    }

    .tree{

        display:none;
    }

    .flower{

        display:none;
    }

    .road{

        height:54px;
    }

    .car{

        transform:scale(.82);

        transform-origin:left bottom;
    }

    .answer-area{

        min-height:87px;

        padding:

        2px 4px 7px;
    }

    .options{

        width:100%;

        gap:7px;
    }

    .option{

        width:22%;

        min-width:69px;

        max-width:97px;

        height:64px;

        border-width:4px;

        border-radius:19px;

        font-size:30px;
    }

    .feedback{

        min-width:205px;

        padding:

        14px 18px;

        font-size:28px;
    }

    .end-card h1{

        font-size:40px;
    }

    .end-card p{

        font-size:20px;
    }
}


/* =========================================================
   SMALL MOBILE HEIGHT
========================================================= */

</style>
</head>


<body>

     AUDIO

<audio id="clapSound" preload="auto">

    <source
    src="assets/claps.mp3"
    type="audio/mpeg">

</audio>


<audio
id="wrongSound"
src="assets/wrong.mp3"
preload="auto">
</audio>



<!-- ======================================================
     LOGO SCREEN

<section
id="logoScreen"
class="screen active">

    <img

    src="assets/innovine-logo.png"
    alt="Innovine">

     START SCREEN

<section
id="startScreen"
class="screen">

    <div class="start-card">

                        38

                <!-- AFTER HOUSE -->

                <div

                    <div class="chimney"></div>

        <h1>

            number neighbours!

        class="play-again"
        onclick="restartGame()">

            🔄 Play Again

        </button>

<script>


/* =========================================================
   SCREEN ELEMENTS
========================================================= */

var logoScreen =
document.getElementById("logoScreen");

var startScreen =
document.getElementById("startScreen");

var gameScreen =
document.getElementById("gameScreen");

var endScreen =
document.getElementById("endScreen");



/* =========================================================
   GAME ELEMENTS
========================================================= */

var instruction =
document.getElementById("instruction");

var progress =
document.getElementById("progress");

var beforeDoor =
document.getElementById("beforeDoor");

var middleDoor =
document.getElementById("middleDoor");

var afterDoor =
document.getElementById("afterDoor");

var beforeHouse =
document.getElementById("beforeHouse");

var middleHouse =
document.getElementById("middleHouse");

var afterHouse =
document.getElementById("afterHouse");

var optionsBox =
document.getElementById("options");

var feedback =
document.getElementById("feedback");

var car =
document.getElementById("car");



/* =========================================================
   AUDIO
========================================================= */

var clapSound =
document.getElementById("clapSound");

var wrongSound =
document.getElementById("wrongSound");



/* =========================================================
   GAME INFORMATION

   type:
   "before"
   "after"
   "both"
========================================================= */

var questionsOriginal = [

    {
        number:31,
        type:"before"
    },

    {
        number:37,
        type:"after"
    },

    {
        number:34,
        type:"before"
    },

    {
        number:39,
        type:"after"
    },

    {
        number:36,
        type:"before"
    },

    {
        number:32,
        type:"after"
    },

    {
        number:40,
        type:"before"
    },

    {
        number:35,
        type:"after"
    },

    {
        number:38,
        type:"before"
    },

    {
        number:33,
        type:"after"
    },

    {
        number:36,
        type:"both"
    },

    {
        number:39,
        type:"both"
    }

];


var questions = [];

var currentQuestion = 0;

var wrongAttempts = 0;

var selectedBefore = false;

var selectedAfter = false;

var questionLocked = false;



/* =========================================================
   HOUSE COLOURS
========================================================= */

var houseColours = [

    {
        body:"#ffb2c8",
        roof:"#e96988"
    },

    {
        body:"#9bdcf5",
        roof:"#4ca8dd"
    },

    {
        body:"#ffd995",
        roof:"#e9984c"
    },

    {
        body:"#b6e3a7",
        roof:"#62b66d"
    },

    {
        body:"#c8b4f2",
        roof:"#8969d0"
    },

    {
        body:"#ffbd99",
        roof:"#e77d55"
    },

    {
        body:"#a8e3d6",
        roof:"#4eb2a1"
    },

    {
        body:"#ffd2eb",
        roof:"#db77b0"
    }

];



/* =========================================================
   SHOW START SCREEN AFTER 2 SECONDS
========================================================= */

setTimeout(function(){

    logoScreen.className =
    "screen";

    startScreen.className =
    "screen active";

},2000);



/* =========================================================
   START GAME
========================================================= */

function startGame(){


    unlockAudio();


    startScreen.className =
    "screen";

    endScreen.className =
    "screen";

    gameScreen.className =
    "screen active";


    prepareGame();

}



/* =========================================================
   PREPARE GAME
========================================================= */

function prepareGame(){


    questions =
    shuffleArray(
    questionsOriginal.slice()
    );


    /*
    Keep the two
    "find both neighbours"
    questions near the end.
    */

    var normalQuestions = [];

    var bothQuestions = [];


    var i;


    for(
    i=0;
    i<questions.length;
    i++
    ){

        if(
        questions[i].type==="both"
        ){

            bothQuestions.push(
            questions[i]
            );

        }
        else{

            normalQuestions.push(
            questions[i]
            );

        }

    }


    normalQuestions =
    shuffleArray(
    normalQuestions
    );


    bothQuestions =
    shuffleArray(
    bothQuestions
    );


    questions =
    normalQuestions.concat(
    bothQuestions
    );


    currentQuestion = 0;


    loadQuestion();

}



/* =========================================================
   LOAD QUESTION
========================================================= */

function loadQuestion(){


    questionLocked = false;

    wrongAttempts = 0;

    selectedBefore = false;

    selectedAfter = false;


    hideFeedback();


    resetCar();


    beforeHouse.className =
    "house";

    middleHouse.className =
    "house";

    afterHouse.className =
    "house";


    var question =
    questions[currentQuestion];


    var number =
    question.number;


    progress.innerHTML =

    (currentQuestion+1)
    +
    " / "
    +
    questions.length;


    middleDoor.innerHTML =
    number;


    middleDoor.className =
    "door";


    beforeDoor.innerHTML =
    "?";

    afterDoor.innerHTML =
    "?";


    beforeDoor.className =
    "door empty";

    afterDoor.className =
    "door empty";


    if(
    question.type==="before"
    ){

        instruction.innerHTML =

        "Tap the number that comes <b>before</b> "
        +
        number
        +
        ".";


        afterDoor.innerHTML =
        number+1;

        afterDoor.className =
        "door";

    }


    else if(
    question.type==="after"
    ){

        instruction.innerHTML =

        "Tap the number that comes <b>after</b> "
        +
        number
        +
        ".";


        beforeDoor.innerHTML =
        number-1;

        beforeDoor.className =
        "door";

    }


    else{

        instruction.innerHTML =

        "Find <b>both neighbours</b> of "
        +
        number
        +
        ".";

    }


    colourHouses();


    createOptions(
    question
    );

}



/* =========================================================
   COLOUR HOUSES
========================================================= */

function colourHouses(){


    var colours =
    shuffleArray(
    houseColours.slice()
    );


    setHouseColour(
    beforeHouse,
    colours[0]
    );


    setHouseColour(
    middleHouse,
    colours[1]
    );


    setHouseColour(
    afterHouse,
    colours[2]
    );

}



/* =========================================================
   SET HOUSE COLOUR
========================================================= */

function setHouseColour(
house,
colour
){

    house.style.background =
    colour.body;


    house.style.setProperty(
    "--roof",
    colour.roof
    );


    /*
    CSS pseudo-elements cannot
    be changed directly in old
    browsers.

    A small style rule is created
    for each house.
    */

    if(
    house===beforeHouse
    ){

        updateRoofStyle(
        "beforeHouse",
        colour.roof
        );

    }


    else if(
    house===middleHouse
    ){

        updateRoofStyle(
        "middleHouse",
        colour.roof
        );

    }


    else{

        updateRoofStyle(
        "afterHouse",
        colour.roof
        );

    }

}



/* =========================================================
   UPDATE ROOF COLOUR
========================================================= */

function updateRoofStyle(
houseId,
colour
){

    var oldStyle =

    document.getElementById(
    houseId+"RoofStyle"
    );


    if(oldStyle){

        oldStyle.parentNode.removeChild(
        oldStyle
        );

    }


    var style =

    document.createElement(
    "style"
    );


    style.id =
    houseId+"RoofStyle";


    style.innerHTML =

    "#"
    +
    houseId
    +
    ":before{background:"
    +
    colour
    +
    ";}";


    document.head.appendChild(
    style
    );

}



/* =========================================================
   CREATE ANSWER OPTIONS
========================================================= */

function createOptions(
question
){


    optionsBox.innerHTML =
    "";


    var number =
    question.number;


    var answers = [];


    if(
    question.type==="before"
    ){

        answers = [

            number-1,

            number+1,

            number-2

        ];

    }


    else if(
    question.type==="after"
    ){

        answers = [

            number+1,

            number-1,

            number+2

        ];

    }


    else{

        answers = [

            number-1,

            number+1,

            number-2,

            number+2

        ];

    }


    answers =
    shuffleArray(
    answers
    );


    var i;


    for(
    i=0;
    i<answers.length;
    i++
    ){


        var button =

        document.createElement(
        "button"
        );


        button.className =
        "option";


        button.innerHTML =
        answers[i];


        button.setAttribute(

        "data-number",

        answers[i]

        );


        button.onclick =

        function(){

            checkAnswer(
            this
            );

        };


        optionsBox.appendChild(
        button
        );

    }

}



/* =========================================================
   CHECK ANSWER
========================================================= */

function checkAnswer(
button
){


    if(
    questionLocked
    ){

        return;

    }


    var question =
    questions[currentQuestion];


    var chosenNumber =

    parseInt(

    button.getAttribute(
    "data-number"
    ),

    10

    );


    var correctBefore =

    question.number-1;


    var correctAfter =

    question.number+1;



    /*
    BEFORE QUESTION
    */

    if(
    question.type==="before"
    ){


        if(
        chosenNumber===correctBefore
        ){

            beforeDoor.innerHTML =
            correctBefore;

            beforeDoor.className =
            "door";

            button.className =

            "option correct-card";


            finishQuestion();

        }

        else{

            wrongAnswer(
            button
            );

        }

    }



    /*
    AFTER QUESTION
    */

    else if(
    question.type==="after"
    ){


        if(
        chosenNumber===correctAfter
        ){

            afterDoor.innerHTML =
            correctAfter;

            afterDoor.className =
            "door";

            button.className =

            "option correct-card";


            finishQuestion();

        }

        else{

            wrongAnswer(
            button
            );

        }

    }



    /*
    BOTH NEIGHBOURS
    */

    else{


        if(

        chosenNumber===correctBefore

        &&

        selectedBefore===false

        ){


            selectedBefore = true;


            beforeDoor.innerHTML =
            correctBefore;


            beforeDoor.className =
            "door";


            button.className =

            "option correct-card used";


            removeGlow(
            button
            );


            if(
            selectedAfter
            ){

                finishQuestion();

            }

        }


        else if(

        chosenNumber===correctAfter

        &&

        selectedAfter===false

        ){


            selectedAfter = true;


            afterDoor.innerHTML =
            correctAfter;


            afterDoor.className =
            "door";


            button.className =

            "option correct-card used";


            removeGlow(
            button
            );


            if(
            selectedBefore
            ){

                finishQuestion();

            }

        }


        else if(

        chosenNumber===correctBefore

        &&

        selectedBefore===true

        ){

            return;

        }


        else if(

        chosenNumber===correctAfter

        &&

        selectedAfter===true

        ){

            return;

        }


        else{

            wrongAnswer(
            button
            );

        }

    }

}



/* =========================================================
   WRONG ANSWER
========================================================= */

function wrongAnswer(
button
){


    wrongAttempts++;


    playSound(
    wrongSound
    );


    button.classList.remove(
    "wrong-jiggle"
    );


    /*
    Restart animation
    */

    void button.offsetWidth;


    button.classList.add(
    "wrong-jiggle"
    );


    setTimeout(
    function(){

        button.classList.remove(
        "wrong-jiggle"
        );

    },
    500
    );


    if(
    wrongAttempts>=2
    ){

        glowCorrectAnswers();

    }

}



/* =========================================================
   GLOW CORRECT ANSWER
========================================================= */

function glowCorrectAnswers(){


    var question =

    questions[currentQuestion];


    var correctBefore =

    question.number-1;


    var correctAfter =

    question.number+1;


    var buttons =

    optionsBox.getElementsByTagName(
    "button"
    );


    var i;


    for(
    i=0;
    i<buttons.length;
    i++
    ){


        var value =

        parseInt(

        buttons[i].getAttribute(
        "data-number"
        ),

        10

        );


        if(

        question.type==="before"

        &&

        value===correctBefore

        ){

            buttons[i].classList.add(
            "correct-glow"
            );

        }


        else if(

        question.type==="after"

        &&

        value===correctAfter

        ){

            buttons[i].classList.add(
            "correct-glow"
            );

        }


        else if(

        question.type==="both"

        ){

            if(

            value===correctBefore

            &&

            selectedBefore===false

            ){

                buttons[i].classList.add(
                "correct-glow"
                );

            }


            if(

            value===correctAfter

            &&

            selectedAfter===false

            ){

                buttons[i].classList.add(
                "correct-glow"
                );

            }

        }

    }

}



/* =========================================================
   REMOVE GLOW
========================================================= */

function removeGlow(
button
){

    button.classList.remove(
    "correct-glow"
    );

}



/* =========================================================
   QUESTION COMPLETED
========================================================= */

function finishQuestion(){


    if(
    questionLocked
    ){

        return;

    }


    questionLocked = true;


    removeAllGlows();


    beforeHouse.classList.add(
    "lit"
    );

    middleHouse.classList.add(
    "lit"
    );

    afterHouse.classList.add(
    "lit"
    );


    showFeedback();


    playSound(
    clapSound
    );


    driveCar();


    setTimeout(
    function(){


        currentQuestion++;


        if(

        currentQuestion
        >=
        questions.length

        ){

            showEndScreen();

        }

        else{

            loadQuestion();

        }


    },
    2300
    );

}



/* =========================================================
   SHOW FEEDBACK
========================================================= */

function showFeedback(){


    feedback.className =

    "feedback show";

}



/* =========================================================
   HIDE FEEDBACK
========================================================= */

function hideFeedback(){


    feedback.className =

    "feedback";

}



/* =========================================================
   DRIVE CAR
========================================================= */

function driveCar(){


    car.classList.remove(
    "car-drive"
    );


    void car.offsetWidth;


    car.classList.add(
    "car-drive"
    );

}



/* =========================================================
   RESET CAR
========================================================= */

function resetCar(){


    car.classList.remove(
    "car-drive"
    );

}



/* =========================================================
   REMOVE ALL GLOW
========================================================= */

function removeAllGlows(){


    var buttons =

    optionsBox.getElementsByTagName(
    "button"
    );


    var i;


    for(
    i=0;
    i<buttons.length;
    i++
    ){

        buttons[i].classList.remove(
        "correct-glow"
        );

    }

}



/* =========================================================
   SHOW END SCREEN
========================================================= */

function showEndScreen(){


    hideFeedback();


    gameScreen.className =
    "screen";


    endScreen.className =
    "screen active";


    createConfetti();

}



/* =========================================================
   PLAY AGAIN
========================================================= */

function restartGame(){


    clearConfetti();


    endScreen.className =
    "screen";


    gameScreen.className =
    "screen active";


    prepareGame();

}



/* =========================================================
   CREATE CONFETTI
========================================================= */

function createConfetti(){


    clearConfetti();


    var colours = [

        "#ff5f83",

        "#ffd84d",

        "#6fcf78",

        "#66b8ff",

        "#9b73e8",

        "#ff954e"

    ];


    var i;


    for(
    i=0;
    i<95;
    i++
    ){


        var piece =

        document.createElement(
        "div"
        );


        piece.className =

        "confetti-piece";


        piece.style.left =

        Math.floor(
        Math.random()*100
        )
        +
        "%";


        piece.style.background =

        colours[

        Math.floor(

        Math.random()
        *
        colours.length

        )

        ];


        piece.style.animationDuration =

        (
        2.5
        +
        Math.random()*3
        )
        +
        "s";


        piece.style.animationDelay =

        (
        Math.random()*1.4
        )
        +
        "s";


        piece.style.transform =

        "rotate("
        +
        Math.floor(
        Math.random()*180
        )
        +
        "deg)";


        document.body.appendChild(
        piece
        );

    }

}



/* =========================================================
   REMOVE CONFETTI
========================================================= */

function clearConfetti(){


    var pieces =

    document.getElementsByClassName(
    "confetti-piece"
    );


    while(
    pieces.length>0
    ){

        pieces[0].parentNode.removeChild(
        pieces[0]
        );

    }

}



/* =========================================================
   PLAY AUDIO SAFELY
========================================================= */

function playSound(
audio
){


    try{


        audio.pause();


        audio.currentTime=0;


        var promise =

        audio.play();


        if(
        promise
        &&
        promise.catch
        ){

            promise.catch(
            function(){}
            );

        }


    }

    catch(error){

    }

}



/* =========================================================
   UNLOCK AUDIO FOR IOS
========================================================= */

function unlockAudio(){


    try{


        clapSound.volume=0;


        clapSound.play();


        clapSound.pause();


        clapSound.currentTime=0;


        clapSound.volume=1;


        wrongSound.volume=0;


        wrongSound.play();


        wrongSound.pause();


        wrongSound.currentTime=0;


        wrongSound.volume=1;


    }

    catch(error){

    }

}



/* =========================================================
   SHUFFLE ARRAY
========================================================= */

function shuffleArray(
array
){


    var i;

    var randomIndex;

    var temporaryValue;


    for(

    i=array.length-1;

    i>0;

    i--

    ){


        randomIndex =

        Math.floor(

        Math.random()
        *
        (i+1)

        );


        temporaryValue =

        array[i];


        array[i] =

        array[randomIndex];


        array[randomIndex] =

        temporaryValue;

    }


    return array;

}


</script>
