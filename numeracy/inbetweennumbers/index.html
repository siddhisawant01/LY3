<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>In Between Numbers Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Arial Rounded MT Bold", Arial, sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
}

body{
background:#fff;
}

/* ---------------- SCREENS ---------------- */

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

.hidden{
display:none;
}

/* ---------------- INTRO ---------------- */

#intro{
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
}

#intro img{
width:min(70vw,380px);
max-width:90%;
object-fit:contain;
}

/* ---------------- GAME SCREEN ---------------- */

#game{
overflow:hidden;
}

/* Colorful abstract background inspired by reference image */

#game::before{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at 10% 15%, #ff5ba7 0 8%, transparent 8%),
radial-gradient(circle at 88% 12%, #ffcc00 0 8%, transparent 8%),
radial-gradient(circle at 82% 85%, #58d3ea 0 9%, transparent 9%),
radial-gradient(circle at 20% 80%, #8bc34a 0 10%, transparent 10%),
radial-gradient(circle at 55% 20%, #6a6ed1 0 8%, transparent 8%),
linear-gradient(135deg,#ffffff,#fff8fd);
z-index:0;
}

.shape{
position:absolute;
border-radius:25px;
opacity:.95;
z-index:0;
}

.s1{
width:140px;
height:140px;
background:#5bc7eb;
top:12%;
left:-30px;
transform:rotate(15deg);
}

.s2{
width:120px;
height:120px;
background:#ff8a00;
top:10%;
right:-20px;
}

.s3{
width:170px;
height:70px;
background:#9ac000;
bottom:18%;
left:15%;
border-radius:60px;
}

.s4{
width:150px;
height:90px;
background:#ff0040;
bottom:10%;
right:-40px;
border-radius:80px;
}

.s5{
width:130px;
height:130px;
background:#6d70d1;
top:40%;
left:40%;
border-radius:50%;
opacity:.25;
}

.game-content{
position:relative;
z-index:2;
width:100%;
height:100%;
display:flex;
flex-direction:column;
padding:8px;
}

.title{
background:rgba(255,255,255,.95);
border-radius:18px;
padding:10px;
text-align:center;
font-weight:700;
font-size:clamp(15px,2vw,24px);
border:3px solid #ffb300;
margin-bottom:8px;
}

/* ---------------- QUESTIONS ---------------- */

.questions{
flex:1;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.card{
background:rgba(255,255,255,.96);
border-radius:18px;
border:4px solid #ffb300;
display:flex;
justify-content:center;
align-items:center;
font-size:clamp(22px,2vw,34px);
font-weight:bold;
color:#333;
}

.blank{
width:65px;
height:52px;
margin:0 8px;
border:3px dashed #ff4081;
border-radius:12px;
background:#fff;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:28px;
}

/* ---------------- OPTIONS ---------------- */

.options{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-top:8px;
}

.option{
background:#29b6f6;
color:#fff;
padding:12px;
text-align:center;
font-size:clamp(20px,2vw,30px);
font-weight:bold;
border-radius:16px;
border:3px solid white;
cursor:pointer;
transition:.2s;
}

.option.selected{
background:#43a047;
transform:scale(1.08);
}

.option.used{
visibility:hidden;
}

/* ---------------- FEEDBACK ---------------- */

.feedback{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:110px;
display:none;
z-index:999;
pointer-events:none;
}

.correct{
color:#00c853;
}

.wrong{
color:#ff1744;
}

/* ---------------- COMPLETE ---------------- */

#complete{
background:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

#complete h1{
font-size:clamp(50px,8vw,100px);
color:#00c853;
z-index:10;
}

/* ---------------- CONFETTI ---------------- */

.confetti{
position:absolute;
width:12px;
height:12px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-120px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(120vh) rotate(720deg);
opacity:1;
}
}

/* ---------------- MOBILE ---------------- */

@media(max-width:900px){

.questions{
grid-template-columns:1fr;
}

.card{
font-size:24px;
min-height:60px;
}

.blank{
width:55px;
height:45px;
font-size:22px;
}

.options{
grid-template-columns:repeat(3,1fr);
}

.option{
padding:10px;
font-size:22px;
}
}
</style>
</head>

<body>

<!-- INTRO -->

<div id="intro" class="screen">
<img src="assets/innovine-logo.png" alt="Innovine Logo">
</div>

<!-- GAME -->

<div id="game" class="screen hidden">

<div class="shape s1"></div>
<div class="shape s2"></div>
<div class="shape s3"></div>
<div class="shape s4"></div>
<div class="shape s5"></div>

<div class="game-content">

<div class="title">
Identify the in between number from the given options and put in the correct box.
</div>

<div class="questions">

<div class="card">
25
<div class="blank" data-answer="26"></div>
27
</div>

<div class="card">
11
<div class="blank" data-answer="12"></div>
13
</div>

<div class="card">
21
<div class="blank" data-answer="22"></div>
23
</div>

<div class="card">
18
<div class="blank" data-answer="19"></div>
20
</div>

<div class="card">
14
<div class="blank" data-answer="15"></div>
16
</div>

<div class="card">
28
<div class="blank" data-answer="29"></div>
30
</div>

</div>

<div class="options">

<div class="option">15</div>
<div class="option">12</div>
<div class="option">29</div>
<div class="option">19</div>
<div class="option">20</div>
<div class="option">26</div>

</div>

</div>

</div>

<!-- COMPLETE -->

<div id="complete" class="screen hidden">
<h1>🎉 Well Done! 🎉</h1>
</div>

<div id="correctMark" class="feedback correct">✅</div>
<div id="wrongMark" class="feedback wrong">❌</div>

<audio id="wrongSound" preload="auto">
<source src="assets/wrong.mp3" type="audio/mpeg">
</audio>

<script>

/* ---------------- INTRO ---------------- */

setTimeout(() => {
document.getElementById("intro").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
},3000);

/* ---------------- GAME LOGIC ---------------- */

let selectedOption=null;
let solved=0;

const options=document.querySelectorAll(".option");
const blanks=document.querySelectorAll(".blank");

options.forEach(option=>{

option.addEventListener("click",()=>{

if(option.classList.contains("used")) return;

options.forEach(o=>o.classList.remove("selected"));

option.classList.add("selected");

selectedOption=option;

});

});

function showCorrect(){

const tick=document.getElementById("correctMark");

tick.style.display="block";

setTimeout(()=>{
tick.style.display="none";
},700);

}

function showWrong(){

const cross=document.getElementById("wrongMark");

cross.style.display="block";

const sound=document.getElementById("wrongSound");
sound.currentTime=0;
sound.play();

setTimeout(()=>{
cross.style.display="none";
},700);

}

blanks.forEach(blank=>{

blank.addEventListener("click",()=>{

if(blank.textContent!=="") return;

if(!selectedOption) return;

const chosen=selectedOption.textContent.trim();
const answer=blank.dataset.answer;

if(chosen===answer){

blank.textContent=answer;
blank.style.background="#c8e6c9";
blank.style.border="3px solid #00c853";

selectedOption.classList.add("used");
selectedOption.classList.remove("selected");

selectedOption=null;

showCorrect();

solved++;

if(solved===6){

setTimeout(()=>{
showCompletion();
},1000);

}

}else{

showWrong();

}

});

});

/* ---------------- COMPLETION ---------------- */

function showCompletion(){

document.getElementById("game").classList.add("hidden");
document.getElementById("complete").classList.remove("hidden");

for(let i=0;i<180;i++){

const conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=
`hsl(${Math.random()*360},100%,50%)`;

conf.style.animationDuration=
(3+Math.random()*4)+"s";

conf.style.animationDelay=
(Math.random()*2)+"s";

document.getElementById("complete").appendChild(conf);

}

}

</script>

</body>
</html>
